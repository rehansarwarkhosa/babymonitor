        border: hasNote ? '1.5px solid #ECC94B' : '1px solid #E2E8F0',
      }}>
        <img
          src={img.url} alt={img.originalName || img.filename} loading="lazy"
          onClick={()=>onLightbox(img.url)}
          style={{width:'100%', height:130, objectFit:'cover', display:'block', cursor:'zoom-in'}}
        />
        <div style={{padding:'7px 9px 9px'}}>
          <div style={{fontSize:11, fontWeight:600, color:'#2D3748', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
            {img.originalName || img.filename}
          </div>
          {img.folderName && img.folderName.toLowerCase() !== 'unknown' && (
            <div style={{fontSize:10, color:'#E67E22', marginTop:2}}>{img.folderName}</div>

          <div style={{fontSize:11, color:'#718096', marginTop:1}}>{fmtDate(img.dateTaken || img.created)}</div>
          <div style={{fontSize:11, color:'#A0AEC0', marginBottom:6}}>{fmtSize(img.size)}</div>
          <div style={{display:'flex', gap:4}}>
            <a href={img.url} download={img.originalName || img.filename} style={{
              flex:1, display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:12, padding:'4px 0', borderRadius:6,
              border:'1px solid #C6F6D5', color:'#38A169', textDecoration:'none',
            }}>⬇</a>
            {!inFavorites && (
              <button
                onClick={()=>onStar && onStar(deviceId, img.filename)}
                disabled={starred}
                title={starred ? 'Already favorited' : 'Add to favorites'}
                style={{
                  flex:1, fontSize:14, padding:'4px 0', borderRadius:6,
                  border:'1px solid #FEEBC8', color: starred?'#D69E2E':'#ED8936',
                  background: starred ? '#FFFBEB' : '#FFF',
                  cursor: starred ? 'default' : 'pointer',
                }}
              >{starred ? '★' : '☆'}</button>
            )}
            <button
              onClick={()=>onDelete(deviceId, img.filename)}
              style={{
                flex:1, fontSize:12, padding:'4px 0', borderRadius:6,
                border:'1px solid #FED7D7', color:'#E53E3E',
              }}
            >✕</button>
          </div>
          <NoteWidget
            kind="gallery" deviceId={deviceId} filename={img.filename}
            note={note} onSave={onSaveNote} compact
          />
        </div>
      </div>
    );
  }

  /* ─── Device group block (Gallery) ──────────────────────────── */
  function GalleryGroup({deviceId, group, onDelete, onDeleteAll, onDateDelete, onZipAll, onZipDate, onLightbox, onStar, favSet, inFavorites, notesMap, onSaveNote}) {
    const [open, setOpen] = useState(false);
    const [openDates, setOpenDates] = useState({});
    const toggleDate = (k) => setOpenDates(p => ({ ...p, [k]: !p[k] }));
    const color = devColor(deviceId);
    return (
      <div style={{
        marginBottom:18, borderRadius:12, overflow:'hidden',
        boxShadow: open ? '0 2px 10px rgba(15,42,53,0.08)' : 'none',
        border:`1.5px solid ${color+'33'}`,
        borderLeft:`4px solid ${color}`,
      }}>
        <button
          onClick={()=>setOpen(!open)}
          style={{
            width:'100%', display:'flex', alignItems:'center', gap:10,
            padding:'12px 14px',
            background: open ? color+'18' : color+'0E',
            border:'none', cursor:'pointer',
            transition:'background .15s',
          }}
        >
          <span style={{

            display:'inline-flex', alignItems:'center', justifyContent:'center',
            transition:'transform .15s',
            transform: open ? 'rotate(90deg)' : 'rotate(0deg)',

          }}>▶</span>
          <span style={{
            flex:1, textAlign:'left', fontSize:15, fontWeight:700, color:'#1A202C',

          }}>
            {group.deviceName}
          </span>
          <span style={{

          }}>
            {group.images.length} {group.images.length===1?'image':'images'}

        {open && (
          <div style={{background:'#FFF', padding:'10px 12px 12px'}}>
            <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:10}}>
              {onZipAll && (
                <button onClick={()=>onZipAll(deviceId)} style={{
                  flex:'1 1 140px', fontSize:12, fontWeight:600, padding:'8px 10px', borderRadius:8,
                  border:'1px solid #C6F6D5', color:'#38A169', background:'#F0FFF4', cursor:'pointer',
                }}>⬇ Download All as ZIP</button>

                    />

  /* ─── Gallery Stats Card ─────────────────────────────────────── */
  function GalleryStatsCard({deviceId, stats, onGetLatest, onGetByFolder, onFlexQuery, progress, deviceName}) {
    const [count, setCount] = useState(10);
    const [folder, setFolder] = useState('camera');
    const [folderCount, setFolderCount] = useState(20);
    const [showAdvanced, setShowAdvanced] = useState(false);
    const [fromDate, setFromDate] = useState('');
    const [toDate, setToDate] = useState('');
    const [advCount, setAdvCount] = useState(50);
    const [advFolders, setAdvFolders] = useState([]);
    const dev = stats || {};

    const FALLBACK_FOLDERS = ['camera','downloads','screenshots','whatsapp','telegram','instagram','facebook','twitter','snapchat','tiktok','saved'];
    const deviceFolders = (dev.folders && dev.folders.length > 0)
      ? dev.folders.map(f => f.name)
      : FALLBACK_FOLDERS;

    const isWorking = progress && (progress.status === 'scanning' || progress.status === 'uploading');

    const toggleAdvFolder = (f) => {
      setAdvFolders(p => p.includes(f) ? p.filter(x=>x!==f) : [...p, f]);
    };

    const runFlexQuery = () => {
      const params = { count: advCount };
      if (fromDate) params.fromDate = new Date(fromDate).getTime();
      if (toDate) params.toDate = new Date(toDate + 'T23:59:59').getTime();
      if (advFolders.length > 0) params.folders = advFolders;
      onFlexQuery(deviceId, params);
    };

    return (
      <Card style={{padding:16, marginBottom:12}}>
        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
          <span style={{fontSize:16}}>🖼</span>
          <span style={{fontSize:14, fontWeight:700, color:'#2D3748'}}>
            {deviceName || deviceId.slice(0,12) + '…'}
          </span>
        </div>

        {dev.totalImages !== undefined ? (
          <div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}}>
              <Pill color="#E67E22">{dev.totalImages} images</Pill>
              <Pill color="#4A90A4">{dev.totalSizeMB || Math.round((dev.totalSizeBytes||0)/1048576)} MB</Pill>
              <Pill color="#7B68AE">{dev.folderCount || (dev.folders||[]).length} folders</Pill>
            </div>

            {dev.folders && dev.folders.length > 0 && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12, fontWeight:600, color:'#718096', marginBottom:4}}>Folders:</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                  {dev.folders.slice(0,10).map(f => (
                    <span key={f.name} style={{
                      fontSize:11, padding:'3px 8px', borderRadius:6,
                      background:'#EBF8FF', color:'#2B6CB0', border:'1px solid #BEE3F8',
                    }}>
                      {f.name} ({f.count})
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* Quick: Get latest images */}
            <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4, textTransform:'uppercase', letterSpacing:0.5}}>Quick Fetch</div>
            <div style={{display:'flex', gap:6, marginBottom:8, flexWrap:'wrap'}}>
              <select value={count} onChange={e=>setCount(Number(e.target.value))}
                style={{height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                <option value={5}>5</option>
                <option value={10}>10</option>
                <option value={20}>20</option>
                <option value={50}>50</option>
              </select>
              <Btn sm color="#E67E22" onClick={()=>onGetLatest(deviceId, count, true)} disabled={isWorking}>
                {isWorking ? '⏳ …' : `⬇ Latest ${count}`}
              </Btn>
            </div>

            {/* Quick: Get by folder */}
            <div style={{display:'flex', gap:6, marginBottom:8, flexWrap:'wrap'}}>
              <select value={folder} onChange={e=>setFolder(e.target.value)}
                style={{flex:1, minWidth:0, height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                {deviceFolders.map(f => {
                  const info = dev.folders && dev.folders.find(x=>x.name===f);
                  return <option key={f} value={f}>{f}{info ? ` (${info.count})` : ''}</option>;
                })}
              </select>
              <select value={folderCount} onChange={e=>setFolderCount(Number(e.target.value))}
                style={{height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                <option value={5}>5</option>
                <option value={10}>10</option>
                <option value={20}>20</option>
                <option value={50}>50</option>
                <option value={100}>100</option>
              </select>
              <Btn sm outline color="#E67E22" onClick={()=>onGetByFolder(deviceId, folder, folderCount, true)} disabled={isWorking}>
                📂 Folder
              </Btn>
            </div>

            {/* Advanced / Flexible query toggle */}
            <button onClick={()=>setShowAdvanced(!showAdvanced)} style={{
              width:'100%', fontSize:12, fontWeight:600, padding:'8px 0', borderRadius:8,
              border:'1.5px solid #E67E2244', color:'#E67E22', background:'#FFF7ED',
              cursor:'pointer', marginBottom: showAdvanced ? 8 : 0,
            }}>
              {showAdvanced ? '▲ Hide Advanced Query' : '▼ Advanced Query (Date Range, Multi-Folder)'}
            </button>

            {showAdvanced && (
              <div style={{padding:12, borderRadius:10, background:'#FFFBF5', border:'1px solid #FEEBC8'}}>
                {/* Date range */}
                <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4}}>Date Range</div>
                <div style={{display:'flex', gap:6, marginBottom:10, flexWrap:'wrap'}}>
                  <div style={{flex:1, minWidth:120}}>
                    <div style={{fontSize:10, color:'#A0AEC0', marginBottom:2}}>From</div>
                    <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)}
                      style={{width:'100%', height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}} />
                  </div>
                  <div style={{flex:1, minWidth:120}}>
                    <div style={{fontSize:10, color:'#A0AEC0', marginBottom:2}}>To</div>
                    <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)}
                      style={{width:'100%', height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}} />
                  </div>
                </div>

                {/* Folder multi-select */}
                <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4}}>Folders (select multiple, or none for all)</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:10}}>
                  {deviceFolders.map(f => {
                    const sel = advFolders.includes(f);
                    return (
                      <button key={f} onClick={()=>toggleAdvFolder(f)} style={{
                        fontSize:11, padding:'4px 10px', borderRadius:6, cursor:'pointer',
                        border: sel ? '1.5px solid #E67E22' : '1px solid #E2E8F0',
                        background: sel ? '#FFF7ED' : '#FFF',
                        color: sel ? '#E67E22' : '#718096', fontWeight: sel ? 700 : 400,
                      }}>{f}</button>
                    );
                  })}
                </div>

                {/* Max count */}
                <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:10}}>
                  <div style={{fontSize:11, fontWeight:700, color:'#718096'}}>Max images:</div>
                  <input
                    type="number" min="0" step="1" inputMode="numeric"
                    value={advCount}
                    onChange={e=>{
                      const v = e.target.value;
                      setAdvCount(v === '' ? 0 : Math.max(0, parseInt(v,10) || 0));
                    }}
                    placeholder="0 = all"
                    style={{height:34, padding:'0 10px', width:110, fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}
                  />
                  <span style={{fontSize:10, color:'#A0AEC0'}}>(0 = all)</span>
                </div>

                <Btn full color="#E67E22" onClick={runFlexQuery} disabled={isWorking}>
                  {isWorking ? '⏳ Working…' : '🔍 Fetch Gallery Images'}
                </Btn>
              </div>
            )}

            {/* Progress */}
            {progress && progress.status === 'uploading' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#FFFBEB', border:'1px solid #F6AD55'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#C05621'}}>
                  ⬆ Uploading… {progress.uploaded||0}/{progress.total||'?'}
                </span>
              </div>
            )}
            {progress && progress.status === 'scanning' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#EBF8FF', border:'1px solid #BEE3F8'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#2B6CB0'}}>
                  🔍 Scanning device gallery…
                </span>
              </div>
            )}
            {progress && progress.status === 'paused' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#FFFBEB', border:'1px solid #F6AD55'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#C05621'}}>
                  ⏸ Upload paused — {progress.remaining||0} remaining ({progress.uploaded||0} uploaded, {progress.failed||0} failed)
                </span>
              </div>
            )}
          </div>
        ) : (
          <div style={{fontSize:13, color:'#A0AEC0', textAlign:'center', padding:'12px 0'}}>
            {dev.hasPermission === false ? 'No gallery permission on device' : 'Loading gallery stats…'}
          </div>
        )}
      </Card>
    );
  }

  /* ─── Toast ─────────────────────────────────────────────────── */
  function Toast({toast, onDismiss}) {
    if (!toast) return null;
    const bg = toast.type==='error'?'#C53030': toast.type==='warn'?'#C05621':'#2B6CB0';
    return (
      <div onClick={onDismiss} style={{
        position:'fixed', top:68, left:'50%', transform:'translateX(-50%)',
        zIndex:500, background:bg, color:'#FFF',
        padding:'10px 18px', borderRadius:12, maxWidth:'92vw',
        fontSize:13, fontWeight:500, textAlign:'center',
        boxShadow:'0 4px 20px rgba(0,0,0,0.3)', cursor:'pointer',
        animation:'fadein .2s ease',
      }}>{toast.msg}</div>
    );
  }

  /* ─── Empty state ───────────────────────────────────────────── */
  function Empty({icon, title, sub}) {
    return (
      <div style={{textAlign:'center', padding:'64px 24px', color:'#A0AEC0'}}>
        <div style={{fontSize:44, marginBottom:12}}>{icon}</div>
        <div style={{fontSize:16, fontWeight:600, color:'#718096'}}>{title}</div>
        {sub && <div style={{fontSize:13, marginTop:6}}>{sub}</div>}
      </div>
    );
  }

  /* ─── Recycle Bin tab (mobile-first) ─────────────────────────
     Layout principles:
     • One single restore action per row (↶ icon button).
     • Bulk restore is opt-in: tap rows to multi-select; a floating action
       bar appears at the bottom with Restore-Selected + Clear-Selection.
     • Devices are collapsible cards. Default: first device expanded.
     • Date sub-headers are pure labels — no buttons in them.
     • Every flex row uses min-width:0 + box-sizing:border-box and the action
       column is flex-shrink:0, so nothing escapes the viewport on a 360-px screen. */
  const TRASH_KIND_META = {
    recordings:  { icon:'🎙', short:'Audio',  color:'#4A90A4' },
    screenshots: { icon:'📷', short:'Shot',   color:'#7B68AE' },
    gallery:     { icon:'🖼', short:'Image',  color:'#E67E22' },
  };

  function TrashTab({ items, onRestore, onEmpty }) {
    const [selected, setSelected] = useState(() => new Set());
    const [expanded, setExpanded] = useState(() => new Set());

    // Group: deviceId → { deviceName, items[] (flat, sorted newest-deleted first) }.
    // We deliberately do NOT sub-group by kind here — the kind is shown as a
    // small chip on each row instead. Less nesting = less mobile clutter.
    const byDevice = useMemo(() => {
      const out = {};
      (items || []).forEach(it => {
        if (!out[it.deviceId]) out[it.deviceId] = { deviceName: it.deviceName || it.deviceId, items: [] };
        out[it.deviceId].items.push(it);
      });
      Object.values(out).forEach(g => g.items.sort((a,b) => new Date(b.deletedAt) - new Date(a.deletedAt)));
      return out;
    }, [items]);

    // Auto-expand on first render so users see content immediately. After that
    // they control which sections are open.
    useEffect(() => {
      if (expanded.size === 0) {
        const ids = Object.keys(byDevice);
        if (ids.length > 0) setExpanded(new Set([ids[0]]));
      }
      // Drop selections for items that no longer exist (e.g. after a restore).
      const live = new Set((items||[]).map(i => i.id));
      setSelected(prev => {
        let changed = false;
        const next = new Set();
        prev.forEach(id => { if (live.has(id)) next.add(id); else changed = true; });
        return changed ? next : prev;
      });
    // eslint-disable-next-line
    }, [items]);

    const toggleSelect = (id) => setSelected(p => {
      const n = new Set(p);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
    const toggleExpand = (deviceId) => setExpanded(p => {
      const n = new Set(p);
      if (n.has(deviceId)) n.delete(deviceId); else n.add(deviceId);
      return n;
    });

    if (!items || items.length === 0) {
      return <Empty
        icon="🗑"
        title="Recycle bin is empty"
        sub="Anything you delete lands here first. You can restore it back to its original place, or empty the bin (password required) to delete forever."
      />;
    }

    const totalDevices = Object.keys(byDevice).length;
    const totalSize = items.reduce((s, it) => s + (it.size || 0), 0);

    return (
      <div style={{paddingBottom: selected.size > 0 ? 80 : 0}}>
        {/* ── Compact summary header. Two buttons max, never wraps. ── */}
        <div style={{
          background:'#FFF', border:'1px solid #E2E8F0', borderRadius:12,
          padding:'10px 12px', marginBottom:12,
          display:'flex', alignItems:'center', gap:10, boxSizing:'border-box',
        }}>
          <div style={{
            width:40, height:40, flexShrink:0, borderRadius:10,
            background:'#F7FAFC', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20,
          }}>🗑</div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:14, fontWeight:700, color:'#2D3748'}}>Recycle Bin</div>
            <div style={{
              fontSize:11, color:'#718096', marginTop:1,
              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
            }}>
              {items.length} item{items.length!==1?'s':''} · {totalDevices} device{totalDevices!==1?'s':''} · {fmtSize(totalSize)}
            </div>
          </div>
          <button
            onClick={onEmpty}
            style={{
              flexShrink:0, height:36, padding:'0 12px', borderRadius:9,
              border:'1.5px solid #E53E3E', background:'#FFF', color:'#E53E3E',
              fontSize:12, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap',
            }}
          >🔒 Empty</button>
        </div>

        {/* ── Device sections (collapsible) ── */}
        {Object.entries(byDevice).map(([deviceId, group]) => {
          const isOpen = expanded.has(deviceId);
          const dateGroups = groupByDay(group.items, x => x.dateTaken || x.originalCreated || x.deletedAt);
          return (
            <div key={deviceId} style={{
              background:'#FFF', border:'1px solid #E2E8F0', borderRadius:12,
              marginBottom:10, overflow:'hidden', boxSizing:'border-box',
            }}>
              {/* Device header — entire row is the toggle. No buttons inside it. */}
              <button
                onClick={()=>toggleExpand(deviceId)}
                style={{
                  width:'100%', display:'flex', alignItems:'center', gap:10,
                  padding:'12px 12px', background: isOpen ? '#F7FAFC' : '#FFF',
                  border:'none', borderLeft:`4px solid ${devColor(deviceId)}`,
                  cursor:'pointer', textAlign:'left', boxSizing:'border-box',
                }}
              >
                <div style={{flex:1, minWidth:0}}>
                  <div style={{
                    fontSize:14, fontWeight:700, color:'#2D3748',
                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                  }}>{group.deviceName}</div>
                  <div style={{fontSize:11, color:'#A0AEC0', marginTop:1}}>
                    {group.items.length} deleted
                  </div>
                </div>
                <span style={{
                  flexShrink:0, fontSize:14, color:'#A0AEC0',
                  transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)',
                  transition:'transform .15s',
                }}>▶</span>
              </button>

              {isOpen && (
                <div style={{padding:'4px 8px 10px'}}>
                  {dateGroups.map(dg => (
                    <div key={dg.key}>
                      {/* Pure label — no action buttons (Bulk-restore via row checkboxes) */}
                      <div style={{
                        fontSize:10, fontWeight:700, color:'#A0AEC0',
                        textTransform:'uppercase', letterSpacing:0.5,
                        padding:'10px 6px 6px',
                      }}>
                        {dg.label} · {dg.items.length}
                      </div>
                      {dg.items.map(it => {
                        const meta = TRASH_KIND_META[it.kind] || { icon:'📄', short:it.kind, color:'#718096' };
                        const isSel = selected.has(it.id);
                        return (
                          <div key={it.id} style={{
                            display:'flex', alignItems:'center', gap:8,
                            padding:'8px 6px', borderRadius:8, marginBottom:2,
                            background: isSel ? '#EBF8FF' : 'transparent',
                            boxSizing:'border-box',
                          }}>
                            {/* Tap thumbnail/checkbox area to toggle selection */}
                            <button
                              onClick={()=>toggleSelect(it.id)}
                              aria-label={isSel ? 'Deselect' : 'Select'}
                              style={{
                                position:'relative', width:44, height:44, flexShrink:0,
                                padding:0, border:'none', background:'transparent', cursor:'pointer',
                              }}
                            >
                              {(it.kind === 'screenshots' || it.kind === 'gallery') ? (
                                <img
                                  src={`/api/trash/file/${it.id}`}
                                  style={{
                                    width:'100%', height:'100%', objectFit:'cover', borderRadius:7,
                                    background:'#EDF2F7', display:'block',
                                    border: isSel ? '2px solid #2B6CB0' : '1px solid #E2E8F0',
                                  }}
                                  onError={(e)=>{ e.target.style.visibility='hidden'; }}
                                />
                              ) : (
                                <div style={{
                                  width:'100%', height:'100%', borderRadius:7,
                                  background: isSel ? '#BEE3F8' : '#EDF2F7',
                                  display:'flex', alignItems:'center', justifyContent:'center',
                                  fontSize:20,
                                  border: isSel ? '2px solid #2B6CB0' : '1px solid #E2E8F0',
                                  boxSizing:'border-box',
                                }}>{meta.icon}</div>
                              )}
                              {isSel && (
                                <span style={{
                                  position:'absolute', top:-4, right:-4, width:18, height:18,
                                  borderRadius:9, background:'#2B6CB0', color:'#FFF',
                                  fontSize:11, fontWeight:700,
                                  display:'flex', alignItems:'center', justifyContent:'center',
                                  border:'2px solid #FFF',
                                }}>✓</span>
                              )}
                            </button>

                            {/* Filename + meta. min-width:0 is critical here so the
                                ellipsis works inside a flex row on Android. */}
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{
                                fontSize:12, fontWeight:600, color:'#2D3748',
                                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                              }} title={it.filename}>{it.filename}</div>
                              <div style={{
                                fontSize:10, color:'#A0AEC0', marginTop:2,
                                display:'flex', alignItems:'center', gap:6, flexWrap:'wrap',
                              }}>
                                <span style={{
                                  background: meta.color+'22', color: meta.color,
                                  fontWeight:700, padding:'1px 6px', borderRadius:6,
                                }}>{meta.short}</span>
                                <span style={{whiteSpace:'nowrap'}}>{fmtSize(it.size)}</span>
                                <span style={{whiteSpace:'nowrap'}}>· {timeAgo(it.deletedAt)}</span>
                              </div>
                            </div>

                            {/* Single restore action. Icon-only on narrow screens. */}
                            <button
                              onClick={()=>onRestore([it.id])}
                              title="Restore"
                              aria-label="Restore"
                              style={{
                                flexShrink:0, width:40, height:40, borderRadius:9,
                                border:`1.5px solid ${meta.color}`, background:'#FFF',
                                color: meta.color, fontSize:18, fontWeight:700,
                                cursor:'pointer', padding:0,
                                display:'flex', alignItems:'center', justifyContent:'center',
                              }}
                            >↶</button>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}

        {/* ── Floating bulk-action bar — only visible while items are selected. ── */}
        {selected.size > 0 && (
          <div style={{
            position:'fixed', left:0, right:0, bottom:0, zIndex:300,
            padding:`10px 12px calc(10px + var(--safe-bottom))`,
            background:'#FFF', borderTop:'1px solid #E2E8F0',
            boxShadow:'0 -4px 18px rgba(0,0,0,0.12)',
            display:'flex', alignItems:'center', gap:8, boxSizing:'border-box',
          }}>
            <button
              onClick={()=>setSelected(new Set())}
              style={{
                flexShrink:0, height:44, padding:'0 14px', borderRadius:10,
                border:'1.5px solid #E2E8F0', background:'#FFF', color:'#4A5568',
                fontSize:13, fontWeight:600, cursor:'pointer',
              }}
            >Cancel</button>
            <button
              onClick={()=>onRestore(Array.from(selected))}
              style={{
                flex:1, minWidth:0, height:44, padding:'0 12px', borderRadius:10,
                border:'none', background:'#2B6CB0', color:'#FFF',
                fontSize:14, fontWeight:700, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
              }}
            >↶ Restore {selected.size} item{selected.size!==1?'s':''}</button>
          </div>
        )}
      </div>
    );
  }

  /* ─── Advanced Audio Player ─────────────────────────────────── */
  function AudioPlayer({ src, autoPlay }) {
    const audioRef   = useRef(null);
    const seekingRef = useRef(false);
    const [playing,     setPlaying]     = useState(false);
    const [duration,    setDuration]    = useState(0);
    const [currentTime, setCurrentTime] = useState(0);
    const [rate,        setRate]        = useState(1);
    const [buffered,    setBuffered]    = useState(0);
    const [muted,       setMuted]       = useState(false);

    useEffect(() => {
      const a = audioRef.current; if (!a) return;
      const onLoaded = () => setDuration(isFinite(a.duration) ? a.duration : 0);
      const onTime   = () => { if (!seekingRef.current) setCurrentTime(a.currentTime || 0); };
      const onPlay   = () => setPlaying(true);
      const onPause  = () => setPlaying(false);
      const onEnded  = () => setPlaying(false);
      const onProg   = () => {
        try {
          if (a.buffered.length > 0) setBuffered(a.buffered.end(a.buffered.length - 1));
        } catch {}
      };
      a.addEventListener('loadedmetadata', onLoaded);
      a.addEventListener('durationchange', onLoaded);
      a.addEventListener('timeupdate', onTime);
      a.addEventListener('play', onPlay);
      a.addEventListener('pause', onPause);
      a.addEventListener('ended', onEnded);
      a.addEventListener('progress', onProg);
      a.playbackRate = rate;
      return () => {
        a.removeEventListener('loadedmetadata', onLoaded);
        a.removeEventListener('durationchange', onLoaded);
        a.removeEventListener('timeupdate', onTime);
        a.removeEventListener('play', onPlay);
        a.removeEventListener('pause', onPause);
        a.removeEventListener('ended', onEnded);
        a.removeEventListener('progress', onProg);
      };
    }, []);

    useEffect(() => {
      const a = audioRef.current; if (a) a.playbackRate = rate;
    }, [rate]);

    useEffect(() => {
      const a = audioRef.current; if (a) a.muted = muted;
    }, [muted]);

    const togglePlay = () => {
      const a = audioRef.current; if (!a) return;
      if (a.paused) a.play().catch(()=>{}); else a.pause();
    };

    const skip = (delta) => {
      const a = audioRef.current; if (!a) return;
      const t = Math.max(0, Math.min(duration || 0, (a.currentTime || 0) + delta));
      a.currentTime = t;
      setCurrentTime(t);
    };

    const onSeekChange = (e) => {
      const t = Number(e.target.value);
      seekingRef.current = true;
      setCurrentTime(t);
      const a = audioRef.current;
      if (a) a.currentTime = t;
    };
    const endSeek = () => { seekingRef.current = false; };

    const fmt = (s) => {
      if (!isFinite(s) || s < 0) s = 0;
      const m = Math.floor(s / 60);
      const ss = Math.floor(s % 60);
      return `${m}:${String(ss).padStart(2,'0')}`;
    };

    const dur = duration || 0;
    const pctBuf = dur > 0 ? Math.min(100, (buffered / dur) * 100) : 0;
    const pctCur = dur > 0 ? Math.min(100, (currentTime / dur) * 100) : 0;

    return (
      <div style={{
        marginTop:10, padding:'12px 12px 10px',
        background:'#0F2A35', borderRadius:12, color:'#FFF',
        boxShadow:'0 2px 8px rgba(0,0,0,0.18)',
      }}>
        <audio ref={audioRef} src={src} autoPlay={autoPlay} preload="metadata" />

        {/* Seek track */}
        <div style={{position:'relative', height:28, marginBottom:6}}>
          {/* Background */}
          <div style={{
            position:'absolute', left:0, right:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'rgba(255,255,255,0.18)',
          }} />
          {/* Buffered */}
          <div style={{
            position:'absolute', left:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'rgba(255,255,255,0.32)',
            width:`${pctBuf}%`, pointerEvents:'none',
          }} />
          {/* Played */}
          <div style={{
            position:'absolute', left:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'#4A90A4',
            width:`${pctCur}%`, pointerEvents:'none',
          }} />
          {/* Native range — sized to give a big drag target */}
          <input
            type="range"
            min={0}
            max={dur || 0}
            step={0.05}
            value={currentTime}
            onChange={onSeekChange}
            onMouseDown={()=>{ seekingRef.current = true; }}
            onTouchStart={()=>{ seekingRef.current = true; }}
            onMouseUp={endSeek}
            onTouchEnd={endSeek}
            onPointerDown={()=>{ seekingRef.current = true; }}
            onPointerUp={endSeek}
            onPointerCancel={endSeek}
            style={{
              position:'absolute', left:0, right:0, top:0, width:'100%', height:28,
              opacity:0, margin:0, cursor:'pointer', WebkitAppearance:'none', appearance:'none',
            }}
            aria-label="Seek"
          />
          {/* Thumb */}
          <div style={{
            position:'absolute', top:'50%',
            left:`calc(${pctCur}% - 9px)`,
            transform:'translateY(-50%)',
            width:18, height:18, borderRadius:'50%',
            background:'#FFF', boxShadow:'0 1px 3px rgba(0,0,0,0.5)',
            pointerEvents:'none',
          }} />
        </div>

        {/* Time labels */}
        <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'#CBD5E0', marginBottom:8}}>
          <span>{fmt(currentTime)}</span>
          <span>{fmt(dur)}</span>
        </div>

        {/* Controls */}
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <button onClick={()=>skip(-10)} title="Back 10s" style={ctrlBtnStyle}>⏪ 10s</button>
          <button onClick={togglePlay} title={playing?'Pause':'Play'} style={{
            ...ctrlBtnStyle, background:'#4A90A4', minWidth:54,
            color:'#FFF', fontWeight:700, fontSize:16,
          }}>{playing ? '❚❚' : '▶'}</button>
          <button onClick={()=>skip(10)} title="Forward 10s" style={ctrlBtnStyle}>10s ⏩</button>
          <div style={{flex:1}} />
          <button onClick={()=>setMuted(m=>!m)} title={muted?'Unmute':'Mute'} style={ctrlBtnStyle}>
            {muted ? '🔇' : '🔊'}
          </button>
          <select
            value={rate}
            onChange={e=>setRate(Number(e.target.value))}
            style={{
              height:32, padding:'0 6px', fontSize:12, fontWeight:600,
              borderRadius:8, border:'1px solid rgba(255,255,255,0.25)',
              background:'rgba(255,255,255,0.08)', color:'#FFF', cursor:'pointer',
            }}
            title="Playback speed"
          >
            {[0.5, 0.75, 1, 1.25, 1.5, 1.75, 2].map(r => (
              <option key={r} value={r} style={{color:'#000'}}>{r}×</option>
            ))}
          </select>
        </div>

      </div>
    );
  }
  const ctrlBtnStyle = {
    height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:8,
    border:'1px solid rgba(255,255,255,0.25)', background:'rgba(255,255,255,0.08)',
    color:'#FFF', cursor:'pointer',
  };

  /* ─── Note (description) widget ─────────────────────────────── */
  function NoteWidget({ kind, deviceId, filename, note, onSave, compact }) {
    const [editing, setEditing] = useState(false);
    const [val, setVal]         = useState(note || '');
    const [busy, setBusy]       = useState(false);
    useEffect(() => { setVal(note || ''); }, [note]);

    const save = async () => {
      setBusy(true);
      await onSave(kind, deviceId, filename, val.trim());
      setBusy(false);
      setEditing(false);
    };
    const remove = async () => {
      setBusy(true);
      await onSave(kind, deviceId, filename, '');
      setBusy(false);
      setEditing(false);
    };

    if (editing) {
      return (
        <div style={{marginTop:8, padding:8, borderRadius:8, background:'#FFFBEA', border:'1px solid #F6E05E'}}>
          <textarea
            value={val}
            onChange={e=>setVal(e.target.value.slice(0,1000))}
            placeholder="Write a description for this item…"
            rows={compact ? 2 : 3}
            autoFocus
            style={{
              width:'100%', boxSizing:'border-box',
              fontSize:13, fontWeight:600, color:'#2D3748',
              padding:8, borderRadius:6, border:'1px solid #ECC94B',
              background:'#FFFFF0', resize:'vertical', fontFamily:'inherit',
            }}
          />
          <div style={{display:'flex', gap:6, marginTop:6}}>
            <button onClick={save} disabled={busy} style={{
              flex:1, height:32, fontSize:12, fontWeight:700, borderRadius:6,
              border:'none', background: busy?'#A0AEC0':'#38A169', color:'#FFF', cursor:'pointer',
            }}>{busy ? '…' : '💾 Save'}</button>
            <button onClick={()=>{ setVal(note||''); setEditing(false); }} disabled={busy} style={{
              flex:1, height:32, fontSize:12, fontWeight:600, borderRadius:6,
              border:'1px solid #E2E8F0', background:'#FFF', color:'#4A5568', cursor:'pointer',
            }}>Cancel</button>
            {note && (
              <button onClick={remove} disabled={busy} title="Remove description" style={{
                height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:6,
                border:'1px solid #FED7D7', background:'#FFF5F5', color:'#E53E3E', cursor:'pointer',
              }}>🗑</button>
            )}
          </div>
          <div style={{fontSize:10, color:'#A0AEC0', marginTop:4, textAlign:'right'}}>{val.length}/1000</div>
        </div>
      );
    }

    if (note) {
      return (
        <div
          onClick={()=>setEditing(true)}
          title="Tap to edit description"
          style={{
            marginTop:8, padding:'8px 10px', borderRadius:8,
            background:'#FFFBEA', border:'1.5px solid #ECC94B',
            cursor:'pointer',
          }}
        >
          <div style={{fontSize:10, fontWeight:700, color:'#B7791F', marginBottom:3, letterSpacing:0.5}}>
            📝 NOTE
          </div>
          <div style={{
            fontSize:14, fontWeight:700, color:'#22543D',
            whiteSpace:'pre-wrap', wordBreak:'break-word', lineHeight:1.35,
          }}>
            {note}
          </div>
        </div>
      );
    }

    return (
      <button
        onClick={()=>setEditing(true)}
        style={{
          marginTop:8, fontSize:11, fontWeight:600,
          padding:'5px 8px', borderRadius:6,
          border:'1px dashed #CBD5E0', background:'#F7FAFC', color:'#718096',
          cursor:'pointer',
        }}
      >📝 Add description</button>
    );
  }

  /* ─── Login screen ──────────────────────────────────────────── */
  function LoginScreen({ onLoggedIn }) {
    const [val, setVal]   = useState('');
    const [err, setErr]   = useState('');
    const [busy, setBusy] = useState(false);
    const [apk, setApk]   = useState(null);
    const ref = useRef(null);
    const lastTriedRef = useRef('');

    useEffect(() => {
      if (ref.current) setTimeout(() => ref.current.focus(), 50);
      fetch('/api/apk/info').then(r => r.json()).then(setApk).catch(()=>{});
    }, []);

    const doLogin = async (password, { silent = false } = {}) => {
      if (busy) return { ok: false };
      setBusy(true);
      if (!silent) setErr('');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (!silent) {
            setErr(data.error || 'Incorrect password');
            setVal('');
            ref.current && ref.current.focus();
          }
          setBusy(false);
          return { ok: false };
        }
        setToken(data.token, data.expiresAt);
        onLoggedIn(data);
        return { ok: true };
      } catch {
        if (!silent) setErr('Network error');
        setBusy(false);
        return { ok: false };
      }
    };

    const submit = async (e) => {
      if (e) e.preventDefault();
      if (!val || busy) return;
      await doLogin(val);
    };

    // Auto-submit silently on each keystroke (debounced) once ≥4 digits.
    // If correct → unlock. If wrong → stay quiet, let user keep typing or press Unlock.
    useEffect(() => {
      if (busy) return;
      if (val.length < 4) return;
      if (val === lastTriedRef.current) return;
      const tryPw = val;
      lastTriedRef.current = tryPw;
      const t = setTimeout(() => { doLogin(tryPw, { silent: true }); }, 180);
      return () => clearTimeout(t);
    }, [val, busy]);

    return (
      <div style={{
        minHeight:'100vh', background:'#0F2A35',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:'24px',
      }}>
        <div style={{
          background:'#FFF', borderRadius:16, padding:28, maxWidth:360, width:'100%',
          boxShadow:'0 12px 40px rgba(0,0,0,0.45)',
        }}>
          <div style={{fontSize:48, textAlign:'center', marginBottom:6}}>🔒</div>
          <div style={{
            textAlign:'center', fontSize:15, fontWeight:700, color:'#2D3748', marginBottom:6,
          }}>Enter Password</div>
          <div style={{
            textAlign:'center', fontSize:12, color:'#718096', marginBottom:18,
          }}>This portal is private.</div>

          {/* Form with autoComplete off + hidden decoy to stop browser suggestions */}
          <form onSubmit={submit} autoComplete="off">
            <input type="text" name="username" autoComplete="username"
              style={{display:'none'}} tabIndex={-1} aria-hidden="true" readOnly />
            <input
              ref={ref}
              type="password"
              inputMode="numeric"
              pattern="[0-9]*"
              maxLength={12}
              autoComplete="one-time-code"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck={false}
              name="bm-otp"
              data-lpignore="true"
              data-1p-ignore="true"
              data-form-type="other"
              value={val}
              disabled={busy}
              onChange={e => { setVal(e.target.value.replace(/\D/g,'').slice(0,12)); setErr(''); }}
              placeholder="• • • •"
              style={{
                width:'100%', height:56, fontSize:26, textAlign:'center', letterSpacing:'0.5em',
                padding:'0 16px', borderRadius:12,
                border:`1.5px solid ${err ? '#E53E3E' : '#E2E8F0'}`,
                background:'#F7FAFC', boxSizing:'border-box', color:'#2D3748',
              }}
            />
            {err && (
              <div style={{fontSize:12, color:'#E53E3E', marginTop:8, textAlign:'center'}}>{err}</div>
            )}
            <button
              type="submit"
              disabled={busy || val.length < 4}
              style={{
                marginTop:14, width:'100%', height:48, borderRadius:12, border:'none',
                background: (busy || val.length<4) ? '#A0AEC0' : '#4A90A4',
                color:'#FFF', fontWeight:700, fontSize:15,
                cursor: (busy || val.length<4) ? 'not-allowed' : 'pointer',
              }}
            >{busy ? 'Verifying…' : 'Unlock'}</button>
          </form>
        </div>

        {/* Download APK — does NOT require authentication */}
        {apk?.available && (
          <a href="/api/apk/download" style={{
            marginTop:18, display:'inline-flex', alignItems:'center', gap:8,
            padding:'10px 18px', borderRadius:10,
            background:'#38A169', color:'#FFF', fontSize:13, fontWeight:600,
            textDecoration:'none', boxShadow:'0 2px 10px rgba(0,0,0,0.25)',
          }}>⬇ Get Android App</a>
        )}
      </div>
    );
  }

  /* ─── Auto-Record supervisor (multi-device) ───────────────────
     Lists every known device. The user picks any subset, sets a duration
     (chunk length the server will use for each restart), then taps Start.
     The server runs the supervisor — checks every ~3s and (re)starts a
     recording on any selected, online, idle device. Stop applies only to
     the current selection (or to all jobs if nothing is selected). */
  function AutoRecordCard({ devices, autoRecord, customDurations = [], onToast, onRefresh }) {
    const devList = useMemo(() => Object.values(devices || {}), [devices]);
    const jobs = autoRecord?.jobs || {};

    // Local selection — defaults to all currently-supervised devices so the
    // user can quickly Stop them without manually re-checking each row.
    const [selected, setSelected] = useState(() => new Set(Object.keys(jobs)));
    useEffect(() => { setSelected(new Set(Object.keys(jobs))); /* eslint-disable-line */ }, [Object.keys(jobs).join('|')]);

    // Duration the supervisor will request on each (re)start.
    const [durSec, setDurSec] = useState(() => {
      const first = Object.values(jobs)[0];
      return first?.durationSeconds || 300;
    });
    const [busy, setBusy] = useState(false);

    // Build the duration option list from presets + user-added custom durations.
    const durationOpts = useMemo(() => {
      const seen = new Set();
      const all = [];
      [...DURATIONS.map(d => d.value), ...customDurations].forEach(v => {
        if (Number.isFinite(v) && v >= 15 && !seen.has(v)) { seen.add(v); all.push(v); }
      });
      return all.sort((a,b)=>a-b).map(v => ({ value:v, label: formatDurationLabel(v) }));
    }, [customDurations]);

    const toggle = (id) => {
      setSelected(prev => {
        const n = new Set(prev);
        if (n.has(id)) n.delete(id); else n.add(id);
        return n;
      });
    };
    const selectAll  = () => setSelected(new Set(devList.map(d => d.deviceId)));
    const selectNone = () => setSelected(new Set());

    const start = async () => {
      const ids = Array.from(selected);
      if (ids.length === 0) { onToast('Pick at least one device', 'warn'); return; }
      setBusy(true);
      try {
        const r = await fetch('/api/auto-record/start', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ deviceIds: ids, durationSeconds: durSec }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { onToast(d.error || 'Failed to start auto-record', 'error'); setBusy(false); return; }
        onToast(
          `Auto-record on for ${ids.length} device${ids.length===1?'':'s'} · ${formatDurationLabel(durSec)} chunks`,
          'info'
        );
        onRefresh && onRefresh();
      } catch { onToast('Network error', 'error'); }
      setBusy(false);
    };

    const stop = async ({ all = false } = {}) => {
      const ids = all ? [] : Array.from(selected);
      if (!all && ids.length === 0) { onToast('Pick devices to stop, or use Stop All', 'warn'); return; }
      setBusy(true);
      try {
        const r = await fetch('/api/auto-record/stop', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ deviceIds: ids }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { onToast(d.error || 'Failed to stop', 'error'); setBusy(false); return; }
        onToast(`Stopped ${d.removed} auto-record job${d.removed===1?'':'s'}`, 'info');
        onRefresh && onRefresh();
      } catch { onToast('Network error', 'error'); }
      setBusy(false);
    };

    // Per-device status pill — color matches what's actually happening on the device.
    const renderStatus = (devId) => {
      const j = jobs[devId];
      if (!j) return <span style={{fontSize:10, color:'#A0AEC0'}}>off</span>;
      const dev = devices[devId];
      let text = 'queued', bg = '#EDF2F7', fg = '#4A5568';
      if (dev?.isRecording)        { text = '● recording', bg = '#FED7D7', fg = '#C53030'; }
      else if (!dev?.isOnline)     { text = '⏸ waiting (offline)', bg = '#FEFCBF', fg = '#975A16'; }
      else                          { text = '◌ ready', bg = '#C6F6D5', fg = '#22543D'; }
      return (
        <span style={{
          fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:10,
          background: bg, color: fg, whiteSpace:'nowrap',
        }}>{text}</span>
      );
    };

    return (
      <div style={{
        background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
        boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
      }}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6, gap:10, flexWrap:'wrap'}}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748'}}>
            ♾ Auto-Record (Always On)
          </div>
          {Object.keys(jobs).length > 0 && (
            <span style={{
              fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:10,
              background:'#C6F6D5', color:'#22543D',
            }}>● {Object.keys(jobs).length} active</span>
          )}
        </div>
        <div style={{fontSize:12, color:'#718096', marginBottom:14, lineHeight:1.45}}>
          Pick devices and start. While enabled, the server keeps each device recording —
          if the device is offline it waits, if it goes idle it auto-restarts. Survives server
          restarts. Stop any time.
        </div>

        {devList.length === 0 ? (
          <div style={{fontSize:13, color:'#A0AEC0', textAlign:'center', padding:'18px 0'}}>
            No devices known yet. Connect a device first.
          </div>
        ) : (
          <>
            {/* Quick selection helpers */}
            <div style={{display:'flex', gap:8, marginBottom:8, fontSize:11}}>
              <button onClick={selectAll}  style={quickBtn}>Select all</button>
              <button onClick={selectNone} style={quickBtn}>Clear</button>
              <span style={{marginLeft:'auto', alignSelf:'center', color:'#A0AEC0'}}>
                {selected.size}/{devList.length} selected
              </span>
            </div>

            {/* Device list — tap a row to toggle selection */}
            <div style={{
              border:'1px solid #E2E8F0', borderRadius:10, overflow:'hidden', marginBottom:14,
            }}>
              {devList.map((d, i) => {
                const checked = selected.has(d.deviceId);
                const job = jobs[d.deviceId];
                return (
                  <label
                    key={d.deviceId}
                    style={{
                      display:'flex', alignItems:'center', gap:10,
                      padding:'10px 12px', cursor:'pointer',
                      background: checked ? '#EBF8FF' : '#FFF',
                      borderTop: i === 0 ? 'none' : '1px solid #EDF2F7',
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={checked}
                      onChange={() => toggle(d.deviceId)}
                      style={{width:18, height:18, cursor:'pointer', flexShrink:0, accentColor:'#4A90A4'}}
                    />
                    <Dot online={d.isOnline} recording={d.isRecording} />
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{
                        fontSize:13, fontWeight:600, color:'#2D3748',
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                      }}>{d.deviceName || d.deviceId}</div>
                      <div style={{fontSize:10, color:'#A0AEC0', marginTop:1}}>
                        {d.isOnline ? 'online' : 'offline'}{d.isRecording ? ' · recording' : ''}
                        {job ? ` · ${formatDurationLabel(job.durationSeconds)} chunks` : ''}
                      </div>
                    </div>
                    {renderStatus(d.deviceId)}
                  </label>
                );
              })}
            </div>

            {/* Duration picker for the supervisor */}
            <div style={{fontSize:12, color:'#718096', marginBottom:4}}>
              Recording chunk length (server restarts on this cycle)
            </div>
            <select
              value={durSec}
              onChange={e => setDurSec(Number(e.target.value))}
              style={{
                width:'100%', height:44, fontSize:14, fontWeight:600,
                padding:'0 12px', borderRadius:10, border:'1.5px solid #E2E8F0',
                background:'#F7FAFC', color:'#2D3748', boxSizing:'border-box',
                marginBottom:12, WebkitAppearance:'none',
              }}
            >
              {durationOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>

            {/* Start / Stop / Stop all */}
            <div style={{display:'flex', gap:8}}>
              <button onClick={start} disabled={busy || selected.size===0} style={{
                flex:'2 1 0', height:44, borderRadius:10, border:'none',
                background: (busy || selected.size===0) ? '#A0AEC0' : '#38A169',
                color:'#FFF', fontWeight:700, fontSize:14,
                cursor: (busy || selected.size===0) ? 'not-allowed' : 'pointer',
              }}>▶ Start ({selected.size})</button>
              <button onClick={()=>stop({ all:false })} disabled={busy || selected.size===0} style={{
                flex:'1 1 0', height:44, borderRadius:10, border:'1.5px solid #E53E3E',
                background:'#FFF', color:'#E53E3E', fontWeight:700, fontSize:14,
                cursor:(busy || selected.size===0) ? 'not-allowed' : 'pointer',
                opacity: (busy || selected.size===0) ? 0.5 : 1,
              }}>■ Stop</button>
              {Object.keys(jobs).length > 0 && (
                <button onClick={()=>stop({ all:true })} disabled={busy} style={{
                  flex:'1 1 0', height:44, borderRadius:10, border:'none',
                  background:'#E53E3E', color:'#FFF', fontWeight:700, fontSize:13,
                  cursor: busy ? 'not-allowed' : 'pointer',
                }}>Stop all</button>
              )}
            </div>
          </>
        )}
      </div>
    );
  }
  const quickBtn = {
    padding:'5px 10px', borderRadius:7, border:'1px solid #E2E8F0',
    background:'#F7FAFC', color:'#4A5568', fontWeight:700, cursor:'pointer',
  };

  /* ─── Auto-Screenshot supervisor (multi-device, custom interval) ──
     Same shape as AutoRecordCard but the user picks an INTERVAL (how often
     to snap), not a duration. The server fires `take_screenshot` every
     `intervalMs` to each enabled, online device — forever, until stopped.
     Interval can be entered in seconds OR minutes via a unit toggle, plus
     quick-pick chips for common values. Custom input uses the Android
     numeric keyboard (type=number + inputMode=numeric + pattern=\d*). */
  const SHOT_PRESETS_SEC = [5, 10, 15, 30];
  const SHOT_PRESETS_MIN = [1, 2, 5, 10, 30];

  function AutoShotCard({ devices, autoShot, onToast, onRefresh }) {
    const devList = useMemo(() => Object.values(devices || {}), [devices]);
    const jobs = autoShot?.jobs || {};

    const [selected, setSelected] = useState(() => new Set(Object.keys(jobs)));
    useEffect(() => { setSelected(new Set(Object.keys(jobs))); /* eslint-disable-line */ }, [Object.keys(jobs).join('|')]);

    // Unit + numeric value. Default 5 seconds.
    // If something is already enabled, mirror its interval back into the picker.
    const initial = (() => {
      const first = Object.values(jobs)[0];
      const ms = first?.intervalMs || 5000;
      if (ms % 60000 === 0 && ms >= 60000) return { unit:'min', value: ms / 60000 };
      return { unit:'sec', value: Math.max(2, Math.round(ms / 1000)) };
    })();
    const [unit,  setUnit]  = useState(initial.unit);  // 'sec' | 'min'
    const [value, setValue] = useState(String(initial.value));
    const [busy,  setBusy]  = useState(false);

    const numValue = parseInt(value, 10);
    const intervalMs = (Number.isFinite(numValue) && numValue > 0)
      ? numValue * (unit === 'min' ? 60000 : 1000)
      : 0;
    const valid = intervalMs >= 2000;

    const toggle = (id) => setSelected(p => {
      const n = new Set(p);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
    const selectAll  = () => setSelected(new Set(devList.map(d => d.deviceId)));
    const selectNone = () => setSelected(new Set());

    const start = async () => {
      const ids = Array.from(selected);
      if (ids.length === 0) { onToast('Pick at least one device', 'warn'); return; }
      if (!valid)            { onToast('Minimum interval is 2 seconds', 'warn'); return; }
      setBusy(true);
      try {
        const r = await fetch('/api/auto-screenshot/start', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ deviceIds: ids, intervalMs }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { onToast(d.error || 'Failed to start auto-screenshot', 'error'); setBusy(false); return; }
        onToast(
          `Auto-screenshot on for ${ids.length} device${ids.length===1?'':'s'} · every ${value} ${unit}`,
          'info'
        );
        onRefresh && onRefresh();
      } catch { onToast('Network error', 'error'); }
      setBusy(false);
    };

    const stop = async ({ all = false } = {}) => {
      const ids = all ? [] : Array.from(selected);
      if (!all && ids.length === 0) { onToast('Pick devices to stop, or use Stop All', 'warn'); return; }
      setBusy(true);
      try {
        const r = await fetch('/api/auto-screenshot/stop', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ deviceIds: ids }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { onToast(d.error || 'Failed to stop', 'error'); setBusy(false); return; }
        onToast(`Stopped ${d.removed} auto-screenshot job${d.removed===1?'':'s'}`, 'info');
        onRefresh && onRefresh();
      } catch { onToast('Network error', 'error'); }
      setBusy(false);
    };

    const fmtInterval = (ms) => {
      if (ms >= 60000 && ms % 60000 === 0) return `${ms/60000} min`;
      if (ms >= 60000) return `${(ms/60000).toFixed(1)} min`;
      return `${(ms/1000).toFixed(0)} sec`;
    };

    const renderStatus = (devId) => {
      const j = jobs[devId];
      if (!j) return <span style={{fontSize:10, color:'#A0AEC0'}}>off</span>;
      const dev = devices[devId];
      let text = '◌ scheduled', bg = '#C6F6D5', fg = '#22543D';
      if (!dev?.isOnline) { text = '⏸ waiting (offline)'; bg = '#FEFCBF'; fg = '#975A16'; }
      else if (j.lastStatus === 'fired') { text = `📷 sent ${j.sentCount||0}`; bg = '#E9D8FD'; fg = '#553C9A'; }
      return (
        <span style={{
          fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:10,
          background: bg, color: fg, whiteSpace:'nowrap',
        }}>{text}</span>
      );
    };

    const presets = unit === 'min' ? SHOT_PRESETS_MIN : SHOT_PRESETS_SEC;

    return (
      <div style={{
        background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
        boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
      }}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6, gap:10, flexWrap:'wrap'}}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748'}}>
            📷 Auto-Screenshot (Always On)
          </div>
          {Object.keys(jobs).length > 0 && (
            <span style={{
              fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:10,
              background:'#E9D8FD', color:'#553C9A',
            }}>● {Object.keys(jobs).length} active</span>
          )}
        </div>
        <div style={{fontSize:12, color:'#718096', marginBottom:14, lineHeight:1.45}}>
          Pick devices and an interval. The server snaps a screenshot every interval
          while the device is online — forever, until you stop it. Survives restarts.
        </div>

        {devList.length === 0 ? (
          <div style={{fontSize:13, color:'#A0AEC0', textAlign:'center', padding:'18px 0'}}>
            No devices known yet. Connect a device first.
          </div>
        ) : (
          <>
            {/* Quick selection */}
            <div style={{display:'flex', gap:8, marginBottom:8, fontSize:11}}>
              <button onClick={selectAll}  style={quickBtn}>Select all</button>
              <button onClick={selectNone} style={quickBtn}>Clear</button>
              <span style={{marginLeft:'auto', alignSelf:'center', color:'#A0AEC0'}}>
                {selected.size}/{devList.length} selected
              </span>
            </div>

            {/* Device list */}
            <div style={{
              border:'1px solid #E2E8F0', borderRadius:10, overflow:'hidden', marginBottom:14,
            }}>
              {devList.map((d, i) => {
                const checked = selected.has(d.deviceId);
                const job = jobs[d.deviceId];
                return (
                  <label
                    key={d.deviceId}
                    style={{
                      display:'flex', alignItems:'center', gap:10,
                      padding:'10px 12px', cursor:'pointer', boxSizing:'border-box',
                      background: checked ? '#FAF5FF' : '#FFF',
                      borderTop: i === 0 ? 'none' : '1px solid #EDF2F7',
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={checked}
                      onChange={() => toggle(d.deviceId)}
                      style={{width:18, height:18, cursor:'pointer', flexShrink:0, accentColor:'#7B68AE'}}
                    />
                    <Dot online={d.isOnline} recording={d.isRecording} />
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{
                        fontSize:13, fontWeight:600, color:'#2D3748',
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                      }}>{d.deviceName || d.deviceId}</div>
                      <div style={{fontSize:10, color:'#A0AEC0', marginTop:1}}>
                        {d.isOnline ? 'online' : 'offline'}
                        {job ? ` · every ${fmtInterval(job.intervalMs)}` : ''}
                      </div>
                    </div>
                    {renderStatus(d.deviceId)}
                  </label>
                );
              })}
            </div>

            {/* Unit toggle */}
            <div style={{fontSize:12, color:'#718096', marginBottom:6}}>
              Take a screenshot every…
            </div>
            <div style={{display:'flex', gap:6, marginBottom:8}}>
              <button
                onClick={()=>setUnit('sec')}
                style={{
                  flex:1, height:38, borderRadius:9, fontSize:13, fontWeight:700, cursor:'pointer',
                  border: `1.5px solid ${unit==='sec' ? '#7B68AE' : '#E2E8F0'}`,
                  background: unit==='sec' ? '#7B68AE' : '#F7FAFC',
                  color: unit==='sec' ? '#FFF' : '#4A5568',
                }}
              >Seconds</button>
              <button
                onClick={()=>setUnit('min')}
                style={{
                  flex:1, height:38, borderRadius:9, fontSize:13, fontWeight:700, cursor:'pointer',
                  border: `1.5px solid ${unit==='min' ? '#7B68AE' : '#E2E8F0'}`,
                  background: unit==='min' ? '#7B68AE' : '#F7FAFC',
                  color: unit==='min' ? '#FFF' : '#4A5568',
                }}
              >Minutes</button>
            </div>

            {/* Quick-pick chips for the active unit */}
            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:10}}>
              {presets.map(v => {
                const active = String(v) === value;
                return (
                  <button
                    key={v}
                    onClick={()=>setValue(String(v))}
                    style={{
                      flex:'1 1 calc(20% - 6px)', minWidth:54,
                      height:38, borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer',
                      border: `1.5px solid ${active ? '#7B68AE' : '#E2E8F0'}`,
                      background: active ? '#7B68AE' : '#F7FAFC',
                      color: active ? '#FFF' : '#2D3748',
                    }}
                  >{v}{unit==='sec'?'s':'m'}</button>
                );
              })}
            </div>

            {/* Custom value — Android numeric keypad */}
            <div style={{fontSize:11, fontWeight:700, color:'#A0AEC0', marginBottom:6, letterSpacing:0.4}}>
              OR ENTER CUSTOM ({unit === 'sec' ? 'seconds' : 'minutes'})
            </div>
            <input
              type="number"
              inputMode="numeric"
              pattern="\d*"
              min="1"
              step="1"
              autoComplete="off"
              value={value}
              placeholder={unit === 'sec' ? 'e.g. 7' : 'e.g. 3'}
              onChange={e => setValue(e.target.value.replace(/\D/g, '').slice(0, 5))}
              style={{
                width:'100%', height:46, fontSize:16, fontWeight:600, textAlign:'center',
                padding:'0 12px', borderRadius:10, boxSizing:'border-box',
                border:'1.5px solid #E2E8F0', background:'#F7FAFC', color:'#2D3748',
                outline:'none', marginBottom:10,
              }}
            />

            {/* Live summary */}
            <div style={{
              padding:'8px 12px', borderRadius:8, marginBottom:12,
              background: valid ? '#FAF5FF' : '#FFF5F5',

            </div>

            {/* Start / Stop / Stop all */}
            <div style={{display:'flex', gap:8}}>

  /* ─── Settings screen ───────────────────────────────────────── */
  function SettingsScreen({ authCfg, onUpdated, onToast, onLogout, customDurations = [], onCustomDurationsChange, devices = {}, autoRecord = { jobs: {} }, onAutoRecordRefresh, autoShot = { jobs: {} }, onAutoShotRefresh }) {
    const [newDurMin, setNewDurMin] = useState('');
    const [newDurSec, setNewDurSec] = useState('');
    const presetVals = new Set(DURATIONS.map(d => d.value));
    const addCustomDuration = () => {
      const m = parseInt(newDurMin || '0', 10) || 0;
      const s = parseInt(newDurSec || '0', 10) || 0;
      const total = m * 60 + s;
      if (total <= 0) { onToast('Enter a duration > 0', 'error'); return; }
      if (presetVals.has(total)) { onToast('Already a preset', 'warn'); return; }
      if (customDurations.includes(total)) { onToast('Already added', 'warn'); return; }
      onCustomDurationsChange([...customDurations, total].sort((a,b)=>a-b));
      setNewDurMin(''); setNewDurSec('');
      onToast('Duration added', 'info');
    };
    const removeCustomDuration = (v) => {
      onCustomDurationsChange(customDurations.filter(x => x !== v));
    };
    const [cur, setCur]   = useState('');
    const [n1, setN1]     = useState('');
    const [n2, setN2]     = useState('');
    const [pwBusy, setPwBusy] = useState(false);
    const [pwErr, setPwErr]   = useState('');
    const [pwOk, setPwOk]     = useState('');

    const [timeoutMin, setTimeoutMin] = useState(authCfg.sessionTimeoutMinutes);
    const [enabled, setEnabled]       = useState(authCfg.enabled);
    const [reqDel, setReqDel]         = useState(authCfg.requireDeletePassword !== false);
    const [lockDel, setLockDel]       = useState(!!authCfg.lockDelete);
    const [cfgBusy, setCfgBusy]       = useState(false);
    const [delBusy, setDelBusy]       = useState(false);

    useEffect(() => {
      setTimeoutMin(authCfg.sessionTimeoutMinutes);
      setEnabled(authCfg.enabled);
      setReqDel(authCfg.requireDeletePassword !== false);
      setLockDel(!!authCfg.lockDelete);
    }, [authCfg]);

    const changePassword = async () => {
      setPwErr(''); setPwOk('');
      if (n1 !== n2) { setPwErr('New passwords do not match'); return; }
      if (!/^\d{4,12}$/.test(n1)) { setPwErr('New password must be 4–12 digits'); return; }
      setPwBusy(true);
      try {
        const res = await fetch('/api/auth/change-password', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ current: cur, next: n1 }),
        });
        const data = await res.json();
        if (!res.ok) { setPwErr(data.error || 'Failed'); setPwBusy(false); return; }
        setPwOk('Password changed — please sign in again');
        setPwBusy(false);
        setCur(''); setN1(''); setN2('');
        setTimeout(onLogout, 1200);
      } catch { setPwErr('Network error'); setPwBusy(false); }
    };

    const saveCfg = async () => {
      setCfgBusy(true);
      try {
        const res = await fetch('/api/auth/settings', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ sessionTimeoutMinutes: Number(timeoutMin), enabled }),
        });
        const data = await res.json();
        if (!res.ok) { onToast(data.error || 'Failed', 'error'); setCfgBusy(false); return; }
        onToast('Settings updated', 'info');
        onUpdated(data);
      } catch { onToast('Network error', 'error'); }
      setCfgBusy(false);
    };

    const saveDel = async (next) => {
      setDelBusy(true);
      try {
        const res = await fetch('/api/auth/settings', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(next),
        });
        const data = await res.json();
        if (!res.ok) { onToast(data.error || 'Failed', 'error'); setDelBusy(false); return; }

        <div style={{

          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:14}}>
            ⏱ Session Settings

          </label>

          <input

          <button onClick={saveCfg} disabled={cfgBusy} style={{

          }}>{cfgBusy ? 'Saving…' : 'Save settings'}</button>
        </div>

        <div style={{
          background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
          boxShadow:'0 1px 6px rgba(0,0,0,0.07)',

          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:6}}>
            ⏲ Custom Recording Durations

          <div style={{fontSize:12, color:'#718096', marginBottom:12}}>
            Add extra duration values to the Record dropdown. Presets are not changed.
          </div>
          <div style={{display:'flex', gap:8, marginBottom:8, width:'100%'}}>
            <input
              type="number" min="0" step="1" inputMode="numeric"
              placeholder="Min"
              value={newDurMin}

              style={{flex:1, minWidth:0, height:44, fontSize:14, padding:'0 10px', borderRadius:10, border:'1.5px solid #E2E8F0', background:'#F7FAFC', boxSizing:'border-box', color:'#2D3748'}}

            background:'#FFF', color:'#E53E3E', fontWeight:700, fontSize:14, cursor:'pointer',
          }}>🚪 Sign out</button>
        </div>
      </div>
    );

  /* ─── Root gate: login vs app ──────────────────────────────── */
  function Root() {
    const [status, setStatus] = useState(null); // { enabled, authenticated, sessionTimeoutMinutes }
    const [expiresAt, setExpiresAt] = useState(getTokenExpiry());
    const expiryTimerRef = useRef(null);

    const refreshStatus = useCallback(async () => {
      try {
        const r = await fetch('/api/auth/status');
        const s = await r.json();
        setStatus(s);
        if (s.enabled && s.authenticated && s.expiresAt) {
          sessionStorage.setItem(AUTH_EXP_KEY, String(s.expiresAt));
          setExpiresAt(s.expiresAt);
        }
      } catch {
        setStatus({ enabled: true, authenticated: false, sessionTimeoutMinutes: 5 });
      }
    }, []);

    useEffect(() => { refreshStatus(); }, [refreshStatus]);

    // Auto-logout on session expiry
    useEffect(() => {
      if (expiryTimerRef.current) { clearTimeout(expiryTimerRef.current); expiryTimerRef.current = null; }
      if (!status || !status.enabled || !status.authenticated) return;
      const exp = expiresAt || getTokenExpiry();
      if (!exp) return;
      const ms = exp - Date.now();
      if (ms <= 0) { handleExpire(); return; }
      expiryTimerRef.current = setTimeout(handleExpire, ms);
      return () => { if (expiryTimerRef.current) clearTimeout(expiryTimerRef.current); };
    }, [status, expiresAt]);

    const handleExpire = useCallback(() => {
      setToken(null, null);
      setExpiresAt(0);
      setStatus(s => s ? { ...s, authenticated: false } : s);
    }, []);

    useEffect(() => {
      const onExpired = () => handleExpire();
      window.addEventListener('bm-auth-expired', onExpired);
      return () => window.removeEventListener('bm-auth-expired', onExpired);
    }, [handleExpire]);

    const onLoggedIn = (data) => {
      setExpiresAt(data.expiresAt);
      setStatus(s => ({
        ...(s || {}),
        enabled: true,
        authenticated: true,
        sessionTimeoutMinutes: data.sessionTimeoutMinutes || (s && s.sessionTimeoutMinutes) || 5,
        expiresAt: data.expiresAt,
        extended: false,
      }));
      // Re-sync full settings (requireDeletePassword / lockDelete) after login
      fetch('/api/auth/status').then(r => r.json()).then(s => {
        setStatus(p => ({ ...(p || {}), ...s }));
      }).catch(()=>{});
    };

    const onLogout = useCallback(async () => {
      try { await fetch('/api/auth/logout', { method:'POST' }); } catch {}
      handleExpire();
    }, [handleExpire]);

    const onExtended = useCallback((data) => {
      if (!data || !data.expiresAt) return;
      sessionStorage.setItem(AUTH_EXP_KEY, String(data.expiresAt));
      setExpiresAt(data.expiresAt);
      setStatus(p => p ? { ...p, extended: true, expiresAt: data.expiresAt } : p);
    }, []);

    if (!status) {
      return (
        <div style={{
          minHeight:'100vh', background:'#0F2A35', color:'#FFF',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:14,
        }}>Loading…</div>
      );
    }

    if (status.enabled && !status.authenticated) {
      return <LoginScreen onLoggedIn={onLoggedIn} />;
    }

    return (
      <App
        authStatus={status}
        onAuthUpdated={(s) => setStatus(p => ({ ...p, ...s }))}
        onLogout={onLogout}
        onExtended={onExtended}
      />
    );
  }

  /* ─── Main App ──────────────────────────────────────────────── */
  function App({ authStatus, onAuthUpdated, onLogout, onExtended }) {
    const [devices,         setDevices]         = useState({});
    const [recordings,      setRecordings]      = useState({});
    const [screenshots,     setScreenshots]     = useState({});
    const [gallery,         setGallery]         = useState({});
    const [galleryStats,    setGalleryStats]    = useState({});
    const [galleryMeta,     setGalleryMeta]     = useState({});
    const [galleryProgress, setGalleryProgress] = useState({});
    const [ssStatus,        setSsStatus]        = useState({});
    const [bursts,          setBursts]          = useState({});
    const [burstTick,       setBurstTick]       = useState(0);
    const [timers,          setTimers]          = useState({});

    const [customDurations, setCustomDurations] = useState([]);

    }, []);
    const mergedDurations = React.useMemo(() => {
