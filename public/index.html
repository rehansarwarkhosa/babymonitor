  /* ─── Advanced Audio Player ─────────────────────────────────── */
  function AudioPlayer({ src, autoPlay }) {
    const audioRef   = useRef(null);
    const seekingRef = useRef(false);
    const [playing,     setPlaying]     = useState(false);
    const [duration,    setDuration]    = useState(0);
    const [currentTime, setCurrentTime] = useState(0);
    const [rate,        setRate]        = useState(1);
    const [buffered,    setBuffered]    = useState(0);
    const [muted,       setMuted]       = useState(false);

    useEffect(() => {
      const a = audioRef.current; if (!a) return;
      const onLoaded = () => setDuration(isFinite(a.duration) ? a.duration : 0);
      const onTime   = () => { if (!seekingRef.current) setCurrentTime(a.currentTime || 0); };
      const onPlay   = () => setPlaying(true);
      const onPause  = () => setPlaying(false);
      const onEnded  = () => setPlaying(false);
      const onProg   = () => {
        try {
          if (a.buffered.length > 0) setBuffered(a.buffered.end(a.buffered.length - 1));
        } catch {}
      };
      a.addEventListener('loadedmetadata', onLoaded);
      a.addEventListener('durationchange', onLoaded);
      a.addEventListener('timeupdate', onTime);
      a.addEventListener('play', onPlay);
      a.addEventListener('pause', onPause);
      a.addEventListener('ended', onEnded);
      a.addEventListener('progress', onProg);
      a.playbackRate = rate;
      return () => {
        a.removeEventListener('loadedmetadata', onLoaded);
        a.removeEventListener('durationchange', onLoaded);
        a.removeEventListener('timeupdate', onTime);
        a.removeEventListener('play', onPlay);
        a.removeEventListener('pause', onPause);
        a.removeEventListener('ended', onEnded);
        a.removeEventListener('progress', onProg);
      };
    }, []);

    useEffect(() => {
      const a = audioRef.current; if (a) a.playbackRate = rate;
    }, [rate]);

    useEffect(() => {
      const a = audioRef.current; if (a) a.muted = muted;
    }, [muted]);

    const togglePlay = () => {
      const a = audioRef.current; if (!a) return;
      if (a.paused) a.play().catch(()=>{}); else a.pause();
    };

    const skip = (delta) => {
      const a = audioRef.current; if (!a) return;
      const t = Math.max(0, Math.min(duration || 0, (a.currentTime || 0) + delta));
      a.currentTime = t;
      setCurrentTime(t);
    };

    const onSeekChange = (e) => {
      const t = Number(e.target.value);
      seekingRef.current = true;
      setCurrentTime(t);
      const a = audioRef.current;
      if (a) a.currentTime = t;
    };
    const endSeek = () => { seekingRef.current = false; };

    const fmt = (s) => {
      if (!isFinite(s) || s < 0) s = 0;
      const m = Math.floor(s / 60);
      const ss = Math.floor(s % 60);
      return `${m}:${String(ss).padStart(2,'0')}`;
    };

    const dur = duration || 0;
    const pctBuf = dur > 0 ? Math.min(100, (buffered / dur) * 100) : 0;
    const pctCur = dur > 0 ? Math.min(100, (currentTime / dur) * 100) : 0;

    return (
      <div style={{
        marginTop:10, padding:'12px 12px 10px',
        background:'#0F2A35', borderRadius:12, color:'#FFF',
        boxShadow:'0 2px 8px rgba(0,0,0,0.18)',
      }}>
        <audio ref={audioRef} src={src} autoPlay={autoPlay} preload="metadata" />

        {/* Seek track */}
        <div style={{position:'relative', height:28, marginBottom:6}}>
          {/* Background */}
          <div style={{
            position:'absolute', left:0, right:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'rgba(255,255,255,0.18)',
          }} />
          {/* Buffered */}
          <div style={{
            position:'absolute', left:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'rgba(255,255,255,0.32)',
            width:`${pctBuf}%`, pointerEvents:'none',
          }} />
          {/* Played */}
          <div style={{
            position:'absolute', left:0, top:'50%', transform:'translateY(-50%)',
            height:8, borderRadius:4, background:'#4A90A4',
            width:`${pctCur}%`, pointerEvents:'none',
          }} />
          {/* Native range — sized to give a big drag target */}
          <input
            type="range"
            min={0}
            max={dur || 0}
            step={0.05}
            value={currentTime}
            onChange={onSeekChange}
            onMouseDown={()=>{ seekingRef.current = true; }}
            onTouchStart={()=>{ seekingRef.current = true; }}
            onMouseUp={endSeek}
            onTouchEnd={endSeek}
            onPointerDown={()=>{ seekingRef.current = true; }}
            onPointerUp={endSeek}
            onPointerCancel={endSeek}
            style={{
              position:'absolute', left:0, right:0, top:0, width:'100%', height:28,
              opacity:0, margin:0, cursor:'pointer', WebkitAppearance:'none', appearance:'none',
            }}
            aria-label="Seek"
          />
          {/* Thumb */}
          <div style={{
            position:'absolute', top:'50%',
            left:`calc(${pctCur}% - 9px)`,
            transform:'translateY(-50%)',
            width:18, height:18, borderRadius:'50%',
            background:'#FFF', boxShadow:'0 1px 3px rgba(0,0,0,0.5)',
            pointerEvents:'none',
          }} />
        </div>

        {/* Time labels */}
        <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'#CBD5E0', marginBottom:8}}>
          <span>{fmt(currentTime)}</span>
          <span>{fmt(dur)}</span>
        </div>

        {/* Controls */}
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <button onClick={()=>skip(-10)} title="Back 10s" style={ctrlBtnStyle}>⏪ 10s</button>
          <button onClick={togglePlay} title={playing?'Pause':'Play'} style={{
            ...ctrlBtnStyle, background:'#4A90A4', minWidth:54,
            color:'#FFF', fontWeight:700, fontSize:16,
          }}>{playing ? '❚❚' : '▶'}</button>
          <button onClick={()=>skip(10)} title="Forward 10s" style={ctrlBtnStyle}>10s ⏩</button>
          <div style={{flex:1}} />
          <button onClick={()=>setMuted(m=>!m)} title={muted?'Unmute':'Mute'} style={ctrlBtnStyle}>
            {muted ? '🔇' : '🔊'}
          </button>
          <select
            value={rate}
            onChange={e=>setRate(Number(e.target.value))}
            style={{
              height:32, padding:'0 6px', fontSize:12, fontWeight:600,
              borderRadius:8, border:'1px solid rgba(255,255,255,0.25)',
              background:'rgba(255,255,255,0.08)', color:'#FFF', cursor:'pointer',
            }}
            title="Playback speed"
          >
            {[0.5, 0.75, 1, 1.25, 1.5, 1.75, 2].map(r => (
              <option key={r} value={r} style={{color:'#000'}}>{r}×</option>
            ))}
          </select>
        </div>

      </div>
    );
  }
  const ctrlBtnStyle = {
    height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:8,
    border:'1px solid rgba(255,255,255,0.25)', background:'rgba(255,255,255,0.08)',
    color:'#FFF', cursor:'pointer',
  };

  /* ─── Note (description) widget ─────────────────────────────── */
  function NoteWidget({ kind, deviceId, filename, note, onSave, compact }) {
    const [editing, setEditing] = useState(false);
    const [val, setVal]         = useState(note || '');
    const [busy, setBusy]       = useState(false);
    useEffect(() => { setVal(note || ''); }, [note]);

    const save = async () => {
      setBusy(true);
      await onSave(kind, deviceId, filename, val.trim());
      setBusy(false);
      setEditing(false);
    };
    const remove = async () => {
      setBusy(true);
      await onSave(kind, deviceId, filename, '');
      setBusy(false);
      setEditing(false);
    };

    if (editing) {
      return (
        <div style={{marginTop:8, padding:8, borderRadius:8, background:'#FFFBEA', border:'1px solid #F6E05E'}}>
          <textarea
            value={val}
            onChange={e=>setVal(e.target.value.slice(0,1000))}
            placeholder="Write a description for this item…"
            rows={compact ? 2 : 3}
            autoFocus
            style={{
              width:'100%', boxSizing:'border-box',
              fontSize:13, fontWeight:600, color:'#2D3748',
              padding:8, borderRadius:6, border:'1px solid #ECC94B',
              background:'#FFFFF0', resize:'vertical', fontFamily:'inherit',
            }}
          />
          <div style={{display:'flex', gap:6, marginTop:6}}>
            <button onClick={save} disabled={busy} style={{
              flex:1, height:32, fontSize:12, fontWeight:700, borderRadius:6,
              border:'none', background: busy?'#A0AEC0':'#38A169', color:'#FFF', cursor:'pointer',
            }}>{busy ? '…' : '💾 Save'}</button>
            <button onClick={()=>{ setVal(note||''); setEditing(false); }} disabled={busy} style={{
              flex:1, height:32, fontSize:12, fontWeight:600, borderRadius:6,
              border:'1px solid #E2E8F0', background:'#FFF', color:'#4A5568', cursor:'pointer',
            }}>Cancel</button>
            {note && (
              <button onClick={remove} disabled={busy} title="Remove description" style={{
                height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:6,
                border:'1px solid #FED7D7', background:'#FFF5F5', color:'#E53E3E', cursor:'pointer',
              }}>🗑</button>
            )}
          </div>
          <div style={{fontSize:10, color:'#A0AEC0', marginTop:4, textAlign:'right'}}>{val.length}/1000</div>
        </div>
      );
    }

    if (note) {
      return (
        <div
          onClick={()=>setEditing(true)}
          title="Tap to edit description"
          style={{
            marginTop:8, padding:'8px 10px', borderRadius:8,
            background:'#FFFBEA', border:'1.5px solid #ECC94B',
            cursor:'pointer',
          }}
        >
          <div style={{fontSize:10, fontWeight:700, color:'#B7791F', marginBottom:3, letterSpacing:0.5}}>
            📝 NOTE
          </div>
          <div style={{
            fontSize:14, fontWeight:700, color:'#22543D',
            whiteSpace:'pre-wrap', wordBreak:'break-word', lineHeight:1.35,
          }}>
            {note}
          </div>
        </div>
      );
    }

    return (
      <button
        onClick={()=>setEditing(true)}
        style={{
          marginTop:8, fontSize:11, fontWeight:600,
          padding:'5px 8px', borderRadius:6,
          border:'1px dashed #CBD5E0', background:'#F7FAFC', color:'#718096',
          cursor:'pointer',
        }}
      >📝 Add description</button>
    );
  }

  /* ─── Login screen ──────────────────────────────────────────── */
  function LoginScreen({ onLoggedIn }) {
    const [val, setVal]   = useState('');
    const [err, setErr]   = useState('');
    const [busy, setBusy] = useState(false);
    const [apk, setApk]   = useState(null);
    const ref = useRef(null);

    useEffect(() => {
      if (ref.current) setTimeout(() => ref.current.focus(), 50);
      fetch('/api/apk/info').then(r => r.json()).then(setApk).catch(()=>{});
    }, []);

    const submit = async (e) => {
      if (e) e.preventDefault();
      if (busy) return;
      setBusy(true); setErr('');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: val }),
        });
        const data = await res.json();
        if (!res.ok) {
          setErr(data.error || 'Incorrect password');
          setVal('');
          setBusy(false);
          ref.current && ref.current.focus();
          return;
        }
        setToken(data.token, data.expiresAt);
        onLoggedIn(data);
      } catch (e2) {
        setErr('Network error');
        setBusy(false);
      }
    };

    return (
      <div style={{
        minHeight:'100vh', background:'#0F2A35',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:'24px',
      }}>
        <div style={{
          background:'#FFF', borderRadius:16, padding:28, maxWidth:360, width:'100%',
          boxShadow:'0 12px 40px rgba(0,0,0,0.45)',
        }}>
          <div style={{fontSize:48, textAlign:'center', marginBottom:6}}>🔒</div>
          <div style={{
            textAlign:'center', fontSize:15, fontWeight:700, color:'#2D3748', marginBottom:6,
          }}>Enter Password</div>
          <div style={{
            textAlign:'center', fontSize:12, color:'#718096', marginBottom:18,
          }}>This portal is private.</div>

          {/* Form with autoComplete off + hidden decoy to stop browser suggestions */}
          <form onSubmit={submit} autoComplete="off">
            <input type="text" name="username" autoComplete="username"
              style={{display:'none'}} tabIndex={-1} aria-hidden="true" readOnly />
            <input
              ref={ref}
              type="password"
              inputMode="numeric"
              pattern="[0-9]*"
              maxLength={12}
              autoComplete="one-time-code"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck={false}
              name="bm-otp"
              data-lpignore="true"
              data-1p-ignore="true"
              data-form-type="other"
              value={val}
              disabled={busy}
              onChange={e => { setVal(e.target.value.replace(/\D/g,'').slice(0,12)); setErr(''); }}
              placeholder="• • • •"
              style={{
                width:'100%', height:56, fontSize:26, textAlign:'center', letterSpacing:'0.5em',
                padding:'0 16px', borderRadius:12,
                border:`1.5px solid ${err ? '#E53E3E' : '#E2E8F0'}`,
                background:'#F7FAFC', boxSizing:'border-box', color:'#2D3748',
              }}
            />
            {err && (
              <div style={{fontSize:12, color:'#E53E3E', marginTop:8, textAlign:'center'}}>{err}</div>
            )}
            <button
              type="submit"
              disabled={busy || val.length < 4}
              style={{
                marginTop:14, width:'100%', height:48, borderRadius:12, border:'none',
                background: (busy || val.length<4) ? '#A0AEC0' : '#4A90A4',
                color:'#FFF', fontWeight:700, fontSize:15,
                cursor: (busy || val.length<4) ? 'not-allowed' : 'pointer',
              }}
            >{busy ? 'Verifying…' : 'Unlock'}</button>
          </form>
        </div>

        {/* Download APK — does NOT require authentication */}
        {apk?.available && (
          <a href="/api/apk/download" style={{
            marginTop:18, display:'inline-flex', alignItems:'center', gap:8,
            padding:'10px 18px', borderRadius:10,
            background:'#38A169', color:'#FFF', fontSize:13, fontWeight:600,
            textDecoration:'none', boxShadow:'0 2px 10px rgba(0,0,0,0.25)',
          }}>⬇ Get Android App</a>
        )}
      </div>
    );
  }

  /* ─── Settings screen ───────────────────────────────────────── */
  function SettingsScreen({ authCfg, onUpdated, onToast, onLogout }) {
    const [cur, setCur]   = useState('');
    const [n1, setN1]     = useState('');
    const [n2, setN2]     = useState('');
    const [pwBusy, setPwBusy] = useState(false);
    const [pwErr, setPwErr]   = useState('');
    const [pwOk, setPwOk]     = useState('');

    const [timeoutMin, setTimeoutMin] = useState(authCfg.sessionTimeoutMinutes);
    const [enabled, setEnabled]       = useState(authCfg.enabled);
    const [reqDel, setReqDel]         = useState(authCfg.requireDeletePassword !== false);
    const [lockDel, setLockDel]       = useState(!!authCfg.lockDelete);
    const [cfgBusy, setCfgBusy]       = useState(false);
    const [delBusy, setDelBusy]       = useState(false);

    useEffect(() => {
      setTimeoutMin(authCfg.sessionTimeoutMinutes);
      setEnabled(authCfg.enabled);
      setReqDel(authCfg.requireDeletePassword !== false);
      setLockDel(!!authCfg.lockDelete);
    }, [authCfg]);

    const changePassword = async () => {
      setPwErr(''); setPwOk('');
      if (n1 !== n2) { setPwErr('New passwords do not match'); return; }
      if (!/^\d{4,12}$/.test(n1)) { setPwErr('New password must be 4–12 digits'); return; }
      setPwBusy(true);
      try {
        const res = await fetch('/api/auth/change-password', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ current: cur, next: n1 }),
        });
        const data = await res.json();
        if (!res.ok) { setPwErr(data.error || 'Failed'); setPwBusy(false); return; }
        setPwOk('Password changed — please sign in again');
        setPwBusy(false);
        setCur(''); setN1(''); setN2('');
        setTimeout(onLogout, 1200);
      } catch { setPwErr('Network error'); setPwBusy(false); }
    };

    const saveCfg = async () => {
      setCfgBusy(true);
      try {
        const res = await fetch('/api/auth/settings', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ sessionTimeoutMinutes: Number(timeoutMin), enabled }),
        });
        const data = await res.json();
        if (!res.ok) { onToast(data.error || 'Failed', 'error'); setCfgBusy(false); return; }
        onToast('Settings updated', 'info');
        onUpdated(data);
      } catch { onToast('Network error', 'error'); }
      setCfgBusy(false);
    };

    const saveDel = async (next) => {
      setDelBusy(true);
      try {
        const res = await fetch('/api/auth/settings', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(next),
        });
        const data = await res.json();
        if (!res.ok) { onToast(data.error || 'Failed', 'error'); setDelBusy(false); return; }
        onToast('Delete settings updated', 'info');
        onUpdated(data);
      } catch { onToast('Network error', 'error'); }
      setDelBusy(false);
    };

    const numInput = (value, onChange, placeholder, extra={}) => (
      <input
        type="password" inputMode="numeric" pattern="[0-9]*" maxLength={12}
        autoComplete="one-time-code" autoCorrect="off" autoCapitalize="off" spellCheck={false}
        data-lpignore="true" data-1p-ignore="true"
        value={value}
        onChange={e => onChange(e.target.value.replace(/\D/g,'').slice(0,12))}
        placeholder={placeholder}
        style={{
          width:'100%', height:44, fontSize:16, textAlign:'center', letterSpacing:'0.35em',
          padding:'0 12px', borderRadius:10, border:'1.5px solid #E2E8F0',
          background:'#F7FAFC', boxSizing:'border-box', marginBottom:8, color:'#2D3748',
          ...extra,
        }}
      />
    );

    return (
      <div>
        <div style={{
          background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
          boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        }}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:14}}>
            🔐 Change Password
          </div>
          <form autoComplete="off" onSubmit={e=>{e.preventDefault();changePassword();}}>
            <input type="text" style={{display:'none'}} />
            <div style={{fontSize:12, color:'#718096', marginBottom:4}}>Current password</div>
            {numInput(cur, setCur, '• • • •')}
            <div style={{fontSize:12, color:'#718096', marginBottom:4, marginTop:4}}>New password (4–12 digits)</div>
            {numInput(n1, setN1, '• • • •')}
            <div style={{fontSize:12, color:'#718096', marginBottom:4, marginTop:4}}>Confirm new password</div>
            {numInput(n2, setN2, '• • • •')}
            {pwErr && <div style={{fontSize:12, color:'#E53E3E', marginTop:4}}>{pwErr}</div>}
            {pwOk  && <div style={{fontSize:12, color:'#38A169', marginTop:4}}>{pwOk}</div>}
            <button type="submit" disabled={pwBusy || !cur || !n1 || !n2} style={{
              marginTop:10, width:'100%', height:44, borderRadius:10, border:'none',
              background: (pwBusy || !cur || !n1 || !n2) ? '#A0AEC0' : '#4A90A4',
              color:'#FFF', fontWeight:700, fontSize:14,
              cursor:(pwBusy || !cur || !n1 || !n2) ? 'not-allowed' : 'pointer',
            }}>{pwBusy ? 'Updating…' : 'Update password'}</button>
          </form>
        </div>

        <div style={{
          background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
          boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        }}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:14}}>
            ⏱ Session Settings
          </div>
          <label style={{display:'flex', alignItems:'center', gap:10, marginBottom:14, cursor:'pointer'}}>
            <input
              type="checkbox"
              checked={enabled}
              onChange={e => setEnabled(e.target.checked)}
              style={{width:18, height:18, cursor:'pointer'}}
            />
            <span style={{fontSize:14, color:'#2D3748'}}>Require password to open portal</span>
          </label>
          <div style={{fontSize:12, color:'#718096', marginBottom:4}}>Session timeout (minutes)</div>
          <input
            type="number"
            min="1" max="1440" step="1" inputMode="numeric"
            value={timeoutMin}
            onChange={e => setTimeoutMin(e.target.value)}
            style={{
              width:'100%', height:44, fontSize:15, padding:'0 12px',
              borderRadius:10, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
              boxSizing:'border-box', color:'#2D3748',
            }}
          />
          <div style={{fontSize:11, color:'#A0AEC0', marginTop:6}}>
            After this many minutes of inactivity, you'll need to re-enter the password.
          </div>
          <button onClick={saveCfg} disabled={cfgBusy} style={{
            marginTop:12, width:'100%', height:44, borderRadius:10, border:'none',
            background: cfgBusy ? '#A0AEC0' : '#4A90A4', color:'#FFF',
            fontWeight:700, fontSize:14, cursor: cfgBusy ? 'not-allowed' : 'pointer',
          }}>{cfgBusy ? 'Saving…' : 'Save settings'}</button>
        </div>

        <div style={{
          background:'#FFF', borderRadius:14, padding:20, marginBottom:14,
          boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        }}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:14}}>
            🗑 Delete Protection
          </div>
          <label style={{display:'flex', alignItems:'flex-start', gap:10, marginBottom:12, cursor: delBusy?'wait':'pointer'}}>
            <input
              type="checkbox"
              checked={reqDel}
              disabled={delBusy}
              onChange={e => { const v = e.target.checked; setReqDel(v); saveDel({ requireDeletePassword: v }); }}
              style={{width:18, height:18, cursor: delBusy?'wait':'pointer', marginTop:2}}
            />
            <div>
              <div style={{fontSize:14, color:'#2D3748', fontWeight:600}}>Require password for delete</div>
              <div style={{fontSize:11, color:'#A0AEC0', marginTop:2}}>
                Prompt for the portal password before deleting any recording, screenshot, gallery item, or bulk delete.
              </div>
            </div>
          </label>
          <label style={{display:'flex', alignItems:'flex-start', gap:10, cursor: delBusy?'wait':'pointer'}}>
            <input
              type="checkbox"
              checked={lockDel}
              disabled={delBusy}
              onChange={e => { const v = e.target.checked; setLockDel(v); saveDel({ lockDelete: v }); }}
              style={{width:18, height:18, cursor: delBusy?'wait':'pointer', marginTop:2}}
            />
            <div>
              <div style={{fontSize:14, color:'#2D3748', fontWeight:600}}>Lock delete (disable everywhere)</div>
              <div style={{fontSize:11, color:'#A0AEC0', marginTop:2}}>
                Hides/disables all delete buttons across the portal. Turn this on if you never want to accidentally delete anything.
              </div>
            </div>
          </label>
        </div>

        <div style={{
          background:'#FFF', borderRadius:14, padding:20,
          boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        }}>
          <button onClick={onLogout} style={{
            width:'100%', height:44, borderRadius:10, border:'1.5px solid #E53E3E',
            background:'#FFF', color:'#E53E3E', fontWeight:700, fontSize:14, cursor:'pointer',
          }}>🚪 Sign out</button>
        </div>
      </div>
    );
  }

  /* ─── Root gate: login vs app ──────────────────────────────── */
  function Root() {
    const [status, setStatus] = useState(null); // { enabled, authenticated, sessionTimeoutMinutes }
    const [expiresAt, setExpiresAt] = useState(getTokenExpiry());
    const expiryTimerRef = useRef(null);

    const refreshStatus = useCallback(async () => {
      try {
        const r = await fetch('/api/auth/status');
        const s = await r.json();
        setStatus(s);
        if (s.enabled && s.authenticated && s.expiresAt) {
          sessionStorage.setItem(AUTH_EXP_KEY, String(s.expiresAt));
          setExpiresAt(s.expiresAt);
        }
      } catch {
        setStatus({ enabled: true, authenticated: false, sessionTimeoutMinutes: 5 });
      }
    }, []);

    useEffect(() => { refreshStatus(); }, [refreshStatus]);

    // Auto-logout on session expiry
    useEffect(() => {
      if (expiryTimerRef.current) { clearTimeout(expiryTimerRef.current); expiryTimerRef.current = null; }
      if (!status || !status.enabled || !status.authenticated) return;
      const exp = expiresAt || getTokenExpiry();
      if (!exp) return;
      const ms = exp - Date.now();
      if (ms <= 0) { handleExpire(); return; }
      expiryTimerRef.current = setTimeout(handleExpire, ms);
      return () => { if (expiryTimerRef.current) clearTimeout(expiryTimerRef.current); };
    }, [status, expiresAt]);

    const handleExpire = useCallback(() => {
      setToken(null, null);
      setExpiresAt(0);
      setStatus(s => s ? { ...s, authenticated: false } : s);
    }, []);

    useEffect(() => {
      const onExpired = () => handleExpire();
      window.addEventListener('bm-auth-expired', onExpired);
      return () => window.removeEventListener('bm-auth-expired', onExpired);
    }, [handleExpire]);

    const onLoggedIn = (data) => {
      setExpiresAt(data.expiresAt);
      setStatus(s => ({
        enabled: true,
        authenticated: true,
        sessionTimeoutMinutes: data.sessionTimeoutMinutes || (s && s.sessionTimeoutMinutes) || 5,
      }));
    };

    const onLogout = useCallback(async () => {
      try { await fetch('/api/auth/logout', { method:'POST' }); } catch {}
      handleExpire();
    }, [handleExpire]);

    const onExtended = useCallback((data) => {
      if (!data || !data.expiresAt) return;
      sessionStorage.setItem(AUTH_EXP_KEY, String(data.expiresAt));
      setExpiresAt(data.expiresAt);
      setStatus(p => p ? { ...p, extended: true, expiresAt: data.expiresAt } : p);
    }, []);

    if (!status) {
      return (
        <div style={{
          minHeight:'100vh', background:'#0F2A35', color:'#FFF',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:14,
        }}>Loading…</div>
      );
    }

    if (status.enabled && !status.authenticated) {
      return <LoginScreen onLoggedIn={onLoggedIn} />;
    }

    return (
      <App
        authStatus={status}
        onAuthUpdated={(s) => setStatus(p => ({ ...p, ...s }))}
        onLogout={onLogout}
        onExtended={onExtended}
      />
    );
  }

  /* ─── Main App ──────────────────────────────────────────────── */
  function App({ authStatus, onAuthUpdated, onLogout, onExtended }) {
    const [devices,         setDevices]         = useState({});
    const [recordings,      setRecordings]      = useState({});
    const [screenshots,     setScreenshots]     = useState({});
    const [gallery,         setGallery]         = useState({});
    const [galleryStats,    setGalleryStats]    = useState({});
    const [galleryMeta,     setGalleryMeta]     = useState({});
    const [galleryProgress, setGalleryProgress] = useState({});
    const [ssStatus,        setSsStatus]        = useState({});
    const [timers,          setTimers]          = useState({});
    const [duration,        setDuration]        = useState(60);
    const [tab,             setTab]             = useState(() => {
      try { return localStorage.getItem('bm_tab') || 'devices'; } catch { return 'devices'; }
    });
    useEffect(() => { try { localStorage.setItem('bm_tab', tab); } catch {} }, [tab]);
    const [lightbox,        setLightbox]        = useState(null);
    const [toast,           setToast]           = useState(null);
    const [connected,       setConnected]       = useState(false);
    const [audioTesting,    setAudioTesting]    = useState({});
    const [apkInfo,         setApkInfo]         = useState(null);
    const [apkUploading,    setApkUploading]    = useState(false);
    const [favorites,       setFavorites]       = useState({});
    const fetchFavorites = useCallback(async () => {
      try { setFavorites(await (await fetch('/api/favorites')).json()); } catch {}
    }, []);
    const addFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };
    const removeFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'DELETE', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };

    const [notes, setNotes] = useState({});
    const fetchNotes = useCallback(async () => {
      try { setNotes(await (await fetch('/api/notes')).json()); } catch {}
    }, []);
    const saveNote = async (kind, deviceId, filename, text) => {
      const res = await fetch('/api/notes', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename, note: text }),
      });
      if (res.ok) {
        // Optimistic local update
        setNotes(prev => {
          const next = { ...prev };
          const t = (text || '').trim();
          if (!t) {
            if (next[kind]?.[deviceId]) {
              const dev = { ...next[kind][deviceId] };
              delete dev[filename];
              const k = { ...next[kind], [deviceId]: dev };
              if (!Object.keys(dev).length) delete k[deviceId];
              next[kind] = k;
              if (!Object.keys(next[kind]).length) delete next[kind];
            }
          } else {
            next[kind] = { ...(next[kind] || {}) };
            next[kind][deviceId] = { ...(next[kind][deviceId] || {}), [filename]: t };
          }
          return next;
        });
      }
    };
    const noteFor = (kind, deviceId, filename) => notes[kind]?.[deviceId]?.[filename] || '';
    const [passPrompt, setPassPrompt] = useState(null);
    // Resolves to the verified password string on success, or null on cancel.
    // Truthy-check (`if (await askPassword(...))`) still works for existing callers.
    const askPassword = (opts) => new Promise(resolve => {
      const o = typeof opts === 'string' ? { message: opts } : (opts || {});
      setPassPrompt({
        title: o.title,
        message: o.message,
        confirmLabel: o.confirmLabel,
        confirmColor: o.confirmColor,
        onOk:     (pw) => { setPassPrompt(null); resolve(pw || true); },
        onCancel: ()   => { setPassPrompt(null); resolve(null); },
      });
    });

    // Respect delete policy from auth settings.
    const deletePolicyAsk = async (msg) => {
      if (authStatus?.lockDelete) {
        showToast('Delete is locked in Settings', 'warn');
        return false;
      }
      if (authStatus?.requireDeletePassword) {
        return await askPassword({
          title: '🔒 Confirm delete',
          message: msg,
          confirmLabel: 'Delete',
          confirmColor: '#E53E3E',
        });
      }
      return true;
    };

    const socketRef   = useRef(null);
    const timerRefs   = useRef({});

    const devList     = useMemo(() => Object.values(devices), [devices]);
    const onlineDev   = useMemo(() => devList.filter(d => d.isOnline), [devList]);
    const anyRec      = useMemo(() => devList.some(d => d.isRecording), [devList]);
    const totalRec    = useMemo(() => Object.values(recordings).reduce((s,g)=>s+(g.recordings?.length||0),0), [recordings]);
    const totalShots  = useMemo(() => Object.values(screenshots).reduce((s,g)=>s+(g.screenshots?.length||0),0), [screenshots]);
    const totalGallery = useMemo(() => Object.values(gallery).reduce((s,g)=>s+(g.images?.length||0),0), [gallery]);

    const favSetFor = (kind, deviceId) => new Set(favorites[kind]?.[deviceId] || []);
    const filterGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => !fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };
    const pickFavGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };

    const visibleRec     = useMemo(() => filterGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const visibleShot    = useMemo(() => filterGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const visibleGallery = useMemo(() => filterGroup('gallery',     gallery,     'images'),      [gallery, favorites]);
    const favRec     = useMemo(() => pickFavGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const favShot    = useMemo(() => pickFavGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const favGallery = useMemo(() => pickFavGroup('gallery',     gallery,     'images'),      [gallery, favorites]);

    const visibleTotalRec     = useMemo(() => Object.values(visibleRec).reduce((s,g)=>s+g.recordings.length,0), [visibleRec]);
    const visibleTotalShot    = useMemo(() => Object.values(visibleShot).reduce((s,g)=>s+g.screenshots.length,0), [visibleShot]);
    const visibleTotalGallery = useMemo(() => Object.values(visibleGallery).reduce((s,g)=>s+g.images.length,0), [visibleGallery]);
    const totalFav = useMemo(() =>
      Object.values(favRec).reduce((s,g)=>s+g.recordings.length,0) +
      Object.values(favShot).reduce((s,g)=>s+g.screenshots.length,0) +
      Object.values(favGallery).reduce((s,g)=>s+g.images.length,0)
    , [favRec, favShot, favGallery]);

    const showToast = useCallback((msg, type='info') => {
      setToast({msg, type});
      setTimeout(() => setToast(null), 4000);
    }, []);

    const fetchRec     = useCallback(async () => { try { setRecordings(await (await fetch('/recordings')).json()); } catch(e){} }, []);
    const fetchShot    = useCallback(async () => { try { setScreenshots(await (await fetch('/api/screenshots')).json()); } catch(e){} }, []);
    const fetchGallery = useCallback(async () => { try { setGallery(await (await fetch('/api/gallery')).json()); } catch(e){} }, []);
    const fetchApk     = useCallback(async () => { try { setApkInfo(await (await fetch('/api/apk/info')).json()); } catch(e){} }, []);

    /* Socket setup */
    useEffect(() => {
      const socket = io({
        transports: ['websocket', 'polling'],
        auth: { token: getToken() },
      });
      socketRef.current = socket;

      socket.on('connect',    () => setConnected(true));
      socket.on('disconnect', () => { setConnected(false); showToast('Connection lost — reconnecting…', 'warn'); });

      socket.on('devices_update',     setDevices);
      socket.on('new_recording',      fetchRec);
      socket.on('recording_enhanced', (d) => {
        fetchRec();
        if (d && d.favorited) fetchFavorites();
      });
      socket.on('screenshot_uploaded', d => {
        fetchShot();
        if (d && d.deviceId) setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('screenshot_received', d => {
        fetchShot();
        if (d && d.deviceId) setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });

      socket.on('screenshot_status', d => {
        setSsStatus(p => ({ ...p, [d.deviceId]: d }));
        if (d.status === 'permission_required')
          showToast(`Grant screenshot permission on ${d.deviceName||d.deviceId}`, 'warn');
      });
      socket.on('screenshot_captured', d =>
        setSsStatus(p => ({ ...p, [d.deviceId]: { ...d, status:'uploading' } }))
      );
      socket.on('screenshot_error', d => {
        showToast(`Screenshot failed on ${d.deviceName||d.deviceId}: ${d.error}`, 'error');
        setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('recording_error', d =>
        showToast(`Recording error on ${d.deviceName||d.deviceId}: ${d.error}`, 'error')
      );
      socket.on('upload_error', d =>
        showToast(`Upload error on ${d.deviceName||d.deviceId}: ${d.error}`, 'error')
      );
      socket.on('upload_failed', d =>
        showToast(`Upload failed: ${d.filename} (attempt ${d.failCount})`, 'warn')
      );

      // Audio source events
      socket.on('audio_source_test_started', d => {
        setAudioTesting(p => ({ ...p, [d.deviceId]: true }));
        showToast(`Testing audio sources on ${d.deviceName||d.deviceId}…`, 'info');
      });
      socket.on('audio_source_test_complete', d => {
        setAudioTesting(p => { const c={...p}; delete c[d.deviceId]; return c; });
        showToast(`Audio test done on ${d.deviceName||d.deviceId}: best = ${d.autoDetectedSource}`, 'info');
      });
      socket.on('audio_source_updated', d => {
        showToast(`Audio source on ${d.deviceName||d.deviceId} set to ${d.selectedSource}`, 'info');
      });
      socket.on('audio_source_working', d => {
        // silent — just data update via devices_update
      });
      socket.on('audio_config', () => {
        // config update comes via devices_update broadcast
      });
      socket.on('recording_interrupted', d => {
        showToast(`Recording interrupted on ${d.deviceName||d.deviceId}: ${d.message||d.reason}`, 'warn');
      });
      socket.on('partial_recording_saved', d => {
        showToast(`Partial recording saved: ${d.filename}`, 'info');
        fetchRec();
      });
      socket.on('recording_retry', d => {
        showToast(`Retrying recording on ${d.deviceName||d.deviceId}…`, 'info');
      });

      // Gallery events
      socket.on('gallery_stats', d => {
        setGalleryStats(p => ({ ...p, [d.deviceId]: d.stats }));
      });
      socket.on('gallery_scan_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'scanning', requestId:d.requestId } }));
      });
      socket.on('gallery_metadata', d => {
        setGalleryMeta(p => ({ ...p, [d.deviceId]: d }));
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'metadata_ready', total:d.totalImages } }));
      });
      socket.on('gallery_scan_error', d => {
        showToast(`Gallery scan error on ${d.deviceId}: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'uploading', total:d.totalImages, uploaded:0 } }));
      });
      socket.on('gallery_upload_queued', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { ...p[d.deviceId], status:'uploading', total:d.totalRequested, queued:d.queuedImages } }));
      });
      socket.on('gallery_image_uploaded', d => {
        setGalleryProgress(p => {
          const cur = p[d.deviceId] || {};
          return { ...p, [d.deviceId]: { ...cur, uploaded:(cur.uploaded||0)+1 } };
        });
      });
      socket.on('gallery_image_received', d => {
        fetchGallery();
      });
      socket.on('gallery_upload_complete', d => {
        showToast(`Gallery: ${d.uploaded} uploaded, ${d.failed} failed`, d.failed>0?'warn':'info');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
        fetchGallery();
      });
      socket.on('gallery_upload_error', d => {
        showToast(`Gallery upload error: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_paused', d => {
        showToast(`Gallery upload paused: ${d.remaining} remaining (${d.reason||'connection lost'})`, 'warn');
        setGalleryProgress(p => ({
          ...p, [d.deviceId]: { ...p[d.deviceId], status:'paused', remaining:d.remaining, uploaded:d.uploaded||0, failed:d.failed||0 }
        }));
      });

      fetchRec();
      fetchShot();
      fetchGallery();
      fetchApk();
      fetchFavorites();
      fetchNotes();
      return () => { socket.disconnect(); Object.values(timerRefs.current).forEach(clearInterval); };
    }, [fetchRec, fetchShot, fetchGallery, fetchApk, fetchFavorites, fetchNotes, showToast]);

    /* Timer helpers */
    const startTimer = useCallback((id, sec) => {
      if (timerRefs.current[id]) clearInterval(timerRefs.current[id]);
      setTimers(p => ({ ...p, [id]: sec }));
      timerRefs.current[id] = setInterval(() => {
        setTimers(p => {
          const rem = (p[id]||0) - 1;
          if (rem <= 0) {
            clearInterval(timerRefs.current[id]);
            delete timerRefs.current[id];
            const c={...p}; delete c[id]; return c;
          }
          return { ...p, [id]: rem };
        });
      }, 1000);
    }, []);

    const stopTimer = useCallback((id) => {
      if (timerRefs.current[id]) { clearInterval(timerRefs.current[id]); delete timerRefs.current[id]; }
      setTimers(p => { const c={...p}; delete c[id]; return c; });
    }, []);

    /* Actions */
    const record = (id) => {
      socketRef.current.emit('start_recording', { targetDeviceId:id, duration });
      startTimer(id, duration);
    };
    const stop   = (id) => {
      socketRef.current.emit('stop_recording',  { targetDeviceId:id });
      stopTimer(id);
    };
    const shot   = (id) => {
      setSsStatus(p => ({ ...p, [id]: { status:'requesting' } }));
      socketRef.current.emit('take_screenshot', { targetDeviceId:id });
    };
    const rename = (id, n) =>
      socketRef.current.emit('update_device_name', { targetDeviceId:id, newName:n });

    const recordAll = () => onlineDev.filter(d=>!d.isRecording).forEach(d=>record(d.deviceId));
    const stopAll   = () => {
      socketRef.current.emit('stop_recording', { targetDeviceId:'all' });
      Object.keys(timerRefs.current).forEach(stopTimer);
    };
    const shotAll   = () => onlineDev.forEach(d=>shot(d.deviceId));

    const setAudioSource = (deviceId, source) => {
      socketRef.current.emit('set_audio_source', { targetDeviceId: deviceId, source });
    };
    const testAudio = (deviceId) => {
      setAudioTesting(p => ({ ...p, [deviceId]: true }));
      socketRef.current.emit('test_audio_sources', { targetDeviceId: deviceId });
    };

    // Gallery actions
    const getGalleryStats = (deviceId) => {
      socketRef.current.emit('get_gallery_stats', { targetDeviceId: deviceId });
      setTab('gallery');
    };
    const getLatestImages = (deviceId, count=10, upload=false) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_latest_images', { targetDeviceId:deviceId, count, upload, requestId });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status: upload?'uploading':'scanning' } }));
    };
    const getImagesByFolder = (deviceId, folder, count=20, upload=false) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_images_by_folder', { targetDeviceId:deviceId, folder, count, upload, requestId });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status: upload?'uploading':'scanning' } }));
    };
    const flexGalleryQuery = (deviceId, params) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_gallery_images', {
        targetDeviceId: deviceId,
        count: params.count || 50,
        fromDate: params.fromDate,
        toDate: params.toDate,
        folders: params.folders,
        onlyMetadata: false,
        requestId,
      });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status:'uploading', total:params.count||'?', uploaded:0 } }));
    };

    // Delete offline device — PROTECTS FAVORITES (password required)
    const deleteDevice = async (deviceId) => {
      const favRecs  = new Set(favorites.recordings?.[deviceId]  || []);
      const favShots = new Set(favorites.screenshots?.[deviceId] || []);
      const favGal   = new Set(favorites.gallery?.[deviceId]     || []);
      const hasFavs  = favRecs.size + favShots.size + favGal.size > 0;

      const msg = hasFavs
        ? 'Remove this offline device? Favorites will be preserved.'
        : 'Remove this offline device and ALL its data?';
      if (!(await deletePolicyAsk(msg))) return;

      const recs  = recordings[deviceId]?.recordings   || [];
      const shots = screenshots[deviceId]?.screenshots || [];
      const imgs  = gallery[deviceId]?.images          || [];

      try {
        await Promise.all([
          ...recs .filter(r => !favRecs .has(r.filename)).map(r => fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`,      {method:'DELETE'})),
          ...shots.filter(s => !favShots.has(s.filename)).map(s => fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})),
          ...imgs .filter(i => !favGal  .has(i.filename)).map(i => fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`,     {method:'DELETE'})),
        ]);

        if (!hasFavs) {
          const r = await fetch(`/api/devices/${encodeURIComponent(deviceId)}`, { method:'DELETE' });
          if (r.ok) {
            showToast('Device and all data removed', 'info');
          } else {
            const d = await r.json();
            showToast(d.error || 'Failed to delete device', 'error');
          }
        } else {
          showToast('Device data cleared — favorites preserved', 'info');
        }
        fetchRec(); fetchShot(); fetchGallery();
      } catch(e) {
        showToast('Failed to delete device', 'error');
      }
    };

    const delGallery = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Delete this gallery image?'))) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchGallery();
    };

    // Bulk delete per device — PROTECTS FAVORITES
    const delAllRec = async (deviceId) => {
      const favs = new Set(favorites.recordings?.[deviceId] || []);
      const list = (recordings[deviceId]?.recordings || []).filter(r => !favs.has(r.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} recording(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(r =>
        fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`, {method:'DELETE'})
      ));
      fetchRec();
      showToast(`Deleted ${list.length} recording(s)`, 'info');
    };
    const delAllShot = async (deviceId) => {
      const favs = new Set(favorites.screenshots?.[deviceId] || []);
      const list = (screenshots[deviceId]?.screenshots || []).filter(s => !favs.has(s.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} screenshot(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(s =>
        fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})
      ));
      fetchShot();
      showToast(`Deleted ${list.length} screenshot(s)`, 'info');
    };
    const delAllGallery = async (deviceId) => {
      const favs = new Set(favorites.gallery?.[deviceId] || []);
      const list = (gallery[deviceId]?.images || []).filter(i => !favs.has(i.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} image(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(i =>
        fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`, {method:'DELETE'})
      ));
      fetchGallery();
      showToast(`Deleted ${list.length} image(s)`, 'info');
    };

    // Favorite deletion — always password protected (even if setting is off),
    // to keep starred items extra-safe.
    const delFavRec = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite recording?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('recordings', deviceId, filename);
      fetchRec();
    };
    const delFavShot = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite screenshot?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('screenshots', deviceId, filename);
      fetchShot();
    };
    const delFavGallery = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite image?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('gallery', deviceId, filename);
      fetchGallery();
    };

    const uploadApk = async (file) => {
      setApkUploading(true);
      try {
        const fd = new FormData();
        fd.append('apk', file);
        const r = await fetch('/api/apk/upload', { method:'POST', body:fd });
        if (r.ok) {
          showToast('APK uploaded successfully', 'info');
          fetchApk();
        } else {
          const d = await r.json();
          showToast(`APK upload failed: ${d.error}`, 'error');
        }
      } catch(e) {
        showToast('APK upload failed', 'error');
      }
      setApkUploading(false);
    };

    const delRec  = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Delete this recording?'))) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchRec();
    };

    const [enhancingRec, setEnhancingRec] = useState(() => new Set());
    const enhanceRec = async (deviceId, filename) => {
      const key = `${deviceId}/${filename}`;
      if (enhancingRec.has(key)) return;
      setEnhancingRec(prev => { const n = new Set(prev); n.add(key); return n; });
      showToast('✨ Enhancing audio — this runs offline, please wait…', 'info');
      try {
        const res = await fetch(
          `/api/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}/enhance`,
          { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ strength: 70 }) }
        );
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.error || 'Enhancement failed', 'error');
        } else if (data.alreadyExists) {
          showToast('Enhanced copy already exists', 'info');
        } else if (data.favorited) {
          showToast(`✅ Saved as ${data.filename} — added to Favorites`, 'info');
        } else {
          showToast(`✅ Saved as ${data.filename}`, 'info');
        }
        fetchRec();
        if (data.favorited) fetchFavorites();
      } catch {
        showToast('Network error during enhancement', 'error');
      } finally {
        setEnhancingRec(prev => { const n = new Set(prev); n.delete(key); return n; });
      }
    };
    const delShot = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Delete this screenshot?'))) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchShot();
    };

    /* Tab button style — compact for 5 tabs on mobile */
    const tabStyle = (active, color='#4A90A4') => ({
      flex:'0 0 auto', padding:'10px 10px', fontSize:12, fontWeight:600,
      border:'none', background:'none', cursor:'pointer',
      color: active ? color : '#A0AEC0',
      borderBottom: `2.5px solid ${active ? color : 'transparent'}`,
      marginBottom:-1, transition:'color .15s', whiteSpace:'nowrap',
    });

    /* ── Render ── */
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>

        {/* ── Sticky header ─────────────────────────────────── */}
        <div style={{
          position:'sticky', top:0, zIndex:200,
          background:'#0F2A35', color:'#FFF',
          padding:`calc(10px + var(--safe-top)) 16px 10px`,
          display:'flex', alignItems:'center', justifyContent:'space-between',
          boxShadow:'0 2px 10px rgba(0,0,0,0.25)',
        }}>
          <div>
            <div style={{fontSize:18, fontWeight:700, letterSpacing:.3}}>Baby Monitor</div>
            <div style={{fontSize:11, color:'#94A3B8', marginTop:1}}>
              {connected
                ? `${onlineDev.length} device${onlineDev.length!==1?'s':''} online`
                : 'Connecting…'}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', justifyContent:'flex-end'}}>
            {authStatus?.enabled && (
              <div
                onClick={async () => {
                  if (authStatus.extended) {
                    showToast('Session already extended for 2 hours', 'info');
                    return;
                  }
                  const pw = await askPassword({
                    title:'⏱ Extend session to 2 hours',
                    message:'Keep this device signed in for 2 hours (ignores the normal session timeout). Enter password to confirm.',
                    confirmLabel:'Extend 2h',
                    confirmColor:'#38A169',
                  });
                  if (!pw || typeof pw !== 'string') return;
                  try {
                    const r = await fetch('/api/auth/extend', {
                      method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ password: pw, hours: 2 }),
                    });
                    const data = await r.json();
                    if (!r.ok) { showToast(data.error || 'Extend failed', 'error'); return; }
                    onExtended && onExtended(data);
                    showToast('Session extended for 2 hours', 'info');
                  } catch {
                    showToast('Network error', 'error');
                  }
                }}
                title={authStatus.extended ? 'Session extended for 2 hours' : 'Extend session for 2 hours'}
                style={{
                  display:'flex', alignItems:'center', gap:6, cursor:'pointer',
                  fontSize:11, fontWeight:600, color:'#FFF',
                  background: authStatus.extended ? '#38A169' : 'rgba(255,255,255,0.08)',
                  padding:'5px 10px', borderRadius:8,
                  border:`1px solid ${authStatus.extended ? '#68D391' : 'rgba(255,255,255,0.25)'}`,
                  whiteSpace:'nowrap', userSelect:'none',
                }}
              >
                <input
                  type="checkbox"
                  checked={!!authStatus.extended}
                  readOnly
                  onChange={()=>{}}
                  style={{width:14, height:14, cursor:'pointer', accentColor:'#38A169', pointerEvents:'none'}}
                />
                <span>⏱ 2h</span>
              </div>
            )}
            {apkInfo?.available && (
              <a href="/api/apk/download" style={{
                fontSize:12, fontWeight:600, color:'#38A169', background:'#F0FFF4',
                padding:'5px 12px', borderRadius:8, textDecoration:'none',
                border:'1px solid #C6F6D5', whiteSpace:'nowrap',
              }}>⬇ Get App</a>
            )}
            <span style={{
              width:10, height:10, borderRadius:'50%',
              background: connected ? '#38A169' : '#ECC94B',
              display:'inline-block', boxShadow:`0 0 0 3px ${connected?'#38A16944':'#ECC94B44'}`,
            }} className={connected?'':'blink'} />
          </div>
        </div>

        {/* ── Tabs ──────────────────────────────────────────── */}
        <div style={{
          background:'#FFF', borderBottom:'1px solid #E2E8F0',
          display:'flex', position:'sticky', top:58, zIndex:190,
          overflowX:'auto', WebkitOverflowScrolling:'touch',
          scrollbarWidth:'none', msOverflowStyle:'none',
        }}>
          {[
            { id:'devices',     label:'Devices',     count:devList.length,      color:'#4A90A4' },
            { id:'recordings',  label:'Records',     count:visibleTotalRec,     color:'#4A90A4' },
            { id:'screenshots', label:'Shots',       count:visibleTotalShot,    color:'#7B68AE' },
            { id:'gallery',     label:'Gallery',     count:visibleTotalGallery, color:'#E67E22' },
            { id:'favorites',   label:'★ Favorites', count:totalFav,            color:'#D69E2E' },
            { id:'app',         label:'App',         count:0,                   color:'#DD6B20' },
            { id:'settings',    label:'⚙ Settings',  count:0,                   color:'#718096' },
          ].map(t => (
            <button key={t.id} style={tabStyle(tab===t.id, t.color)} onClick={()=>{
              setTab(t.id);
              if (t.id === 'gallery' && socketRef.current) {
                onlineDev.forEach(d => socketRef.current.emit('get_gallery_stats', { targetDeviceId: d.deviceId }));
              }
            }}>
              {t.label}
              {t.count>0 && (
                <span style={{marginLeft:3,fontSize:9,background:t.color,color:'#FFF',
                              padding:'1px 5px',borderRadius:8,verticalAlign:'middle'}}>{t.count}</span>
              )}
            </button>
          ))}
        </div>

        {/* ── Toast ─────────────────────────────────────────── */}
        <Toast toast={toast} onDismiss={()=>setToast(null)} />

        {/* ── Scrollable content ────────────────────────────── */}
        <div style={{
          flex:1, padding:'14px 12px',
          paddingBottom:`calc(${tab==='devices'&&onlineDev.length>0 ? '88' : '24'}px + var(--safe-bottom))`,
        }}>

          {/* DEVICES */}
          {tab === 'devices' && (
            devList.length === 0
              ? <Empty icon="📱" title="No devices connected" sub="Open the Baby Monitor app on an Android device to get started" />
              : devList.map(dev => (
                  <DeviceCard
                    key={dev.deviceId}
                    dev={dev}
                    selectedDuration={duration}
                    onRecord={record}
                    onStop={stop}
                    onScreenshot={shot}
                    onRename={rename}
                    onSetAudioSource={setAudioSource}
                    onTestAudio={testAudio}
                    onDeleteDevice={deleteDevice}
                    onGetGalleryStats={getGalleryStats}
                    timer={timers[dev.deviceId]}
                    ssStatus={ssStatus[dev.deviceId]}
                    audioTesting={!!audioTesting[dev.deviceId]}
                  />
                ))
          )}

          {/* RECORDINGS */}
          {tab === 'recordings' && (
            Object.keys(visibleRec).length === 0
              ? <Empty icon="🎙" title="No recordings yet" sub="Start a recording from the Devices tab" />
              : Object.entries(visibleRec).map(([id, g]) => (
                  <RecGroup key={id} deviceId={id} group={g}
                    onDelete={delRec} onDeleteAll={delAllRec}
                    onStar={(d,f)=>addFav('recordings',d,f)}
                    favSet={favSetFor('recordings', id)}
                    notesMap={notes.recordings?.[id]}
                    onSaveNote={saveNote}
                    onEnhance={enhanceRec}
                    enhancingSet={enhancingRec}
                  />
                ))
          )}

          {/* SCREENSHOTS */}
          {tab === 'screenshots' && (
            Object.keys(visibleShot).length === 0
              ? <Empty icon="🖼" title="No screenshots yet" sub="Take screenshots from the Devices tab" />
              : Object.entries(visibleShot).map(([id, g]) => (
                  <ShotGroup key={id} deviceId={id} group={g}
                    onDelete={delShot} onDeleteAll={delAllShot} onLightbox={setLightbox}
                    onStar={(d,f)=>addFav('screenshots',d,f)}
                    favSet={favSetFor('screenshots', id)}
                    notesMap={notes.screenshots?.[id]}
                    onSaveNote={saveNote}
                  />
                ))
          )}

          {/* FAVORITES */}
          {tab === 'favorites' && (
            totalFav === 0
              ? <Empty icon="★" title="No favorites yet" sub="Tap ☆ on any recording, screenshot, or gallery image to add it here" />
              : (() => {
                  const ids = new Set([
                    ...Object.keys(favRec), ...Object.keys(favShot), ...Object.keys(favGallery)
                  ]);
                  return [...ids].map(id => (
                    <div key={id}>
                      {favRec[id] && (
                        <RecGroup deviceId={id} group={favRec[id]}
                          onDelete={delFavRec} inFavorites
                          notesMap={notes.recordings?.[id]} onSaveNote={saveNote}
                          onEnhance={enhanceRec} enhancingSet={enhancingRec} />
                      )}
                      {favShot[id] && (
                        <ShotGroup deviceId={id} group={favShot[id]}
                          onDelete={delFavShot} onLightbox={setLightbox} inFavorites
                          notesMap={notes.screenshots?.[id]} onSaveNote={saveNote} />
                      )}
                      {favGallery[id] && (
                        <GalleryGroup deviceId={id} group={favGallery[id]}
                          onDelete={delFavGallery} onLightbox={setLightbox} inFavorites
                          notesMap={notes.gallery?.[id]} onSaveNote={saveNote} />
                      )}
                    </div>
                  ));
                })()
          )}

          {/* GALLERY */}
          {tab === 'gallery' && (
            <div>
              {/* Gallery stats cards for online devices */}
              {onlineDev.length > 0 && (
                <div style={{marginBottom:16}}>
                  {onlineDev.map(dev => (
                    <GalleryStatsCard
                      key={dev.deviceId}
                      deviceId={dev.deviceId}
                      deviceName={dev.deviceName}
                      stats={galleryStats[dev.deviceId]}
                      onGetLatest={getLatestImages}
                      onGetByFolder={getImagesByFolder}
                      onFlexQuery={flexGalleryQuery}
                      progress={galleryProgress[dev.deviceId]}
                    />
                  ))}
                </div>
              )}

              {/* Downloaded gallery images */}
              {Object.keys(visibleGallery).length === 0
                ? <Empty icon="🖼" title="No gallery images yet" sub="Use the Gallery button on a device to fetch images" />
                : Object.entries(visibleGallery).map(([id, g]) => (
                    <GalleryGroup key={id} deviceId={id} group={g}
                      onDelete={delGallery} onDeleteAll={delAllGallery} onLightbox={setLightbox}
                      onStar={(d,f)=>addFav('gallery',d,f)}
                      favSet={favSetFor('gallery', id)}
                      notesMap={notes.gallery?.[id]}
                      onSaveNote={saveNote}
                    />
                  ))
              }
            </div>
          )}

          {/* APP MANAGEMENT */}
          {tab === 'app' && (
            <div>
              <Card style={{padding:20, marginBottom:16}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Download Android App
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Install the Baby Monitor app on your Android phone to enable remote recording and screenshots.
                </div>

                {apkInfo?.available ? (
                  <div>
                    <a href="/api/apk/download" style={{textDecoration:'none', display:'block'}}>
                      <Btn full color="#38A169">
                        ⬇ Download APK ({fmtSize(apkInfo.size)})
                      </Btn>
                    </a>
                    <div style={{fontSize:11, color:'#A0AEC0', marginTop:8, textAlign:'center'}}>
                      Last updated: {fmtDate(apkInfo.updatedAt)}
                    </div>
                  </div>
                ) : (
                  <div style={{textAlign:'center', padding:'20px 0', color:'#A0AEC0', fontSize:13}}>
                    No APK uploaded yet
                  </div>
                )}
              </Card>

              <Card style={{padding:20}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Upload New APK
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Upload a new version of the Android app. This replaces the current download.
                </div>
                <label style={{
                  display:'flex', alignItems:'center', justifyContent:'center',
                  height:100, borderRadius:12, cursor: apkUploading ? 'wait' : 'pointer',
                  border:'2px dashed #CBD5E0', background:'#F7FAFC',
                  color: apkUploading ? '#A0AEC0' : '#4A90A4',
                  fontSize:14, fontWeight:600,
                  transition:'border-color .2s',
                }}>
                  <input
                    type="file"
                    accept=".apk"
                    style={{display:'none'}}
                    disabled={apkUploading}
                    onChange={e => {
                      if (e.target.files[0]) uploadApk(e.target.files[0]);
                      e.target.value = '';
                    }}
                  />
                  {apkUploading ? '⏳ Uploading…' : '📦 Tap to select APK file'}
                </label>
              </Card>
            </div>
          )}

          {/* SETTINGS */}
          {tab === 'settings' && (
            <SettingsScreen
              authCfg={authStatus}
              onUpdated={onAuthUpdated}
              onToast={showToast}
              onLogout={onLogout}
            />
          )}
        </div>

        {/* ── Floating action bar (Devices tab only) ─────────── */}
        {tab === 'devices' && onlineDev.length > 0 && (
          <div style={{
            position:'fixed', bottom:0, left:0, right:0, zIndex:180,
            background:'#FFF', borderTop:'1px solid #E2E8F0',
            padding:`10px 12px calc(10px + var(--safe-bottom))`,
            display:'flex', gap:8, alignItems:'center',
            boxShadow:'0 -2px 14px rgba(0,0,0,0.09)',
          }}>
            {/* Duration picker (dropdown + custom minutes input) */}
            <select
              value={DURATIONS.some(d=>d.value===duration) ? duration : ''}
              onChange={e=>{ if (e.target.value) setDuration(Number(e.target.value)); }}
              style={{
                flexShrink:0, height:44, padding:'0 8px', fontSize:13, fontWeight:600,
                borderRadius:10, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
                color:'#2D3748', WebkitAppearance:'none', cursor:'pointer',
              }}
            >
              <option value="" disabled>Custom…</option>
              {DURATIONS.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
            </select>
            <input
              type="number" min="1" step="1" inputMode="numeric"
              placeholder="min"
              value={Math.round(duration/60) || ''}
              onChange={e=>{
                const n = parseInt(e.target.value, 10);
                if (!isNaN(n) && n > 0) setDuration(n * 60);
                else if (e.target.value === '') setDuration(0);
              }}
              title="Custom minutes"
              style={{
                flexShrink:0, width:60, height:44, padding:'0 8px', fontSize:13, fontWeight:600,
                borderRadius:10, border:'1.5px solid #E2E8F0', background:'#FFF',
                color:'#2D3748', textAlign:'center',
              }}
            />

            {/* Record all */}
            <Btn
              full
              color="#4A90A4"
              onClick={recordAll}
              disabled={onlineDev.every(d=>d.isRecording)}
            >
              ◉ Record All ({onlineDev.length})
            </Btn>

            {/* Stop all (only when something is recording) */}
            {anyRec && (
              <Btn outline color="#E53E3E" onClick={stopAll} style={{flexShrink:0}}>
                ■ Stop
              </Btn>
            )}

            {/* Screenshot all */}
            <Btn color="#7B68AE" onClick={shotAll} style={{flexShrink:0, padding:'0 14px'}}>
              📷
            </Btn>
          </div>
        )}

        {/* ── Password modal ────────────────────────────────── */}
        <PasswordModal prompt={passPrompt} />

        {/* ── Lightbox ──────────────────────────────────────── */}
        {lightbox && (
          <div
            onClick={()=>setLightbox(null)}
            style={{
              position:'fixed', inset:0, zIndex:600,
              background:'rgba(0,0,0,0.92)',
              display:'flex', alignItems:'center', justifyContent:'center',
              padding:16, cursor:'zoom-out',
            }}
          >
            <img
              src={lightbox}
              style={{maxWidth:'100%', maxHeight:'100%', borderRadius:8, objectFit:'contain'}}
            />
            <button
              onClick={()=>setLightbox(null)}
              style={{
                position:'absolute', top:16, right:16,
                width:40, height:40, borderRadius:20, fontSize:18,
                background:'rgba(255,255,255,0.2)', color:'#FFF', border:'none',
              }}
            >✕</button>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
