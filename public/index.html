        .filter(v => !seen.has(v))
        .map(v => ({ label: formatDurationLabel(v), value: v }));
      return [...DURATIONS, ...extras].sort((a,b)=>a.value-b.value);
    }, [customDurations]);
    const [tab,             setTab]             = useState(() => {
      try { return localStorage.getItem('bm_tab') || 'devices'; } catch { return 'devices'; }
    });
    useEffect(() => { try { localStorage.setItem('bm_tab', tab); } catch {} }, [tab]);
    const [lightbox,        setLightbox]        = useState(null);
    const [toast,           setToast]           = useState(null);
    const [connected,       setConnected]       = useState(false);
    const [audioTesting,    setAudioTesting]    = useState({});
    const [apkInfo,         setApkInfo]         = useState(null);
    const [apkUploading,    setApkUploading]    = useState(false);
    const [favorites,       setFavorites]       = useState({});
    const [trash,           setTrash]           = useState({ items: [] });
    const fetchTrash = useCallback(async () => {
      try {
        const r = await fetch('/api/trash');
        if (r.ok) setTrash(await r.json());
      } catch {}
    }, []);
    const [autoRecord,      setAutoRecord]      = useState({ jobs: {} });
    const fetchAutoRecord = useCallback(async () => {
      try {
        const r = await fetch('/api/auto-record');
        if (r.ok) setAutoRecord(await r.json());
      } catch {}
    }, []);
    const [autoShot,        setAutoShot]        = useState({ jobs: {} });
    const fetchAutoShot = useCallback(async () => {
      try {
        const r = await fetch('/api/auto-screenshot');
        if (r.ok) setAutoShot(await r.json());
      } catch {}
    }, []);
    const fetchFavorites = useCallback(async () => {
      try { setFavorites(await (await fetch('/api/favorites')).json()); } catch {}
    }, []);
    const addFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };
    const removeFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'DELETE', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };

    const [notes, setNotes] = useState({});
    const fetchNotes = useCallback(async () => {
      try { setNotes(await (await fetch('/api/notes')).json()); } catch {}
    }, []);
    const saveNote = async (kind, deviceId, filename, text) => {
      const res = await fetch('/api/notes', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename, note: text }),
      });
      if (res.ok) {
        // Optimistic local update
        setNotes(prev => {
          const next = { ...prev };
          const t = (text || '').trim();
          if (!t) {
            if (next[kind]?.[deviceId]) {
              const dev = { ...next[kind][deviceId] };
              delete dev[filename];
              const k = { ...next[kind], [deviceId]: dev };
              if (!Object.keys(dev).length) delete k[deviceId];
              next[kind] = k;
              if (!Object.keys(next[kind]).length) delete next[kind];
            }
          } else {
            next[kind] = { ...(next[kind] || {}) };
            next[kind][deviceId] = { ...(next[kind][deviceId] || {}), [filename]: t };
          }
          return next;
        });
      }
    };
    const noteFor = (kind, deviceId, filename) => notes[kind]?.[deviceId]?.[filename] || '';
    const [passPrompt, setPassPrompt] = useState(null);
    const [burstPrompt, setBurstPrompt] = useState(null);
    // Resolves to the verified password string on success, or null on cancel.
    // Truthy-check (`if (await askPassword(...))`) still works for existing callers.
    const askPassword = (opts) => new Promise(resolve => {
      const o = typeof opts === 'string' ? { message: opts } : (opts || {});
      setPassPrompt({
        title: o.title,
        message: o.message,
        confirmLabel: o.confirmLabel,
        confirmColor: o.confirmColor,
        onOk:     (pw) => { setPassPrompt(null); resolve(pw || true); },
        onCancel: ()   => { setPassPrompt(null); resolve(null); },
      });
    });

    // Respect delete policy from auth settings.
    const deletePolicyAsk = async (msg) => {
      if (authStatus?.lockDelete) {
        showToast('Delete is locked in Settings', 'warn');
        return false;
      }
      if (authStatus?.requireDeletePassword) {
        return await askPassword({
          title: '🔒 Confirm delete',

    const socketRef   = useRef(null);

    const devList     = useMemo(() => Object.values(devices), [devices]);

    const anyRec      = useMemo(() => devList.some(d => d.isRecording), [devList]);
    const totalRec    = useMemo(() => Object.values(recordings).reduce((s,g)=>s+(g.recordings?.length||0),0), [recordings]);
    const totalShots  = useMemo(() => Object.values(screenshots).reduce((s,g)=>s+(g.screenshots?.length||0),0), [screenshots]);
    const totalGallery = useMemo(() => Object.values(gallery).reduce((s,g)=>s+(g.images?.length||0),0), [gallery]);

    const favSetFor = (kind, deviceId) => new Set(favorites[kind]?.[deviceId] || []);
    const filterGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => !fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };
    const pickFavGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };

    const visibleRec     = useMemo(() => filterGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const visibleShot    = useMemo(() => filterGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const visibleGallery = useMemo(() => filterGroup('gallery',     gallery,     'images'),      [gallery, favorites]);
    const favRec     = useMemo(() => pickFavGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const favShot    = useMemo(() => pickFavGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const favGallery = useMemo(() => pickFavGroup('gallery',     gallery,     'images'),      [gallery, favorites]);

    const visibleTotalRec     = useMemo(() => Object.values(visibleRec).reduce((s,g)=>s+g.recordings.length,0), [visibleRec]);
    const visibleTotalShot    = useMemo(() => Object.values(visibleShot).reduce((s,g)=>s+g.screenshots.length,0), [visibleShot]);
    const visibleTotalGallery = useMemo(() => Object.values(visibleGallery).reduce((s,g)=>s+g.images.length,0), [visibleGallery]);
    const totalFav = useMemo(() =>
      Object.values(favRec).reduce((s,g)=>s+g.recordings.length,0) +
      Object.values(favShot).reduce((s,g)=>s+g.screenshots.length,0) +

    , [favRec, favShot, favGallery]);

    const showToast = useCallback((msg, type='info') => {

    const fetchRec     = useCallback(async () => { try { setRecordings(await (await fetch('/recordings')).json()); } catch(e){} }, []);
    const fetchShot    = useCallback(async () => { try { setScreenshots(await (await fetch('/api/screenshots')).json()); } catch(e){} }, []);
    const fetchGallery = useCallback(async () => { try { setGallery(await (await fetch('/api/gallery')).json()); } catch(e){} }, []);
    const fetchApk     = useCallback(async () => { try { setApkInfo(await (await fetch('/api/apk/info')).json()); } catch(e){} }, []);
    const [storage, setStorage] = useState(null);
    const fetchStorage = useCallback(async () => {
      try { setStorage(await (await fetch('/api/storage')).json()); } catch {}

    /* Socket setup */
    useEffect(() => {

      socket.on('burst_error', d => showToast(`Burst error: ${d.error||'unknown'}`, 'error'));
      socket.on('recording_error', d =>

      );
      socket.on('upload_error', d =>

      );
      socket.on('upload_failed', d =>

      // Audio source events
      socket.on('audio_source_test_started', d => {

      });
      socket.on('audio_source_test_complete', d => {
        setAudioTesting(p => { const c={...p}; delete c[d.deviceId]; return c; });
        showToast(`Audio test done on ${d.deviceName||d.deviceId}: best = ${d.autoDetectedSource}`, 'info');
      });
      socket.on('audio_source_updated', d => {
        showToast(`Audio source on ${d.deviceName||d.deviceId} set to ${d.selectedSource}`, 'info');
      });
      socket.on('audio_source_working', d => {
        // silent — just data update via devices_update
      });
      socket.on('audio_config', () => {
        // config update comes via devices_update broadcast
      });
      socket.on('recording_interrupted', d => {
        showToast(`Recording interrupted on ${d.deviceName||d.deviceId}: ${d.message||d.reason}`, 'warn');
      });
      socket.on('partial_recording_saved', d => {
        showToast(`Partial recording saved: ${d.filename}`, 'info');
        fetchRec();
      });
      socket.on('recording_retry', d => {
        showToast(`Retrying recording on ${d.deviceName||d.deviceId}…`, 'info');
      });

      // Gallery events
      socket.on('gallery_stats', d => {
        setGalleryStats(p => ({ ...p, [d.deviceId]: d.stats }));
      });
      socket.on('gallery_scan_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'scanning', requestId:d.requestId } }));
      });
      socket.on('gallery_metadata', d => {
        setGalleryMeta(p => ({ ...p, [d.deviceId]: d }));
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'metadata_ready', total:d.totalImages } }));
      });
      socket.on('gallery_scan_error', d => {
        showToast(`Gallery scan error on ${d.deviceId}: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'uploading', total:d.totalImages, uploaded:0 } }));
      });
      socket.on('gallery_upload_queued', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { ...p[d.deviceId], status:'uploading', total:d.totalRequested, queued:d.queuedImages } }));
      });
      socket.on('gallery_image_uploaded', d => {
        setGalleryProgress(p => {
          const cur = p[d.deviceId] || {};
          return { ...p, [d.deviceId]: { ...cur, uploaded:(cur.uploaded||0)+1 } };
        });
      });
      socket.on('gallery_image_received', d => {
        fetchGallery();
      });
      socket.on('gallery_upload_complete', d => {
        showToast(`Gallery: ${d.uploaded} uploaded, ${d.failed} failed`, d.failed>0?'warn':'info');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
        fetchGallery();
      });
      socket.on('gallery_upload_error', d => {
        showToast(`Gallery upload error: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_paused', d => {
        showToast(`Gallery upload paused: ${d.remaining} remaining (${d.reason||'connection lost'})`, 'warn');
        setGalleryProgress(p => ({
          ...p, [d.deviceId]: { ...p[d.deviceId], status:'paused', remaining:d.remaining, uploaded:d.uploaded||0, failed:d.failed||0 }
        }));
      });

      fetchRec();
      fetchShot();
      fetchGallery();
      fetchApk();
      fetchFavorites();
      fetchNotes();
      fetchStorage();
      fetchTrash();
      fetchAutoRecord();
      fetchAutoShot();
      fetch('/api/screenshot-bursts').then(r=>r.ok?r.json():{}).then(setBursts).catch(()=>{});
      const storageInterval = setInterval(fetchStorage, 30000);
      const reconcileInterval = setInterval(() => {
        fetch('/devices').then(r => r.ok ? r.json() : null).then(snap => {
          if (snap && typeof snap === 'object') setDevices(snap);
        }).catch(()=>{});
      }, 8000);
      return () => { clearInterval(reconcileInterval); clearInterval(storageInterval); socket.disconnect(); Object.values(timerRefs.current).forEach(clearInterval); };
    }, [fetchRec, fetchShot, fetchGallery, fetchApk, fetchFavorites, fetchNotes, fetchStorage, fetchTrash, fetchAutoRecord, fetchAutoShot, showToast]);

    /* Refresh recycle-bin index whenever any of the live data sets change.
       Each delete triggers a fetchRec/Shot/Gallery — those state updates fire
       this effect, which re-fetches /api/trash so the tab badge and list stay
       in sync without having to thread fetchTrash through every handler. */
    useEffect(() => { fetchTrash(); }, [recordings, screenshots, gallery, fetchTrash]);

    /* Timer helpers */
    const startTimer = useCallback((id, sec) => {
      if (timerRefs.current[id]) clearInterval(timerRefs.current[id]);
      setTimers(p => ({ ...p, [id]: sec }));
      timerRefs.current[id] = setInterval(() => {
        setTimers(p => {
          const rem = (p[id]||0) - 1;
          if (rem <= 0) {
            clearInterval(timerRefs.current[id]);
            delete timerRefs.current[id];
            const c={...p}; delete c[id]; return c;
          }
          return { ...p, [id]: rem };
        });
      }, 1000);
    }, []);

    const stopTimer = useCallback((id) => {
      if (timerRefs.current[id]) { clearInterval(timerRefs.current[id]); delete timerRefs.current[id]; }
      setTimers(p => { const c={...p}; delete c[id]; return c; });
    }, []);

    /* Actions */
    const reconcileDevices = useCallback(async () => {
      try {
        const r = await fetch('/devices');
        if (!r.ok) return;
        const snap = await r.json();
        if (snap && typeof snap === 'object') setDevices(snap);
      } catch {}
    }, []);
    const record = (id) => {
      socketRef.current.emit('start_recording', { targetDeviceId:id, duration });
      startTimer(id, duration);
      setDevices(p => {
        const d = p[id]; if (!d) return p;
        return { ...p, [id]: { ...d, isRecording: true, recordingStartTime: Date.now(), recordingDuration: duration } };
      });
      setTimeout(reconcileDevices, 1500);
      setTimeout(reconcileDevices, 4000);
    };
    const stop   = (id) => {
      socketRef.current.emit('stop_recording',  { targetDeviceId:id });
      stopTimer(id);
      setDevices(p => {
        const d = p[id]; if (!d) return p;
        return { ...p, [id]: { ...d, isRecording: false } };
      });
      setTimeout(reconcileDevices, 1500);
    };
    const shot   = (id) => {
      setSsStatus(p => ({ ...p, [id]: { status:'requesting' } }));
      socketRef.current.emit('take_screenshot', { targetDeviceId:id });
    };

    // Burst has its own dedicated minute picker (independent of the footer
    // duration dropdown). Opens BurstDurationModal, awaits a minute count,
    // then kicks off the server-driven burst.
    const askBurstMinutes = (deviceName) => new Promise(resolve => {
      setBurstPrompt({
        deviceName,
        onOk:     (mins) => { setBurstPrompt(null); resolve(mins); },
        onCancel: ()     => { setBurstPrompt(null); resolve(null); },
      });
    });

    const burstStart = async (id) => {
      const dev = devices[id];
      const mins = await askBurstMinutes(dev?.deviceName || id);
      if (mins == null) return;
      const dur = Math.max(15, Math.floor(mins * 60)); // server minimum is 15s
      try {
        const r = await fetch(`/api/devices/${encodeURIComponent(id)}/screenshot-burst`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ durationSeconds: dur }),
        });
        if (!r.ok) {
          const j = await r.json().catch(()=>({}));
          showToast(j.error || 'Failed to start burst', 'error');
          return;
        }
        showToast(`Burst started · ${mins} min`, 'info');
      } catch {
        showToast('Network error starting burst', 'error');
      }
    };
    const burstStop = async (id) => {
      if (!window.confirm('Stop the active screenshot burst on this device?')) return;
      try {
        await fetch(`/api/devices/${encodeURIComponent(id)}/screenshot-burst/stop`, { method:'POST' });
        showToast('Burst stopped', 'info');
      } catch {
        showToast('Failed to stop burst', 'error');
      }
    };

    /* Live ticker for active-burst remaining time (1Hz when any burst is active) */
    useEffect(() => {
      const anyActive = Object.values(bursts).some(b => b && b.active);
      if (!anyActive) return;
      const t = setInterval(() => setBurstTick(n => (n + 1) & 0xffff), 1000);
      return () => clearInterval(t);
    }, [bursts]);
    const liveBursts = useMemo(() => {
      const now = Date.now();
      const out = {};
      Object.entries(bursts).forEach(([id, b]) => {
        if (b && b.active) out[id] = { ...b, remainingMs: Math.max(0, (b.endTime||0) - now) };
      });
      return out;
    }, [bursts, burstTick]);
    const rename = (id, n) =>
      socketRef.current.emit('update_device_name', { targetDeviceId:id, newName:n });

    const recordAll = async () => {
      const targets = onlineDev.filter(d=>!d.isRecording);
      if (targets.length === 0) return;
      if (!(await askPassword({
        title:'🔒 Confirm Record All',
        message:`Start recording on ${targets.length} device(s)?`,
        confirmLabel:'Record', confirmColor:'#4A90A4',
      }))) return;
      targets.forEach(d=>record(d.deviceId));
    };
    const stopAll = async () => {
      if (!(await askPassword({
        title:'🔒 Confirm Stop All',
        message:'Stop recording on ALL devices?',
        confirmLabel:'Stop', confirmColor:'#E53E3E',
      }))) return;
      socketRef.current.emit('stop_recording', { targetDeviceId:'all' });
      Object.keys(timerRefs.current).forEach(stopTimer);
    };
    const shotAll = async () => {
      if (onlineDev.length === 0) return;
      if (!(await askPassword({
        title:'🔒 Confirm Screenshot All',
        message:`Take screenshots on ${onlineDev.length} device(s)?`,
        confirmLabel:'Capture', confirmColor:'#7B68AE',
      }))) return;
      onlineDev.forEach(d=>shot(d.deviceId));
    };

    const setAudioSource = (deviceId, source) => {
      socketRef.current.emit('set_audio_source', { targetDeviceId: deviceId, source });
    };
    const testAudio = (deviceId) => {
      setAudioTesting(p => ({ ...p, [deviceId]: true }));
      socketRef.current.emit('test_audio_sources', { targetDeviceId: deviceId });
    };

    // Gallery actions
    const getGalleryStats = (deviceId) => {
      socketRef.current.emit('get_gallery_stats', { targetDeviceId: deviceId });
      setTab('gallery');
    };
    const getLatestImages = (deviceId, count=10, upload=false) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_latest_images', { targetDeviceId:deviceId, count, upload, requestId });

    };
    const getImagesByFolder = (deviceId, folder, count=20, upload=false) => {

      setGalleryProgress(p => ({ ...p, [deviceId]: { status: upload?'uploading':'scanning' } }));

    const flexGalleryQuery = (deviceId, params) => {

    // Delete offline device — PROTECTS FAVORITES (password required)
    const deleteDevice = async (deviceId) => {
      const favRecs  = new Set(favorites.recordings?.[deviceId]  || []);
      const favShots = new Set(favorites.screenshots?.[deviceId] || []);
      const favGal   = new Set(favorites.gallery?.[deviceId]     || []);
      const hasFavs  = favRecs.size + favShots.size + favGal.size > 0;

      const msg = hasFavs
        ? 'Remove this offline device? Favorites will be preserved.'
        : 'Remove this offline device and ALL its data?';
      if (!(await deletePolicyAsk(msg))) return;

      const recs  = recordings[deviceId]?.recordings   || [];
      const shots = screenshots[deviceId]?.screenshots || [];
      const imgs  = gallery[deviceId]?.images          || [];

      try {
        await Promise.all([
          ...recs .filter(r => !favRecs .has(r.filename)).map(r => fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`,      {method:'DELETE'})),
          ...shots.filter(s => !favShots.has(s.filename)).map(s => fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})),
          ...imgs .filter(i => !favGal  .has(i.filename)).map(i => fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`,     {method:'DELETE'})),
        ]);

        if (!hasFavs) {
          const r = await fetch(`/api/devices/${encodeURIComponent(deviceId)}`, { method:'DELETE' });
          if (r.ok) {
            showToast('Device and all data removed', 'info');
          } else {
            const d = await r.json();
            showToast(d.error || 'Failed to delete device', 'error');
          }
        } else {
          showToast('Device data cleared — favorites preserved', 'info');
        }
        fetchRec(); fetchShot(); fetchGallery();
      } catch(e) {
        showToast('Failed to delete device', 'error');
      }
    };

    const delGallery = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Delete this gallery image?'))) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchGallery();
    };

    // Bulk delete per device — PROTECTS FAVORITES
    const delAllRec = async (deviceId) => {
      const favs = new Set(favorites.recordings?.[deviceId] || []);
      const list = (recordings[deviceId]?.recordings || []).filter(r => !favs.has(r.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} recording(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(r =>
        fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`, {method:'DELETE'})
      ));

      showToast(`Deleted ${list.length} recording(s)`, 'info');
    };
    const delAllShot = async (deviceId) => {
      const favs = new Set(favorites.screenshots?.[deviceId] || []);
      const list = (screenshots[deviceId]?.screenshots || []).filter(s => !favs.has(s.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} screenshot(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(s =>
        fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})
      ));
      fetchShot();
      showToast(`Deleted ${list.length} screenshot(s)`, 'info');
    };
    const delAllGallery = async (deviceId) => {
      const favs = new Set(favorites.gallery?.[deviceId] || []);
      const list = (gallery[deviceId]?.images || []).filter(i => !favs.has(i.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} image(s)? Favorites will be kept.`))) return;
      await Promise.all(list.map(i =>
        fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`, {method:'DELETE'})
      ));
      fetchGallery();
      showToast(`Deleted ${list.length} image(s)`, 'info');
    };

    // ── ZIP download (server-streamed) ────────────────────────
    // Items: [{ kind, deviceId, filename }]. Triggers a browser download.
    const downloadZip = async (items, zipName) => {
      if (!items || items.length === 0) {
        showToast('Nothing to zip', 'info');
        return;
      }
      showToast(`Preparing ZIP — ${items.length} file${items.length===1?'':'s'}…`, 'info');
      try {
        const r = await fetch('/api/zip', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ items, zipName }),
        });
        if (!r.ok) { showToast('ZIP failed', 'error'); return; }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = zipName;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
        showToast(`Downloaded ${zipName}`, 'info');
      } catch (e) {
        showToast('ZIP failed: ' + (e.message||'network error'), 'error');
      }
    };
    const safeZipName = (parts) =>
      parts.filter(Boolean).join('_').replace(/[^A-Za-z0-9._-]+/g, '-').slice(0, 70) + '.zip';
    const deviceNameOf = (deviceId) => devices[deviceId]?.deviceName || deviceId.slice(0,10);

    const zipDeviceRec = (deviceId, filenames) => {
      const items = filenames.map(fn => ({ kind:'recordings', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['recordings', deviceNameOf(deviceId)]));
    };
    const zipDeviceShot = (deviceId, filenames) => {
      const items = filenames.map(fn => ({ kind:'screenshots', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['screenshots', deviceNameOf(deviceId)]));
    };
    const zipDeviceGallery = (deviceId, filenames) => {
      const items = filenames.map(fn => ({ kind:'gallery', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['gallery', deviceNameOf(deviceId)]));
    };
    const zipDateRec = (deviceId, filenames, label) => {
      const items = filenames.map(fn => ({ kind:'recordings', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['recordings', deviceNameOf(deviceId), label]));
    };
    const zipDateShot = (deviceId, filenames, label) => {
      const items = filenames.map(fn => ({ kind:'screenshots', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['screenshots', deviceNameOf(deviceId), label]));
    };
    const zipDateGallery = (deviceId, filenames, label) => {
      const items = filenames.map(fn => ({ kind:'gallery', deviceId, filename: fn }));
      downloadZip(items, safeZipName(['gallery', deviceNameOf(deviceId), label]));
    };

    // Date-bounded bulk delete — used by date sub-group ✕ button.
    // Respects deletePolicyAsk; protects favorites in non-favorites contexts.
    const delDateRec = async (deviceId, filenames, label) => {
      const favs = new Set(favorites.recordings?.[deviceId] || []);
      const list = filenames.filter(f => !favs.has(f));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} recording(s) from ${label}? Favorites will be kept.`))) return;
      await Promise.all(list.map(fn =>
        fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      fetchRec();
      showToast(`Deleted ${list.length} recording(s) from ${label}`, 'info');
    };
    const delDateShot = async (deviceId, filenames, label) => {
      const favs = new Set(favorites.screenshots?.[deviceId] || []);
      const list = filenames.filter(f => !favs.has(f));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} screenshot(s) from ${label}? Favorites will be kept.`))) return;
      await Promise.all(list.map(fn =>
        fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      fetchShot();
      showToast(`Deleted ${list.length} screenshot(s) from ${label}`, 'info');
    };
    const delDateGallery = async (deviceId, filenames, label) => {
      const favs = new Set(favorites.gallery?.[deviceId] || []);
      const list = filenames.filter(f => !favs.has(f));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!(await deletePolicyAsk(`Delete ${list.length} image(s) from ${label}? Favorites will be kept.`))) return;
      await Promise.all(list.map(fn =>
        fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      fetchGallery();
      showToast(`Deleted ${list.length} image(s) from ${label}`, 'info');
    };
    // Favorites variants — always password protected, also remove favorite flag.
    const delFavDateRec = async (deviceId, filenames, label) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:`Delete ${filenames.length} favorite recording(s) from ${label}?`, confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await Promise.all(filenames.map(fn =>
        fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      filenames.forEach(fn => removeFav('recordings', deviceId, fn));
      fetchRec();
    };
    const delFavDateShot = async (deviceId, filenames, label) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:`Delete ${filenames.length} favorite screenshot(s) from ${label}?`, confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await Promise.all(filenames.map(fn =>
        fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      filenames.forEach(fn => removeFav('screenshots', deviceId, fn));
      fetchShot();
    };
    const delFavDateGallery = async (deviceId, filenames, label) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:`Delete ${filenames.length} favorite image(s) from ${label}?`, confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await Promise.all(filenames.map(fn =>
        fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(fn)}`, {method:'DELETE'})
      ));
      filenames.forEach(fn => removeFav('gallery', deviceId, fn));
      fetchGallery();
    };

    // Favorite deletion — always password protected (even if setting is off),
    // to keep starred items extra-safe.
    const delFavRec = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite recording?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('recordings', deviceId, filename);
      fetchRec();
    };
    const delFavShot = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite screenshot?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('screenshots', deviceId, filename);
      fetchShot();
    };
    const delFavGallery = async (deviceId, filename) => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if (!(await askPassword({ title:'🔒 Confirm delete', message:'Delete this favorite image?', confirmLabel:'Delete', confirmColor:'#E53E3E' }))) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('gallery', deviceId, filename);
      fetchGallery();
    };

    const uploadApk = async (file) => {
      setApkUploading(true);
      try {
        const fd = new FormData();
        fd.append('apk', file);
        const r = await fetch('/api/apk/upload', { method:'POST', body:fd });
        if (r.ok) {
          showToast('APK uploaded successfully', 'info');
          fetchApk();
        } else {
          const d = await r.json();
          showToast(`APK upload failed: ${d.error}`, 'error');
        }
      } catch(e) {
        showToast('APK upload failed', 'error');
      }
      setApkUploading(false);
    };

    /* Recycle bin actions */
    const restoreFromTrash = async (ids) => {
      if (!ids || ids.length === 0) return;
      try {
        const r = await fetch('/api/trash/restore', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ ids }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { showToast(d.error || 'Restore failed', 'error'); return; }
        showToast(
          `↶ Restored ${d.restored} item${d.restored===1?'':'s'}` +
          (d.failed ? ` · ${d.failed} failed` : ''),
          d.failed ? 'warn' : 'info'
        );
        // Refresh everything so restored items reappear in their original tab
        fetchTrash(); fetchRec(); fetchShot(); fetchGallery(); fetchStorage();
      } catch {
        showToast('Network error during restore', 'error');
      }
    };
    const emptyTrash = async () => {
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }
      if ((trash.items?.length || 0) === 0) { showToast('Recycle bin is already empty', 'info'); return; }
      // Always password-protected, regardless of requireDeletePassword setting,
      // since this is a permanent destructive action.
      const pw = await askPassword({
        title: '🔒 Empty Recycle Bin',
        message: `Permanently delete ALL ${trash.items.length} item(s) in the recycle bin? This CANNOT be undone.`,
        confirmLabel: 'Empty Bin',
        confirmColor: '#E53E3E',
      });
      if (!pw || typeof pw !== 'string') return;
      try {
        const r = await fetch('/api/trash/empty', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password: pw }),
        });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) { showToast(d.error || 'Failed to empty bin', 'error'); return; }
        showToast(`Recycle bin emptied · ${d.removed} item${d.removed===1?'':'s'} permanently deleted`, 'info');
        fetchTrash(); fetchStorage();
      } catch {
        showToast('Network error', 'error');
      }
    };

    const delRec  = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Move this recording to the recycle bin?'))) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchRec();
    };

    const [enhancingRec, setEnhancingRec] = useState(() => new Set());
    const enhanceRec = async (deviceId, filename, engine) => {
      const eng = (engine === 'rnnoise' || engine === 'afftdn') ? engine : 'auto';
      const key = `${deviceId}/${filename}/${eng}`;
      if (enhancingRec.has(key)) return;
      setEnhancingRec(prev => { const n = new Set(prev); n.add(key); return n; });
      const label = eng === 'rnnoise' ? '✨ RNNoise AI' : '🧹 FFmpeg';
      showToast(`${label} — processing ${filename}…`, 'info');
      try {
        const res = await fetch(
          `/api/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}/enhance`,
          {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ strength: 75, engine: eng }),
          }
        );
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.error || 'Enhancement failed', 'error');
        } else if (data.alreadyExists) {
          showToast(`Enhanced copy already exists: ${data.filename}`, 'info');
        } else {
          const tag = data.engine === 'rnnoise' ? ' (RNNoise AI)' : ' (FFmpeg)';
          const fav = data.favorited ? ' — added to Favorites' : '';
          showToast(`✅ Saved as ${data.filename}${tag}${fav}`, 'info');
        }
        fetchRec();
        if (data.favorited) fetchFavorites();
      } catch {
        showToast('Network error during enhancement', 'error');
      } finally {
        setEnhancingRec(prev => { const n = new Set(prev); n.delete(key); return n; });
      }
    };
    const delShot = async (deviceId, filename) => {
      if (!(await deletePolicyAsk('Delete this screenshot?'))) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchShot();
    };

    /* Tab button style — compact for 5 tabs on mobile */
    const tabStyle = (active, color='#4A90A4') => ({
      flex:'0 0 auto', padding:'10px 10px', fontSize:12, fontWeight:600,
      border:'none', background:'none', cursor:'pointer',
      color: active ? color : '#A0AEC0',
      borderBottom: `2.5px solid ${active ? color : 'transparent'}`,
      marginBottom:-1, transition:'color .15s', whiteSpace:'nowrap',
    });

    /* ── Render ── */
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>

        {/* ── Sticky header ─────────────────────────────────── */}
        <div style={{
          position:'sticky', top:0, zIndex:200,
          background:'#0F2A35', color:'#FFF',
          padding:`calc(10px + var(--safe-top)) 16px 10px`,
          display:'flex', alignItems:'center', justifyContent:'space-between',
          boxShadow:'0 2px 10px rgba(0,0,0,0.25)',
        }}>
          <div>
            <div style={{fontSize:18, fontWeight:700, letterSpacing:.3}}>Baby Monitor</div>
            <div style={{fontSize:11, color:'#94A3B8', marginTop:1}}>
              {connected
                ? `${onlineDev.length} device${onlineDev.length!==1?'s':''} online`
                : 'Connecting…'}
              {storage && (
                <span
                  title={`Recordings ${formatStorageBytes(storage.recordings)} • Screenshots ${formatStorageBytes(storage.screenshots)} • Gallery ${formatStorageBytes(storage.gallery)}`}
                  style={{marginLeft:8, color:'#CBD5E0'}}
                >
                  · 💾 {formatStorageBytes(storage.total)}
                </span>
              )}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', justifyContent:'flex-end'}}>
            {authStatus?.enabled && (
              <div
                onClick={async () => {
                  if (authStatus.extended) {
                    showToast('Session already extended for 2 hours', 'info');
                    return;
                  }
                  const pw = await askPassword({
                    title:'⏱ Extend session to 2 hours',
                    message:'Keep this device signed in for 2 hours (ignores the normal session timeout). Enter password to confirm.',
                    confirmLabel:'Extend 2h',
                    confirmColor:'#38A169',
                  });
                  if (!pw || typeof pw !== 'string') return;
                  try {
                    const r = await fetch('/api/auth/extend', {
                      method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ password: pw, hours: 2 }),
                    });
                    const data = await r.json();
                    if (!r.ok) { showToast(data.error || 'Extend failed', 'error'); return; }
                    onExtended && onExtended(data);
                    showToast('Session extended for 2 hours', 'info');
                  } catch {
                    showToast('Network error', 'error');
                  }
                }}
                title={authStatus.extended ? 'Session extended for 2 hours' : 'Extend session for 2 hours'}
                style={{
                  display:'flex', alignItems:'center', gap:6, cursor:'pointer',
                  fontSize:11, fontWeight:600, color:'#FFF',
                  background: authStatus.extended ? '#38A169' : 'rgba(255,255,255,0.08)',
                  padding:'5px 10px', borderRadius:8,
                  border:`1px solid ${authStatus.extended ? '#68D391' : 'rgba(255,255,255,0.25)'}`,
                  whiteSpace:'nowrap', userSelect:'none',
                }}
              >
                <input
                  type="checkbox"
                  checked={!!authStatus.extended}
                  readOnly
                  onChange={()=>{}}
                  style={{width:14, height:14, cursor:'pointer', accentColor:'#38A169', pointerEvents:'none'}}
                />
                <span>⏱ 2h</span>
              </div>
            )}
            {apkInfo?.available && (
              <a href="/api/apk/download" style={{
                fontSize:12, fontWeight:600, color:'#38A169', background:'#F0FFF4',
                padding:'5px 12px', borderRadius:8, textDecoration:'none',
                border:'1px solid #C6F6D5', whiteSpace:'nowrap',
              }}>⬇ Get App</a>
            )}
            <span style={{
              width:10, height:10, borderRadius:'50%',
              background: connected ? '#38A169' : '#ECC94B',
              display:'inline-block', boxShadow:`0 0 0 3px ${connected?'#38A16944':'#ECC94B44'}`,
            }} className={connected?'':'blink'} />
          </div>
        </div>

        {/* ── Tabs ──────────────────────────────────────────── */}
        <div style={{
          background:'#FFF', borderBottom:'1px solid #E2E8F0',
          display:'flex', position:'sticky', top:58, zIndex:190,
          overflowX:'auto', WebkitOverflowScrolling:'touch',
          scrollbarWidth:'none', msOverflowStyle:'none',
        }}>
          {[
            { id:'devices',     label:'Devices',     count:devList.length,      color:'#4A90A4' },
            { id:'recordings',  label:'Records',     count:visibleTotalRec,     color:'#4A90A4' },
            { id:'screenshots', label:'Shots',       count:visibleTotalShot,    color:'#7B68AE' },
            { id:'gallery',     label:'Gallery',     count:visibleTotalGallery, color:'#E67E22' },
            { id:'favorites',   label:'★ Favorites', count:totalFav,            color:'#D69E2E' },
            { id:'trash',       label:'🗑 Recycle',  count:trash.items?.length||0, color:'#A0AEC0' },
            { id:'app',         label:'App',         count:0,                   color:'#DD6B20' },
            { id:'settings',    label:'⚙ Settings',  count:0,                   color:'#718096' },
          ].map(t => (
            <button key={t.id} style={tabStyle(tab===t.id, t.color)} onClick={()=>{
              setTab(t.id);
              if (t.id === 'gallery' && socketRef.current) {
                onlineDev.forEach(d => socketRef.current.emit('get_gallery_stats', { targetDeviceId: d.deviceId }));
              }
            }}>
              {t.label}
              {t.count>0 && (
                <span style={{marginLeft:3,fontSize:9,background:t.color,color:'#FFF',
                              padding:'1px 5px',borderRadius:8,verticalAlign:'middle'}}>{t.count}</span>
              )}
            </button>
          ))}
        </div>

        {/* ── Toast ─────────────────────────────────────────── */}
        <Toast toast={toast} onDismiss={()=>setToast(null)} />

        {/* ── Scrollable content ──────────────────────────────
             paddingBottom must match the bottom action bar's height (it's
             a fixed-height 2-row bar = ~108px) so the last device card is
             never hidden under it. */}
        <div style={{
          flex:1, padding:'14px 12px',
          paddingBottom:`calc(${tab==='devices'&&onlineDev.length>0 ? '120' : '24'}px + var(--safe-bottom))`,
        }}>

          {/* DEVICES */}
          {tab === 'devices' && (
            devList.length === 0
              ? <Empty icon="📱" title="No devices connected" sub="Open the Baby Monitor app on an Android device to get started" />
              : devList.map(dev => (
                  <DeviceCard
                    key={dev.deviceId}
                    dev={dev}
                    selectedDuration={duration}
                    onRecord={record}
                    onStop={stop}
                    onScreenshot={shot}
                    onBurstStart={burstStart}
                    onBurstStop={burstStop}
                    burstStatus={liveBursts[dev.deviceId]}
                    onRename={rename}
                    onSetAudioSource={setAudioSource}
                    onTestAudio={testAudio}
                    onDeleteDevice={deleteDevice}
                    onGetGalleryStats={getGalleryStats}
                    timer={timers[dev.deviceId]}
                    ssStatus={ssStatus[dev.deviceId]}
                    audioTesting={!!audioTesting[dev.deviceId]}
                    note={notes.devices?.[dev.deviceId]?._device || ''}
                    onSaveNote={saveNote}
                  />
                ))
          )}

          {/* RECORDINGS */}
          {tab === 'recordings' && (
            <>
              {Object.keys(recordings).length > 0 && (
                <RecordingsFilterBar
                  recordings={recordings}
                  devices={devices}
                  notes={notes}
                  favorites={favorites}
                  authStatus={authStatus}
                  askPassword={askPassword}
                  showToast={showToast}
                  onAfterDelete={fetchRec}
                />
              )}
              {Object.keys(visibleRec).length === 0
                ? <Empty icon="🎙" title="No recordings yet" sub="Start a recording from the Devices tab" />
                : Object.entries(visibleRec).map(([id, g]) => (
                    <RecGroup key={id} deviceId={id} group={g}
                      onDelete={delRec} onDeleteAll={delAllRec} onDateDelete={delDateRec}
                      onZipAll={(d)=>zipDeviceRec(d, g.recordings.map(r=>r.filename))}
                      onZipDate={zipDateRec}
                      onStar={(d,f)=>addFav('recordings',d,f)}
                      favSet={favSetFor('recordings', id)}
                      notesMap={notes.recordings?.[id]}
                      onSaveNote={saveNote}
                      onEnhance={enhanceRec}
                      enhancingEngines={enhancingRec}
                    />
                  ))}
            </>
          )}

          {/* SCREENSHOTS */}
          {tab === 'screenshots' && (
            Object.keys(visibleShot).length === 0
              ? <Empty icon="🖼" title="No screenshots yet" sub="Take screenshots from the Devices tab" />
              : Object.entries(visibleShot).map(([id, g]) => (
                  <ShotGroup key={id} deviceId={id} group={g}
                    onDelete={delShot} onDeleteAll={delAllShot} onDateDelete={delDateShot} onLightbox={setLightbox}
                    onZipAll={(d)=>zipDeviceShot(d, g.screenshots.map(s=>s.filename))}
                    onZipDate={zipDateShot}
                    onStar={(d,f)=>addFav('screenshots',d,f)}
                    favSet={favSetFor('screenshots', id)}
                    notesMap={notes.screenshots?.[id]}
                    onSaveNote={saveNote}
                  />
                ))
          )}

          {/* FAVORITES */}
          {tab === 'favorites' && (
            totalFav === 0
              ? <Empty icon="★" title="No favorites yet" sub="Tap ☆ on any recording, screenshot, or gallery image to add it here" />
              : (() => {
                  const ids = new Set([
                    ...Object.keys(favRec), ...Object.keys(favShot), ...Object.keys(favGallery)
                  ]);
                  return [...ids].map(id => (
                    <div key={id}>
                      {favRec[id] && (
                        <RecGroup deviceId={id} group={favRec[id]}
                          onDelete={delFavRec} onDateDelete={delFavDateRec} inFavorites
                          onZipAll={(d)=>zipDeviceRec(d, favRec[id].recordings.map(r=>r.filename))}
                          onZipDate={zipDateRec}
                          notesMap={notes.recordings?.[id]} onSaveNote={saveNote}
                          onEnhance={enhanceRec} enhancingSet={enhancingRec} />
                      )}
                      {favShot[id] && (
                        <ShotGroup deviceId={id} group={favShot[id]}
                          onDelete={delFavShot} onDateDelete={delFavDateShot} onLightbox={setLightbox} inFavorites
                          onZipAll={(d)=>zipDeviceShot(d, favShot[id].screenshots.map(s=>s.filename))}
                          onZipDate={zipDateShot}
                          notesMap={notes.screenshots?.[id]} onSaveNote={saveNote} />
                      )}
                      {favGallery[id] && (
                        <GalleryGroup deviceId={id} group={favGallery[id]}
                          onDelete={delFavGallery} onDateDelete={delFavDateGallery} onLightbox={setLightbox} inFavorites
                          onZipAll={(d)=>zipDeviceGallery(d, favGallery[id].images.map(i=>i.filename))}
                          onZipDate={zipDateGallery}
                          notesMap={notes.gallery?.[id]} onSaveNote={saveNote} />
                      )}
                    </div>
                  ));
                })()
          )}

          {/* RECYCLE BIN */}
          {tab === 'trash' && (
            <TrashTab
              items={trash.items || []}
              onRestore={restoreFromTrash}
              onEmpty={emptyTrash}
            />
          )}

          {/* GALLERY */}
          {tab === 'gallery' && (
            <div>
              {/* Gallery stats cards for online devices */}
              {onlineDev.length > 0 && (
                <div style={{marginBottom:16}}>
                  {onlineDev.map(dev => (
                    <GalleryStatsCard
                      key={dev.deviceId}
                      deviceId={dev.deviceId}
                      deviceName={dev.deviceName}
                      stats={galleryStats[dev.deviceId]}
                      onGetLatest={getLatestImages}
                      onGetByFolder={getImagesByFolder}
                      onFlexQuery={flexGalleryQuery}
                      progress={galleryProgress[dev.deviceId]}
                    />
                  ))}
                </div>
              )}

              {/* Downloaded gallery images */}
              {Object.keys(visibleGallery).length === 0
                ? <Empty icon="🖼" title="No gallery images yet" sub="Use the Gallery button on a device to fetch images" />
                : Object.entries(visibleGallery).map(([id, g]) => (
                    <GalleryGroup key={id} deviceId={id} group={g}
                      onDelete={delGallery} onDeleteAll={delAllGallery} onDateDelete={delDateGallery} onLightbox={setLightbox}
                      onZipAll={(d)=>zipDeviceGallery(d, g.images.map(i=>i.filename))}
                      onZipDate={zipDateGallery}
                      onStar={(d,f)=>addFav('gallery',d,f)}
                      favSet={favSetFor('gallery', id)}
                      notesMap={notes.gallery?.[id]}
                      onSaveNote={saveNote}
                    />
                  ))
              }
            </div>
          )}

          {/* APP MANAGEMENT */}
          {tab === 'app' && (
            <div>
              <Card style={{padding:20, marginBottom:16}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Download Android App
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Install the Baby Monitor app on your Android phone to enable remote recording and screenshots.
                </div>

                {apkInfo?.available ? (
                  <div>
                    <a href="/api/apk/download" style={{textDecoration:'none', display:'block'}}>
                      <Btn full color="#38A169">
                        ⬇ Download APK ({fmtSize(apkInfo.size)})
                      </Btn>
                    </a>
                    <div style={{fontSize:11, color:'#A0AEC0', marginTop:8, textAlign:'center'}}>
                      Last updated: {fmtDate(apkInfo.updatedAt)}
                    </div>
                  </div>
                ) : (
                  <div style={{textAlign:'center', padding:'20px 0', color:'#A0AEC0', fontSize:13}}>
                    No APK uploaded yet
                  </div>
                )}
              </Card>

              <Card style={{padding:20}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Upload New APK
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Upload a new version of the Android app. This replaces the current download.
                </div>
                <label style={{
                  display:'flex', alignItems:'center', justifyContent:'center',
                  height:100, borderRadius:12, cursor: apkUploading ? 'wait' : 'pointer',
                  border:'2px dashed #CBD5E0', background:'#F7FAFC',
                  color: apkUploading ? '#A0AEC0' : '#4A90A4',
                  fontSize:14, fontWeight:600,
                  transition:'border-color .2s',
                }}>
                  <input
                    type="file"
                    accept=".apk"
                    style={{display:'none'}}
                    disabled={apkUploading}
                    onChange={e => {
                      if (e.target.files[0]) uploadApk(e.target.files[0]);
                      e.target.value = '';
                    }}
                  />
                  {apkUploading ? '⏳ Uploading…' : '📦 Tap to select APK file'}
                </label>
              </Card>
            </div>
          )}

          {/* SETTINGS */}
          {tab === 'settings' && (
            <SettingsScreen
              authCfg={authStatus}
              onUpdated={onAuthUpdated}
              onToast={showToast}
              onLogout={onLogout}
              customDurations={customDurations}
              onCustomDurationsChange={(next)=>{ setCustomDurations(next); persistCustomDurations(next); }}
              devices={devices}
              autoRecord={autoRecord}
              onAutoRecordRefresh={fetchAutoRecord}
              autoShot={autoShot}
              onAutoShotRefresh={fetchAutoShot}
            />
          )}
        </div>

        {/* ── Floating action bar (Devices tab only) ───────────
             Two deterministic rows of fixed height. Never wraps,
             never overflows the device cards above it.              */}
        {tab === 'devices' && onlineDev.length > 0 && (
          <div style={{
            position:'fixed', bottom:0, left:0, right:0, zIndex:180,
            background:'#FFF', borderTop:'1px solid #E2E8F0',
            padding:`8px 10px calc(8px + var(--safe-bottom))`,
            display:'flex', flexDirection:'column', gap:7,
            boxSizing:'border-box',
            boxShadow:'0 -2px 14px rgba(0,0,0,0.09)',
          }}>
            {/* Row 1 — Duration controls (compact, fits any phone width) */}
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <span style={{fontSize:11, fontWeight:700, color:'#718096', flexShrink:0, letterSpacing:0.3}}>
                ⏱ DURATION
              </span>
              <select
                value={mergedDurations.some(d=>d.value===duration) ? duration : ''}
                onChange={e=>{ if (e.target.value) setDuration(Number(e.target.value)); }}
                style={{
                  flex:'1 1 0', minWidth:0, height:36, padding:'0 8px', fontSize:13, fontWeight:600,
                  borderRadius:8, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
                  color:'#2D3748', WebkitAppearance:'none', cursor:'pointer',
                }}
              >
                <option value="" disabled>Custom…</option>
                {mergedDurations.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
              </select>
              <input
                type="number" min="1" step="1" inputMode="numeric"
                placeholder="min"
                value={Math.round(duration/60) || ''}
                onChange={e=>{
                  const n = parseInt(e.target.value, 10);
                  if (!isNaN(n) && n > 0) setDuration(n * 60);
                  else if (e.target.value === '') setDuration(0);
                }}
                title="Custom minutes"
                style={{
                  flexShrink:0, width:60, height:36, padding:'0 8px', fontSize:13, fontWeight:600,
                  borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF',
                  color:'#2D3748', textAlign:'center',
                }}
              />
            </div>

            {/* Row 2 — Bulk action buttons. Equal-flex so they share the
                width and never wrap. Stop only appears while recording. */}
            <div style={{display:'flex', gap:6}}>
              <button
                onClick={recordAll}
                disabled={onlineDev.every(d=>d.isRecording)}
                style={{
                  flex:'2 1 0', minWidth:0, height:42, padding:'0 10px', fontSize:13, fontWeight:700,
                  borderRadius:9, border:'none',
                  background: onlineDev.every(d=>d.isRecording) ? '#E2E8F0' : '#4A90A4',
                  color: onlineDev.every(d=>d.isRecording) ? '#A0AEC0' : '#FFF',
                  cursor: onlineDev.every(d=>d.isRecording) ? 'not-allowed' : 'pointer',
                  display:'flex', alignItems:'center', justifyContent:'center', gap:4,
                  whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                  boxShadow:'0 1px 2px rgba(0,0,0,0.06)',
                }}
              >◉ Record All ({onlineDev.length})</button>
              {anyRec && (
                <button
                  onClick={stopAll}
                  title="Stop all recordings"
                  style={{
                    flex:'1 1 0', minWidth:0, height:42, padding:'0 10px', fontSize:13, fontWeight:700,
                    borderRadius:9, border:'1.5px solid #E53E3E', background:'#FFF', color:'#E53E3E',
                    cursor:'pointer', whiteSpace:'nowrap',
                  }}
                >■ Stop</button>
              )}
              <button
                onClick={shotAll}
                title="Screenshot all online devices"
                style={{
                  flex:'1 1 0', minWidth:0, height:42, padding:'0 10px', fontSize:14, fontWeight:700,
                  borderRadius:9, border:'none', background:'#7B68AE', color:'#FFF',
                  cursor:'pointer', boxShadow:'0 1px 2px rgba(0,0,0,0.06)',
                }}
              >📷</button>
            </div>
          </div>
        )}

        {/* ── Password modal ────────────────────────────────── */}
        <PasswordModal prompt={passPrompt} />

        {/* ── Burst duration modal (independent of footer duration) ── */}
        <BurstDurationModal prompt={burstPrompt} />

        {/* ── Lightbox ──────────────────────────────────────── */}
        {lightbox && (
          <div
            onClick={()=>setLightbox(null)}
            style={{
              position:'fixed', inset:0, zIndex:600,
              background:'rgba(0,0,0,0.92)',
              display:'flex', alignItems:'center', justifyContent:'center',
              padding:16, cursor:'zoom-out',
            }}
          >
            <img
              src={lightbox}
              style={{maxWidth:'100%', maxHeight:'100%', borderRadius:8, objectFit:'contain'}}
            />
            <button
              onClick={()=>setLightbox(null)}
              style={{
                position:'absolute', top:16, right:16,
                width:40, height:40, borderRadius:20, fontSize:18,
                background:'rgba(255,255,255,0.2)', color:'#FFF', border:'none',
              }}
            >✕</button>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
