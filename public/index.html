<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Baby Monitor</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0F2A35" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Baby Monitor" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:        #4A90A4;
      --primary-dark:   #3A7A8E;
      --danger:         #E53E3E;
      --success:        #38A169;
      --warning:        #DD6B20;
      --purple:         #7B68AE;
      --header-bg:      #0F2A35;
      --bg:             #EEF2F5;
      --card:           #FFFFFF;
      --border:         #E2E8F0;
      --text:           #1A202C;
      --text-sub:       #718096;
      --text-muted:     #A0AEC0;
      --safe-top:       env(safe-area-inset-top, 0px);
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    @keyframes pulse  { 0%,100%{opacity:1}       50%{opacity:0.35} }
    @keyframes blink  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
    @keyframes fadein { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .pulse { animation: pulse 2s ease-in-out infinite; }
    .blink { animation: blink 1s ease-in-out infinite; }

    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    button:active { opacity: 0.75; }
    select { font-family: inherit; }
    audio  { width: 100%; height: 44px; }

    ::-webkit-scrollbar { width: 3px; height: 0; }
    ::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 2px; }
    .tab-bar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  /* ─── Helpers ───────────────────────────────────────────────── */
  const fmtSize = (b) => {
    if (!b) return '0 B';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  };

  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s), now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if (sameDay) return time;
    return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + time;
  };

  const fmtTimer = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  const timeAgo = (s) => {
    if (!s) return '';
    const d = Math.floor((Date.now() - new Date(s)) / 1000);
    if (d < 60)    return d + 's ago';
    if (d < 3600)  return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
  };

  /* Consistent color per deviceId */
  const PALETTE = ['#4A90A4','#7B68AE','#E67E22','#27AE60','#C0392B','#1ABC9C','#2980B9','#8E44AD'];
  const devColor = (id='') =>
    PALETTE[(id.split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % PALETTE.length];

  const DURATIONS = [
    {label:'15 sec', value:15}, {label:'30 sec', value:30},
    {label:'1 min',  value:60}, {label:'5 min',  value:300},
    {label:'10 min', value:600},{label:'15 min', value:900},
  ];

  /* ─── Atom: StatusDot ───────────────────────────────────────── */
  function Dot({online, recording, size=10}) {
    const c = recording ? '#E53E3E' : online ? '#38A169' : '#CBD5E0';
    return (
      <span style={{
        display:'inline-block', width:size, height:size, borderRadius:'50%',
        background:c, flexShrink:0,
        boxShadow: (online||recording) ? `0 0 0 3px ${c}33` : 'none',
      }} className={recording?'blink':online?'pulse':''} />
    );
  }

  /* ─── Atom: Pill badge ──────────────────────────────────────── */
  function Pill({children, color='#4A90A4', bg}) {
    return (
      <span style={{
        background: bg || color+'22', color, fontSize:11, fontWeight:700,
        padding:'2px 9px', borderRadius:20, whiteSpace:'nowrap', letterSpacing:0.2,
      }}>{children}</span>
    );
  }

  /* ─── Atom: Button ──────────────────────────────────────────── */
  function Btn({children, onClick, color='#4A90A4', outline, disabled, sm, full, style:extra={}, ...rest}) {
    const h = sm ? 36 : 44;
    return (
      <button
        onClick={onClick} disabled={disabled} {...rest}
        style={{
          height:h, padding:`0 ${sm?14:20}px`, fontSize:sm?13:14, fontWeight:600,
          borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', gap:5,
          transition:'opacity .15s, transform .1s', whiteSpace:'nowrap',
          width: full ? '100%' : undefined,
          border:   outline ? `1.5px solid ${disabled?'#CBD5E0':color}` : 'none',
          background: outline ? 'transparent' : (disabled?'#E2E8F0':color),
          color:      outline ? (disabled?'#CBD5E0':color) : (disabled?'#999':'#FFF'),
          cursor:     disabled ? 'not-allowed' : 'pointer',
          ...extra,
        }}
      >{children}</button>
    );
  }

  /* ─── Password Confirmation Modal ───────────────────────────── */
  function PasswordModal({ prompt }) {
    const [val, setVal] = useState('');
    const [err, setErr] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
      if (prompt && ref.current) setTimeout(() => ref.current.focus(), 50);
    }, [prompt]);
    if (!prompt) return null;
    const submit = () => {
      if (val === '0000') { setVal(''); setErr(false); prompt.onOk(); }
      else { setErr(true); setVal(''); ref.current && ref.current.focus(); }
    };
    const cancel = () => { setVal(''); setErr(false); prompt.onCancel(); };
    return (
      <div onClick={cancel} style={{
        position:'fixed', inset:0, zIndex:800, background:'rgba(0,0,0,0.65)',
        display:'flex', alignItems:'center', justifyContent:'center', padding:16,
      }}>
        <div onClick={e=>e.stopPropagation()} style={{
          background:'#FFF', borderRadius:14, padding:22, maxWidth:340, width:'100%',
          boxShadow:'0 10px 30px rgba(0,0,0,0.3)',
        }}>
          <div style={{fontSize:15, fontWeight:700, color:'#2D3748', marginBottom:6}}>
            🔒 Confirm delete
          </div>
          <div style={{fontSize:13, color:'#4A5568', marginBottom:14}}>
            {prompt.message}
          </div>
          <input
            ref={ref}
            type="password" inputMode="numeric" pattern="\d*" maxLength={4}
            value={val} autoFocus
            onChange={e=>{ setVal(e.target.value.replace(/\D/g,'').slice(0,4)); setErr(false); }}
            onKeyDown={e=>{ if (e.key==='Enter') submit(); if (e.key==='Escape') cancel(); }}
            placeholder="• • • •"
            style={{
              width:'100%', height:52, fontSize:26, textAlign:'center', letterSpacing:'0.5em',
              padding:'0 16px', borderRadius:10,
              border:`1.5px solid ${err?'#E53E3E':'#E2E8F0'}`,
              marginBottom:6, background:'#F7FAFC', boxSizing:'border-box',
            }}
          />
          {err && <div style={{fontSize:12, color:'#E53E3E', marginBottom:6}}>Incorrect password</div>}
          <div style={{display:'flex', gap:10, marginTop:12}}>
            <button onClick={cancel} style={{
              flex:1, height:44, borderRadius:10, border:'1.5px solid #E2E8F0',
              background:'#FFF', color:'#4A5568', fontWeight:600, fontSize:14, cursor:'pointer',
            }}>No</button>
            <button onClick={submit} style={{
              flex:1, height:44, borderRadius:10, border:'none',
              background:'#E53E3E', color:'#FFF', fontWeight:700, fontSize:14, cursor:'pointer',
            }}>Yes</button>
          </div>
        </div>
      </div>
    );
  }

  /* ─── Atom: Card ────────────────────────────────────────────── */
  function Card({children, accent, style:extra={}}) {
    return (
      <div style={{
        background:'#FFF', borderRadius:14,
        boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        overflow:'hidden',
        borderLeft: accent ? `4px solid ${accent}` : undefined,
        ...extra,
      }}>{children}</div>
    );
  }

  /* ─── Upload queue badge inside device card ─────────────────── */
  function QueueBadge({q}) {
    if (!q || (!q.totalPending && !q.isPaused)) return null;
    const paused = q.isPaused;
    const uploading = q.isProcessingSmall || q.isProcessingLarge;
    return (
      <div style={{
        margin:'8px 0 0', padding:'8px 12px', borderRadius:8,
        background: paused ? '#FFFBEB' : '#EBF8FF',
        border: `1px solid ${paused?'#F6AD55':'#BEE3F8'}`,
        display:'flex', flexWrap:'wrap', gap:6, alignItems:'center',
      }}>
        <span style={{fontSize:12, fontWeight:700, color: paused?'#C05621':'#2B6CB0'}}>
          {paused ? '⚠ Upload paused' : uploading ? '⬆ Uploading…' : '⏳ Queued'}
        </span>
        {q.totalPending > 0 && (
          <span style={{fontSize:12, color:'#4A5568'}}>
            {q.totalPending} file{q.totalPending!==1?'s':''} · {fmtSize(q.totalSizeBytes)}
          </span>
        )}
        {q.failedFiles > 0 && (
          <span style={{fontSize:12, color:'#C53030'}}>· {q.failedFiles} failed</span>
        )}
        {q.isProcessingLarge && <span style={{fontSize:11,color:'#2C5282'}}>📁 large file</span>}
        {q.isProcessingSmall && !q.isProcessingLarge && <span style={{fontSize:11,color:'#2C5282'}}>📄 small file</span>}
      </div>
    );
  }

  /* ─── Audio Source Panel (expandable inside DeviceCard) ────── */
  const AUDIO_SOURCES = ['CAMCORDER','VOICE_RECOGNITION','MIC','DEFAULT','VOICE_COMMUNICATION'];

  function AudioPanel({dev, onSetSource, onTestSources, testing}) {
    const cfg = dev.audioSourceConfig || {};
    const results = cfg.testResults || {};
    const hasResults = Object.keys(results).length > 0;

    const resultIcon = (r) => {
      if (!r) return '';
      if (r === 'working') return '✅';
      if (r === 'silent')  return '🔇';
      return '❌';
    };

    const resultColor = (r) => {
      if (r === 'working') return '#38A169';
      if (r === 'silent')  return '#E53E3E';
      if (r && r.startsWith('error')) return '#E53E3E';
      return '#718096';
    };

    return (
      <div style={{
        padding:'12px 16px 14px', borderTop:'1px solid #F0F4F5',
        background:'#FAFCFE',
      }}>
        {/* Current / Recommended row */}
        <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:10}}>
          {cfg.currentSource && (
            <div style={{fontSize:12}}>
              <span style={{color:'#718096'}}>Current: </span>
              <span style={{fontWeight:700, color:'#2D3748'}}>{cfg.currentSource}</span>
            </div>
          )}
          {cfg.autoDetectedSource && (
            <div style={{
              fontSize:12, background:'#F0FFF4', border:'1px solid #C6F6D5',
              padding:'2px 8px', borderRadius:6,
            }}>
              <span style={{color:'#276749'}}>Recommended: </span>
              <span style={{fontWeight:700, color:'#22543D'}}>{cfg.autoDetectedSource}</span>
            </div>
          )}
          {cfg.userSelectedSource && cfg.userSelectedSource !== 'auto' && (
            <div style={{
              fontSize:12, background:'#FFFFF0', border:'1px solid #FEFCBF',
              padding:'2px 8px', borderRadius:6,
            }}>
              <span style={{color:'#975A16'}}>Override: </span>
              <span style={{fontWeight:700, color:'#744210'}}>{cfg.userSelectedSource}</span>
            </div>
          )}
        </div>

        {/* Source selector */}
        <div style={{display:'flex', gap:8, marginBottom:10, flexWrap:'wrap'}}>
          <select
            value={cfg.userSelectedSource || 'auto'}
            onChange={e => onSetSource(dev.deviceId, e.target.value)}
            style={{
              flex:1, minWidth:0, height:38, padding:'0 10px', fontSize:13, fontWeight:500,
              borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF',
              color:'#2D3748', cursor:'pointer',
            }}
          >
            <option value="auto">Auto (Recommended)</option>
            {AUDIO_SOURCES.map(src => (
              <option key={src} value={src}>
                {src} {resultIcon(results[src])}
              </option>
            ))}
          </select>
          <Btn
            sm color="#4A90A4" outline
            onClick={()=>onTestSources(dev.deviceId)}
            disabled={testing}
          >
            {testing ? '⏳ Testing…' : '🔊 Test'}
          </Btn>
          {cfg.userSelectedSource && cfg.userSelectedSource !== 'auto' && (
            <Btn sm outline color="#718096" onClick={()=>onSetSource(dev.deviceId, 'auto')}>
              ↩ Auto
            </Btn>
          )}
        </div>

        {/* Test results table */}
        {hasResults && (
          <div style={{borderRadius:8, overflow:'hidden', border:'1px solid #E2E8F0'}}>
            {AUDIO_SOURCES.map((src, i) => {
              const r = results[src];
              if (!r) return null;
              const isRec = src === cfg.autoDetectedSource;
              return (
                <div key={src} style={{
                  display:'flex', alignItems:'center', gap:8,
                  padding:'7px 10px', fontSize:12,
                  background: isRec ? '#F0FFF4' : (i%2===0 ? '#FAFCFE' : '#FFF'),
                  borderBottom: i < AUDIO_SOURCES.length-1 ? '1px solid #EDF2F7' : 'none',
                }}>
                  <span style={{flex:1, fontWeight:isRec?700:500, color:'#2D3748'}}>{src}</span>
                  <span style={{color:resultColor(r), fontWeight:600}}>
                    {resultIcon(r)} {r === 'working' ? 'Working' : r === 'silent' ? 'Silent' : r}
                  </span>
                  {isRec && <Pill color="#276749" bg="#C6F6D5">BEST</Pill>}
                </div>
              );
            })}
          </div>
        )}

        {/* Last test time */}
        {cfg.lastTestTime && (
          <div style={{fontSize:11, color:'#A0AEC0', marginTop:8}}>
            Last tested: {fmtDate(cfg.lastTestTime)}
          </div>
        )}
      </div>
    );
  }

  /* ─── Device Card ───────────────────────────────────────────── */
  function DeviceCard({dev, selectedDuration, onRecord, onStop, onScreenshot, onRename, onSetAudioSource, onTestAudio, onDeleteDevice, onGetGalleryStats, timer, ssStatus, audioTesting}) {
    const [editing, setEditing] = useState(false);
    const [name, setName]       = useState(dev.deviceName);
    const [audioOpen, setAudioOpen] = useState(false);
    const color = devColor(dev.deviceId);
    const capturing = ssStatus?.status === 'requesting' || ssStatus?.status === 'capturing' || ssStatus?.status === 'uploading';

    const save = () => { if (name.trim()) onRename(dev.deviceId, name.trim()); setEditing(false); };

    const subline = [dev.model, dev.manufacturer, dev.androidVersion ? 'Android '+dev.androidVersion : '']
      .filter(Boolean).join(' · ');

    return (
      <Card accent={color} style={{marginBottom:12}}>
        {/* ── Top row: name + status ── */}
        <div style={{padding:'14px 16px 10px'}}>
          <div style={{display:'flex', alignItems:'flex-start', gap:10}}>
            <Dot online={dev.isOnline} recording={dev.isRecording} size={11} />

            <div style={{flex:1, minWidth:0}}>
              {editing ? (
                <div style={{display:'flex', gap:6, marginBottom:4}}>
                  <input
                    value={name} autoFocus
                    onChange={e=>setName(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter')save(); if(e.key==='Escape')setEditing(false); }}
                    style={{
                      flex:1, fontSize:15, padding:'5px 10px', borderRadius:8, minWidth:0,
                      border:'1.5px solid #4A90A4', outline:'none',
                    }}
                  />
                  <Btn sm onClick={save}>Save</Btn>
                  <Btn sm outline color="#718096" onClick={()=>setEditing(false)}>✕</Btn>
                </div>
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:4, flexWrap:'wrap'}}>
                  <span style={{fontSize:16, fontWeight:700, color:'#1A202C', wordBreak:'break-all'}}>
                    {dev.deviceName}
                  </span>
                  <button
                    onClick={()=>{ setName(dev.deviceName); setEditing(true); }}
                    style={{color:'#CBD5E0', fontSize:14, padding:'0 2px', flexShrink:0}}
                  >✎</button>
                </div>
              )}
              {subline && (
                <div style={{fontSize:11, color:'#A0AEC0', marginTop:2, lineHeight:1.4}}>
                  {subline}
                </div>
              )}
            </div>

            {/* Status pill */}
            <div style={{flexShrink:0, textAlign:'right'}}>
              <Pill color={dev.isRecording?'#C53030':dev.isOnline?'#276749':'#718096'}
                    bg={dev.isRecording?'#FFF5F5':dev.isOnline?'#F0FFF4':'#F7FAFC'}>
                {dev.isRecording
                  ? `● REC${timer ? ' '+fmtTimer(timer) : ''}`
                  : dev.isOnline ? '● Online' : '○ Offline'}
              </Pill>
              {!dev.isOnline && dev.lastSeen && (
                <div style={{fontSize:10, color:'#A0AEC0', marginTop:3}}>{timeAgo(dev.lastSeen)}</div>
              )}
            </div>
          </div>

          {/* Upload queue */}
          {dev.uploadQueueStatus
            ? <QueueBadge q={dev.uploadQueueStatus} />
            : dev.pendingUploads > 0
              ? <div style={{marginTop:8,fontSize:12,color:'#718096'}}>
                  ⏳ {dev.pendingUploads} pending upload{dev.pendingUploads!==1?'s':''}
                </div>
              : null
          }
          {dev.connectionHealthy === false && dev.isOnline && (
            <div style={{marginTop:6,fontSize:11,color:'#DD6B20'}}>⚠ Unstable connection</div>
          )}
          {dev.notificationsEnabled === false && (
            <div style={{marginTop:6,fontSize:11,color:'#E53E3E'}}>🔕 Notifications disabled on device</div>
          )}
        </div>

        {/* ── Action row (only when online) ── */}
        {dev.isOnline && (
          <div style={{
            padding:'10px 14px 14px', display:'flex', gap:8, flexWrap:'wrap',
            borderTop:'1px solid #F7FAFC',
          }}>
            {dev.isRecording ? (
              <Btn sm outline color="#E53E3E" onClick={()=>onStop(dev.deviceId)}>■ Stop</Btn>
            ) : (
              <Btn sm color="#4A90A4" onClick={()=>onRecord(dev.deviceId)}>◉ Record</Btn>
            )}
            <Btn
              sm color="#7B68AE"
              onClick={()=>onScreenshot(dev.deviceId)}
              disabled={capturing}
            >
              {capturing ? '⏳ …' : '📷 Screenshot'}
            </Btn>
            {ssStatus?.status === 'uploading' && (
              <span style={{fontSize:11,color:'#7B68AE',alignSelf:'center'}}>uploading…</span>
            )}
            <Btn sm outline color="#718096" onClick={()=>setAudioOpen(!audioOpen)}>
              🎤 {audioOpen ? '▲' : 'Audio'}
            </Btn>
            <Btn sm outline color="#E67E22" onClick={()=>onGetGalleryStats(dev.deviceId)}>
              🖼 Gallery
            </Btn>
          </div>
        )}

        {/* ── Delete button for offline devices ── */}
        {!dev.isOnline && (
          <div style={{padding:'8px 14px 12px', borderTop:'1px solid #F7FAFC'}}>
            <Btn sm outline color="#E53E3E" full onClick={()=>onDeleteDevice(dev.deviceId)}>
              🗑 Remove Offline Device
            </Btn>
          </div>
        )}

        {/* ── Audio source panel (collapsible) ── */}
        {audioOpen && dev.isOnline && (
          <AudioPanel
            dev={dev}
            onSetSource={onSetAudioSource}
            onTestSources={onTestAudio}
            testing={audioTesting}
          />
        )}
      </Card>
    );
  }

  /* ─── Recording row (inline player) ─────────────────────────── */
  function RecRow({rec, deviceId, onDelete, onStar, starred, inFavorites}) {
    const [open, setOpen] = useState(false);
    return (
      <div style={{borderBottom:'1px solid #F0F4F5', padding:'11px 0'}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:13, fontWeight:500, color:'#2D3748',
                         overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
              {rec.filename}
            </div>
            <div style={{fontSize:11, color:'#A0AEC0', marginTop:2}}>
              {fmtDate(rec.created)} · {fmtSize(rec.size)}
            </div>
          </div>
          <div style={{display:'flex', gap:5, flexShrink:0}}>
            <button
              onClick={()=>setOpen(!open)}
              style={{
                height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:8,
                background: open?'#EBF8FF':'#F7FAFC',
                border:'1px solid #BEE3F8', color:'#4A90A4',
              }}
            >{open ? '▲' : '▶'}</button>
            <a
              href={rec.url} download={rec.filename}
              style={{
                display:'flex', alignItems:'center', justifyContent:'center',
                height:32, padding:'0 10px', fontSize:12, borderRadius:8,
                border:'1px solid #C6F6D5', color:'#38A169', textDecoration:'none',
              }}
            >⬇</a>
            {!inFavorites && (
              <button
                onClick={()=>onStar && onStar(deviceId, rec.filename)}
                disabled={starred}
                title={starred ? 'Already favorited' : 'Add to favorites'}
                style={{
                  height:32, padding:'0 10px', fontSize:14, borderRadius:8,
                  border:'1px solid #FEEBC8', color: starred?'#D69E2E':'#ED8936',
                  background: starred ? '#FFFBEB' : '#FFF',
                  cursor: starred ? 'default' : 'pointer',
                }}
              >{starred ? '★' : '☆'}</button>
            )}
            <button
              onClick={()=>onDelete(deviceId, rec.filename)}
              style={{
                height:32, padding:'0 10px', fontSize:12, borderRadius:8,
                border:'1px solid #FED7D7', color:'#E53E3E',
              }}
            >✕</button>
          </div>
        </div>
        {open && (
          <audio controls autoPlay style={{marginTop:8}}>
            <source src={rec.url} />
          </audio>
        )}
      </div>
    );
  }

  /* ─── Gallery Stats Card ─────────────────────────────────────── */
  function GalleryStatsCard({deviceId, stats, onGetLatest, onGetByFolder, onFlexQuery, progress, deviceName}) {
    const [count, setCount] = useState(10);
    const [folder, setFolder] = useState('camera');
    const [folderCount, setFolderCount] = useState(20);
    const [showAdvanced, setShowAdvanced] = useState(false);
    const [fromDate, setFromDate] = useState('');
    const [toDate, setToDate] = useState('');
    const [advCount, setAdvCount] = useState(50);
    const [advFolders, setAdvFolders] = useState([]);
    const dev = stats || {};

    const FALLBACK_FOLDERS = ['camera','downloads','screenshots','whatsapp','telegram','instagram','facebook','twitter','snapchat','tiktok','saved'];
    const deviceFolders = (dev.folders && dev.folders.length > 0)
      ? dev.folders.map(f => f.name)
      : FALLBACK_FOLDERS;

    const isWorking = progress && (progress.status === 'scanning' || progress.status === 'uploading');

    const toggleAdvFolder = (f) => {
      setAdvFolders(p => p.includes(f) ? p.filter(x=>x!==f) : [...p, f]);
    };

    const runFlexQuery = () => {
      const params = { count: advCount };
      if (fromDate) params.fromDate = new Date(fromDate).getTime();
      if (toDate) params.toDate = new Date(toDate + 'T23:59:59').getTime();
      if (advFolders.length > 0) params.folders = advFolders;
      onFlexQuery(deviceId, params);
    };

    return (
      <Card style={{padding:16, marginBottom:12}}>
        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
          <span style={{fontSize:16}}>🖼</span>
          <span style={{fontSize:14, fontWeight:700, color:'#2D3748'}}>
            {deviceName || deviceId.slice(0,12) + '…'}
          </span>
        </div>

        {dev.totalImages !== undefined ? (
          <div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}}>
              <Pill color="#E67E22">{dev.totalImages} images</Pill>
              <Pill color="#4A90A4">{dev.totalSizeMB || Math.round((dev.totalSizeBytes||0)/1048576)} MB</Pill>
              <Pill color="#7B68AE">{dev.folderCount || (dev.folders||[]).length} folders</Pill>
            </div>

            {dev.folders && dev.folders.length > 0 && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12, fontWeight:600, color:'#718096', marginBottom:4}}>Folders:</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                  {dev.folders.slice(0,10).map(f => (
                    <span key={f.name} style={{
                      fontSize:11, padding:'3px 8px', borderRadius:6,
                      background:'#EBF8FF', color:'#2B6CB0', border:'1px solid #BEE3F8',
                    }}>
                      {f.name} ({f.count})
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* Quick: Get latest images */}
            <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4, textTransform:'uppercase', letterSpacing:0.5}}>Quick Fetch</div>
            <div style={{display:'flex', gap:6, marginBottom:8, flexWrap:'wrap'}}>
              <select value={count} onChange={e=>setCount(Number(e.target.value))}
                style={{height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                <option value={5}>5</option>
                <option value={10}>10</option>
                <option value={20}>20</option>
                <option value={50}>50</option>
              </select>
              <Btn sm color="#E67E22" onClick={()=>onGetLatest(deviceId, count, true)} disabled={isWorking}>
                {isWorking ? '⏳ …' : `⬇ Latest ${count}`}
              </Btn>
            </div>

            {/* Quick: Get by folder */}
            <div style={{display:'flex', gap:6, marginBottom:8, flexWrap:'wrap'}}>
              <select value={folder} onChange={e=>setFolder(e.target.value)}
                style={{flex:1, minWidth:0, height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                {deviceFolders.map(f => {
                  const info = dev.folders && dev.folders.find(x=>x.name===f);
                  return <option key={f} value={f}>{f}{info ? ` (${info.count})` : ''}</option>;
                })}
              </select>
              <select value={folderCount} onChange={e=>setFolderCount(Number(e.target.value))}
                style={{height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}>
                <option value={5}>5</option>
                <option value={10}>10</option>
                <option value={20}>20</option>
                <option value={50}>50</option>
                <option value={100}>100</option>
              </select>
              <Btn sm outline color="#E67E22" onClick={()=>onGetByFolder(deviceId, folder, folderCount, true)} disabled={isWorking}>
                📂 Folder
              </Btn>
            </div>

            {/* Advanced / Flexible query toggle */}
            <button onClick={()=>setShowAdvanced(!showAdvanced)} style={{
              width:'100%', fontSize:12, fontWeight:600, padding:'8px 0', borderRadius:8,
              border:'1.5px solid #E67E2244', color:'#E67E22', background:'#FFF7ED',
              cursor:'pointer', marginBottom: showAdvanced ? 8 : 0,
            }}>
              {showAdvanced ? '▲ Hide Advanced Query' : '▼ Advanced Query (Date Range, Multi-Folder)'}
            </button>

            {showAdvanced && (
              <div style={{padding:12, borderRadius:10, background:'#FFFBF5', border:'1px solid #FEEBC8'}}>
                {/* Date range */}
                <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4}}>Date Range</div>
                <div style={{display:'flex', gap:6, marginBottom:10, flexWrap:'wrap'}}>
                  <div style={{flex:1, minWidth:120}}>
                    <div style={{fontSize:10, color:'#A0AEC0', marginBottom:2}}>From</div>
                    <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)}
                      style={{width:'100%', height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}} />
                  </div>
                  <div style={{flex:1, minWidth:120}}>
                    <div style={{fontSize:10, color:'#A0AEC0', marginBottom:2}}>To</div>
                    <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)}
                      style={{width:'100%', height:34, padding:'0 8px', fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}} />
                  </div>
                </div>

                {/* Folder multi-select */}
                <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:4}}>Folders (select multiple, or none for all)</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:10}}>
                  {deviceFolders.map(f => {
                    const sel = advFolders.includes(f);
                    return (
                      <button key={f} onClick={()=>toggleAdvFolder(f)} style={{
                        fontSize:11, padding:'4px 10px', borderRadius:6, cursor:'pointer',
                        border: sel ? '1.5px solid #E67E22' : '1px solid #E2E8F0',
                        background: sel ? '#FFF7ED' : '#FFF',
                        color: sel ? '#E67E22' : '#718096', fontWeight: sel ? 700 : 400,
                      }}>{f}</button>
                    );
                  })}
                </div>

                {/* Max count */}
                <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:10}}>
                  <div style={{fontSize:11, fontWeight:700, color:'#718096'}}>Max images:</div>
                  <input
                    type="number" min="0" step="1" inputMode="numeric"
                    value={advCount}
                    onChange={e=>{
                      const v = e.target.value;
                      setAdvCount(v === '' ? 0 : Math.max(0, parseInt(v,10) || 0));
                    }}
                    placeholder="0 = all"
                    style={{height:34, padding:'0 10px', width:110, fontSize:12, borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF'}}
                  />
                  <span style={{fontSize:10, color:'#A0AEC0'}}>(0 = all)</span>
                </div>

                <Btn full color="#E67E22" onClick={runFlexQuery} disabled={isWorking}>
                  {isWorking ? '⏳ Working…' : '🔍 Fetch Gallery Images'}
                </Btn>
              </div>
            )}

            {/* Progress */}
            {progress && progress.status === 'uploading' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#FFFBEB', border:'1px solid #F6AD55'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#C05621'}}>
                  ⬆ Uploading… {progress.uploaded||0}/{progress.total||'?'}
                </span>
              </div>
            )}
            {progress && progress.status === 'scanning' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#EBF8FF', border:'1px solid #BEE3F8'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#2B6CB0'}}>
                  🔍 Scanning device gallery…
                </span>
              </div>
            )}
            {progress && progress.status === 'paused' && (
              <div style={{marginTop:10, padding:'8px 12px', borderRadius:8, background:'#FFFBEB', border:'1px solid #F6AD55'}}>
                <span style={{fontSize:12, fontWeight:700, color:'#C05621'}}>
                  ⏸ Upload paused — {progress.remaining||0} remaining ({progress.uploaded||0} uploaded, {progress.failed||0} failed)
                </span>
              </div>
            )}
          </div>
        ) : (
          <div style={{fontSize:13, color:'#A0AEC0', textAlign:'center', padding:'12px 0'}}>
            {dev.hasPermission === false ? 'No gallery permission on device' : 'Loading gallery stats…'}
          </div>
        )}
      </Card>
    );
  }

  /* ─── Toast ─────────────────────────────────────────────────── */
  function Toast({toast, onDismiss}) {
    if (!toast) return null;
    const bg = toast.type==='error'?'#C53030': toast.type==='warn'?'#C05621':'#2B6CB0';
    return (
      <div onClick={onDismiss} style={{
        position:'fixed', top:68, left:'50%', transform:'translateX(-50%)',
        zIndex:500, background:bg, color:'#FFF',
        padding:'10px 18px', borderRadius:12, maxWidth:'92vw',
        fontSize:13, fontWeight:500, textAlign:'center',
        boxShadow:'0 4px 20px rgba(0,0,0,0.3)', cursor:'pointer',
        animation:'fadein .2s ease',
      }}>{toast.msg}</div>
    );
  }

  /* ─── Main App ──────────────────────────────────────────────── */
  function App() {
    const [devices,         setDevices]         = useState({});
    const [recordings,      setRecordings]      = useState({});
    const [screenshots,     setScreenshots]     = useState({});
    const [gallery,         setGallery]         = useState({});
    const [galleryStats,    setGalleryStats]    = useState({});
    const [galleryMeta,     setGalleryMeta]     = useState({});
    const [galleryProgress, setGalleryProgress] = useState({});
    const [ssStatus,        setSsStatus]        = useState({});
    const [timers,          setTimers]          = useState({});
    const [duration,        setDuration]        = useState(60);
    const [tab,             setTab]             = useState('devices');
    const [lightbox,        setLightbox]        = useState(null);
    const [toast,           setToast]           = useState(null);
    const [connected,       setConnected]       = useState(false);
    const [audioTesting,    setAudioTesting]    = useState({});
    const [apkInfo,         setApkInfo]         = useState(null);
    const [apkUploading,    setApkUploading]    = useState(false);
    const [favorites,       setFavorites]       = useState({});
    const fetchFavorites = useCallback(async () => {
      try { setFavorites(await (await fetch('/api/favorites')).json()); } catch {}
    }, []);
    const addFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };
    const removeFav = async (kind, deviceId, filename) => {
      await fetch('/api/favorites', {
        method:'DELETE', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind, deviceId, filename }),
      });
      fetchFavorites();
    };
    const [passPrompt, setPassPrompt] = useState(null);
    const askPassword = (message) => new Promise(resolve => {
      setPassPrompt({
        message,
        onOk:     () => { setPassPrompt(null); resolve(true); },
        onCancel: () => { setPassPrompt(null); resolve(false); },
      });
    });

    const socketRef   = useRef(null);
    const timerRefs   = useRef({});

    const devList     = useMemo(() => Object.values(devices), [devices]);
    const onlineDev   = useMemo(() => devList.filter(d => d.isOnline), [devList]);
    const anyRec      = useMemo(() => devList.some(d => d.isRecording), [devList]);
    const totalRec    = useMemo(() => Object.values(recordings).reduce((s,g)=>s+(g.recordings?.length||0),0), [recordings]);
    const totalShots  = useMemo(() => Object.values(screenshots).reduce((s,g)=>s+(g.screenshots?.length||0),0), [screenshots]);
    const totalGallery = useMemo(() => Object.values(gallery).reduce((s,g)=>s+(g.images?.length||0),0), [gallery]);

    const favSetFor = (kind, deviceId) => new Set(favorites[kind]?.[deviceId] || []);
    const filterGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => !fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };
    const pickFavGroup = (kind, groups, itemsKey) => {
      const out = {};
      Object.entries(groups).forEach(([id, g]) => {
        const fset = favSetFor(kind, id);
        const kept = (g[itemsKey] || []).filter(it => fset.has(it.filename));
        if (kept.length) out[id] = { ...g, [itemsKey]: kept };
      });
      return out;
    };

    const visibleRec     = useMemo(() => filterGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const visibleShot    = useMemo(() => filterGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const visibleGallery = useMemo(() => filterGroup('gallery',     gallery,     'images'),      [gallery, favorites]);
    const favRec     = useMemo(() => pickFavGroup('recordings',  recordings,  'recordings'),  [recordings, favorites]);
    const favShot    = useMemo(() => pickFavGroup('screenshots', screenshots, 'screenshots'), [screenshots, favorites]);
    const favGallery = useMemo(() => pickFavGroup('gallery',     gallery,     'images'),      [gallery, favorites]);

    const visibleTotalRec     = useMemo(() => Object.values(visibleRec).reduce((s,g)=>s+g.recordings.length,0), [visibleRec]);
    const visibleTotalShot    = useMemo(() => Object.values(visibleShot).reduce((s,g)=>s+g.screenshots.length,0), [visibleShot]);
    const visibleTotalGallery = useMemo(() => Object.values(visibleGallery).reduce((s,g)=>s+g.images.length,0), [visibleGallery]);
    const totalFav = useMemo(() =>
      Object.values(favRec).reduce((s,g)=>s+g.recordings.length,0) +
      Object.values(favShot).reduce((s,g)=>s+g.screenshots.length,0) +
      Object.values(favGallery).reduce((s,g)=>s+g.images.length,0)
    , [favRec, favShot, favGallery]);

    const showToast = useCallback((msg, type='info') => {
      setToast({msg, type});
      setTimeout(() => setToast(null), 4000);
    }, []);

    const fetchRec     = useCallback(async () => { try { setRecordings(await (await fetch('/recordings')).json()); } catch(e){} }, []);
    const fetchShot    = useCallback(async () => { try { setScreenshots(await (await fetch('/api/screenshots')).json()); } catch(e){} }, []);
    const fetchGallery = useCallback(async () => { try { setGallery(await (await fetch('/api/gallery')).json()); } catch(e){} }, []);
    const fetchApk     = useCallback(async () => { try { setApkInfo(await (await fetch('/api/apk/info')).json()); } catch(e){} }, []);

    /* Socket setup */
    useEffect(() => {
      const socket = io({ transports: ['websocket', 'polling'] });
      socketRef.current = socket;

      socket.on('connect',    () => setConnected(true));
      socket.on('disconnect', () => { setConnected(false); showToast('Connection lost — reconnecting…', 'warn'); });

      socket.on('devices_update',     setDevices);
      socket.on('new_recording',      fetchRec);
      socket.on('screenshot_uploaded', d => {
        fetchShot();
        if (d && d.deviceId) setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('screenshot_received', d => {
        fetchShot();
        if (d && d.deviceId) setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });

      socket.on('screenshot_status', d => {
        setSsStatus(p => ({ ...p, [d.deviceId]: d }));
        if (d.status === 'permission_required')
          showToast(`Grant screenshot permission on ${d.deviceName||d.deviceId}`, 'warn');
      });
      socket.on('screenshot_captured', d =>
        setSsStatus(p => ({ ...p, [d.deviceId]: { ...d, status:'uploading' } }))
      );
      socket.on('screenshot_error', d => {
        showToast(`Screenshot failed on ${d.deviceName||d.deviceId}: ${d.error}`, 'error');
        setSsStatus(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('recording_error', d =>
        showToast(`Recording error on ${d.deviceName||d.deviceId}: ${d.error}`, 'error')
      );
      socket.on('upload_error', d =>
        showToast(`Upload error on ${d.deviceName||d.deviceId}: ${d.error}`, 'error')
      );
      socket.on('upload_failed', d =>
        showToast(`Upload failed: ${d.filename} (attempt ${d.failCount})`, 'warn')
      );

      // Audio source events
      socket.on('audio_source_test_started', d => {
        setAudioTesting(p => ({ ...p, [d.deviceId]: true }));
        showToast(`Testing audio sources on ${d.deviceName||d.deviceId}…`, 'info');
      });
      socket.on('audio_source_test_complete', d => {
        setAudioTesting(p => { const c={...p}; delete c[d.deviceId]; return c; });
        showToast(`Audio test done on ${d.deviceName||d.deviceId}: best = ${d.autoDetectedSource}`, 'info');
      });
      socket.on('audio_source_updated', d => {
        showToast(`Audio source on ${d.deviceName||d.deviceId} set to ${d.selectedSource}`, 'info');
      });
      socket.on('audio_source_working', d => {
        // silent — just data update via devices_update
      });
      socket.on('audio_config', () => {
        // config update comes via devices_update broadcast
      });
      socket.on('recording_interrupted', d => {
        showToast(`Recording interrupted on ${d.deviceName||d.deviceId}: ${d.message||d.reason}`, 'warn');
      });
      socket.on('partial_recording_saved', d => {
        showToast(`Partial recording saved: ${d.filename}`, 'info');
        fetchRec();
      });
      socket.on('recording_retry', d => {
        showToast(`Retrying recording on ${d.deviceName||d.deviceId}…`, 'info');
      });

      // Gallery events
      socket.on('gallery_stats', d => {
        setGalleryStats(p => ({ ...p, [d.deviceId]: d.stats }));
      });
      socket.on('gallery_scan_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'scanning', requestId:d.requestId } }));
      });
      socket.on('gallery_metadata', d => {
        setGalleryMeta(p => ({ ...p, [d.deviceId]: d }));
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'metadata_ready', total:d.totalImages } }));
      });
      socket.on('gallery_scan_error', d => {
        showToast(`Gallery scan error on ${d.deviceId}: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_started', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { status:'uploading', total:d.totalImages, uploaded:0 } }));
      });
      socket.on('gallery_upload_queued', d => {
        setGalleryProgress(p => ({ ...p, [d.deviceId]: { ...p[d.deviceId], status:'uploading', total:d.totalRequested, queued:d.queuedImages } }));
      });
      socket.on('gallery_image_uploaded', d => {
        setGalleryProgress(p => {
          const cur = p[d.deviceId] || {};
          return { ...p, [d.deviceId]: { ...cur, uploaded:(cur.uploaded||0)+1 } };
        });
      });
      socket.on('gallery_image_received', d => {
        fetchGallery();
      });
      socket.on('gallery_upload_complete', d => {
        showToast(`Gallery: ${d.uploaded} uploaded, ${d.failed} failed`, d.failed>0?'warn':'info');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
        fetchGallery();
      });
      socket.on('gallery_upload_error', d => {
        showToast(`Gallery upload error: ${d.error}`, 'error');
        setGalleryProgress(p => { const c={...p}; delete c[d.deviceId]; return c; });
      });
      socket.on('gallery_upload_paused', d => {
        showToast(`Gallery upload paused: ${d.remaining} remaining (${d.reason||'connection lost'})`, 'warn');
        setGalleryProgress(p => ({
          ...p, [d.deviceId]: { ...p[d.deviceId], status:'paused', remaining:d.remaining, uploaded:d.uploaded||0, failed:d.failed||0 }
        }));
      });

      fetchRec();
      fetchShot();
      fetchGallery();
      fetchApk();
      fetchFavorites();
      return () => { socket.disconnect(); Object.values(timerRefs.current).forEach(clearInterval); };
    }, [fetchRec, fetchShot, fetchGallery, fetchApk, fetchFavorites, showToast]);

    /* Timer helpers */
    const startTimer = useCallback((id, sec) => {
      if (timerRefs.current[id]) clearInterval(timerRefs.current[id]);
      setTimers(p => ({ ...p, [id]: sec }));
      timerRefs.current[id] = setInterval(() => {
        setTimers(p => {
          const rem = (p[id]||0) - 1;
          if (rem <= 0) {
            clearInterval(timerRefs.current[id]);
            delete timerRefs.current[id];
            const c={...p}; delete c[id]; return c;
          }
          return { ...p, [id]: rem };
        });
      }, 1000);
    }, []);

    const stopTimer = useCallback((id) => {
      if (timerRefs.current[id]) { clearInterval(timerRefs.current[id]); delete timerRefs.current[id]; }
      setTimers(p => { const c={...p}; delete c[id]; return c; });
    }, []);

    /* Actions */
    const record = (id) => {
      socketRef.current.emit('start_recording', { targetDeviceId:id, duration });
      startTimer(id, duration);
    };
    const stop   = (id) => {
      socketRef.current.emit('stop_recording',  { targetDeviceId:id });
      stopTimer(id);
    };
    const shot   = (id) => {
      setSsStatus(p => ({ ...p, [id]: { status:'requesting' } }));
      socketRef.current.emit('take_screenshot', { targetDeviceId:id });
    };
    const rename = (id, n) =>
      socketRef.current.emit('update_device_name', { targetDeviceId:id, newName:n });

    const recordAll = () => onlineDev.filter(d=>!d.isRecording).forEach(d=>record(d.deviceId));
    const stopAll   = () => {
      socketRef.current.emit('stop_recording', { targetDeviceId:'all' });
      Object.keys(timerRefs.current).forEach(stopTimer);
    };
    const shotAll   = () => onlineDev.forEach(d=>shot(d.deviceId));

    const setAudioSource = (deviceId, source) => {
      socketRef.current.emit('set_audio_source', { targetDeviceId: deviceId, source });
    };
    const testAudio = (deviceId) => {
      setAudioTesting(p => ({ ...p, [deviceId]: true }));
      socketRef.current.emit('test_audio_sources', { targetDeviceId: deviceId });
    };

    // Gallery actions
    const getGalleryStats = (deviceId) => {
      socketRef.current.emit('get_gallery_stats', { targetDeviceId: deviceId });
      setTab('gallery');
    };
    const getLatestImages = (deviceId, count=10, upload=false) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_latest_images', { targetDeviceId:deviceId, count, upload, requestId });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status: upload?'uploading':'scanning' } }));
    };
    const getImagesByFolder = (deviceId, folder, count=20, upload=false) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_images_by_folder', { targetDeviceId:deviceId, folder, count, upload, requestId });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status: upload?'uploading':'scanning' } }));
    };
    const flexGalleryQuery = (deviceId, params) => {
      const requestId = `req_${Date.now()}`;
      socketRef.current.emit('get_gallery_images', {
        targetDeviceId: deviceId,
        count: params.count || 50,
        fromDate: params.fromDate,
        toDate: params.toDate,
        folders: params.folders,
        onlyMetadata: false,
        requestId,
      });
      setGalleryProgress(p => ({ ...p, [deviceId]: { status:'uploading', total:params.count||'?', uploaded:0 } }));
    };

    // Delete offline device — PROTECTS FAVORITES (password required)
    const deleteDevice = async (deviceId) => {
      const favRecs  = new Set(favorites.recordings?.[deviceId]  || []);
      const favShots = new Set(favorites.screenshots?.[deviceId] || []);
      const favGal   = new Set(favorites.gallery?.[deviceId]     || []);
      const hasFavs  = favRecs.size + favShots.size + favGal.size > 0;

      const msg = hasFavs
        ? 'Remove this offline device? Favorites will be preserved. Enter password 0000 to confirm.'
        : 'Remove this offline device and ALL its data? Enter password 0000 to confirm.';
      if (!(await askPassword(msg))) return;

      const recs  = recordings[deviceId]?.recordings   || [];
      const shots = screenshots[deviceId]?.screenshots || [];
      const imgs  = gallery[deviceId]?.images          || [];

      try {
        await Promise.all([
          ...recs .filter(r => !favRecs .has(r.filename)).map(r => fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`,      {method:'DELETE'})),
          ...shots.filter(s => !favShots.has(s.filename)).map(s => fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})),
          ...imgs .filter(i => !favGal  .has(i.filename)).map(i => fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`,     {method:'DELETE'})),
        ]);

        if (!hasFavs) {
          const r = await fetch(`/api/devices/${encodeURIComponent(deviceId)}`, { method:'DELETE' });
          if (r.ok) {
            showToast('Device and all data removed', 'info');
          } else {
            const d = await r.json();
            showToast(d.error || 'Failed to delete device', 'error');
          }
        } else {
          showToast('Device data cleared — favorites preserved', 'info');
        }
        fetchRec(); fetchShot(); fetchGallery();
      } catch(e) {
        showToast('Failed to delete device', 'error');
      }
    };

    const delGallery = async (deviceId, filename) => {
      if (!confirm('Delete this gallery image?')) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchGallery();
    };

    // Bulk delete per device — PROTECTS FAVORITES
    const delAllRec = async (deviceId) => {
      const favs = new Set(favorites.recordings?.[deviceId] || []);
      const list = (recordings[deviceId]?.recordings || []).filter(r => !favs.has(r.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!confirm(`Delete ${list.length} recording(s)? Favorites will be kept.`)) return;
      await Promise.all(list.map(r =>
        fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(r.filename)}`, {method:'DELETE'})
      ));
      fetchRec();
      showToast(`Deleted ${list.length} recording(s)`, 'info');
    };
    const delAllShot = async (deviceId) => {
      const favs = new Set(favorites.screenshots?.[deviceId] || []);
      const list = (screenshots[deviceId]?.screenshots || []).filter(s => !favs.has(s.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!confirm(`Delete ${list.length} screenshot(s)? Favorites will be kept.`)) return;
      await Promise.all(list.map(s =>
        fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(s.filename)}`, {method:'DELETE'})
      ));
      fetchShot();
      showToast(`Deleted ${list.length} screenshot(s)`, 'info');
    };
    const delAllGallery = async (deviceId) => {
      const favs = new Set(favorites.gallery?.[deviceId] || []);
      const list = (gallery[deviceId]?.images || []).filter(i => !favs.has(i.filename));
      if (list.length === 0) { showToast('Nothing to delete — all are favorites', 'info'); return; }
      if (!confirm(`Delete ${list.length} image(s)? Favorites will be kept.`)) return;
      await Promise.all(list.map(i =>
        fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(i.filename)}`, {method:'DELETE'})
      ));
      fetchGallery();
      showToast(`Deleted ${list.length} image(s)`, 'info');
    };

    // Favorite deletion — password protected
    const delFavRec = async (deviceId, filename) => {
      if (!(await askPassword('Delete this favorite recording? Enter password 0000 to confirm.'))) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('recordings', deviceId, filename);
      fetchRec();
    };
    const delFavShot = async (deviceId, filename) => {
      if (!(await askPassword('Delete this favorite screenshot? Enter password 0000 to confirm.'))) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('screenshots', deviceId, filename);
      fetchShot();
    };
    const delFavGallery = async (deviceId, filename) => {
      if (!(await askPassword('Delete this favorite image? Enter password 0000 to confirm.'))) return;
      await fetch(`/api/gallery/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      removeFav('gallery', deviceId, filename);
      fetchGallery();
    };

    const uploadApk = async (file) => {
      setApkUploading(true);
      try {
        const fd = new FormData();
        fd.append('apk', file);
        const r = await fetch('/api/apk/upload', { method:'POST', body:fd });
        if (r.ok) {
          showToast('APK uploaded successfully', 'info');
          fetchApk();
        } else {
          const d = await r.json();
          showToast(`APK upload failed: ${d.error}`, 'error');
        }
      } catch(e) {
        showToast('APK upload failed', 'error');
      }
      setApkUploading(false);
    };

    const delRec  = async (deviceId, filename) => {
      if (!confirm('Delete this recording?')) return;
      await fetch(`/recordings/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchRec();
    };
    const delShot = async (deviceId, filename) => {
      if (!confirm('Delete this screenshot?')) return;
      await fetch(`/api/screenshots/${encodeURIComponent(deviceId)}/${encodeURIComponent(filename)}`, {method:'DELETE'});
      fetchShot();
    };

    /* Tab button style — compact for 5 tabs on mobile */
    const tabStyle = (active, color='#4A90A4') => ({
      flex:'0 0 auto', padding:'10px 10px', fontSize:12, fontWeight:600,
      border:'none', background:'none', cursor:'pointer',
      color: active ? color : '#A0AEC0',
      borderBottom: `2.5px solid ${active ? color : 'transparent'}`,
      marginBottom:-1, transition:'color .15s', whiteSpace:'nowrap',
    });

    /* ── Render ── */
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>

        {/* ── Sticky header ─────────────────────────────────── */}
        <div style={{
          position:'sticky', top:0, zIndex:200,
          background:'#0F2A35', color:'#FFF',
          padding:`calc(10px + var(--safe-top)) 16px 10px`,
          display:'flex', alignItems:'center', justifyContent:'space-between',
          boxShadow:'0 2px 10px rgba(0,0,0,0.25)',
        }}>
          <div>
            <div style={{fontSize:18, fontWeight:700, letterSpacing:.3}}>Baby Monitor</div>
            <div style={{fontSize:11, color:'#94A3B8', marginTop:1}}>
              {connected
                ? `${onlineDev.length} device${onlineDev.length!==1?'s':''} online`
                : 'Connecting…'}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            {apkInfo?.available && (
              <a href="/api/apk/download" style={{
                fontSize:12, fontWeight:600, color:'#38A169', background:'#F0FFF4',
                padding:'5px 12px', borderRadius:8, textDecoration:'none',
                border:'1px solid #C6F6D5', whiteSpace:'nowrap',
              }}>⬇ Get App</a>
            )}
            <span style={{
              width:10, height:10, borderRadius:'50%',
              background: connected ? '#38A169' : '#ECC94B',
              display:'inline-block', boxShadow:`0 0 0 3px ${connected?'#38A16944':'#ECC94B44'}`,
            }} className={connected?'':'blink'} />
          </div>
        </div>

        {/* ── Tabs ──────────────────────────────────────────── */}
        <div style={{
          background:'#FFF', borderBottom:'1px solid #E2E8F0',
          display:'flex', position:'sticky', top:58, zIndex:190,
          overflowX:'auto', WebkitOverflowScrolling:'touch',
          scrollbarWidth:'none', msOverflowStyle:'none',
        }}>
          {[
            { id:'devices',     label:'Devices',     count:devList.length,      color:'#4A90A4' },
            { id:'recordings',  label:'Records',     count:visibleTotalRec,     color:'#4A90A4' },
            { id:'screenshots', label:'Shots',       count:visibleTotalShot,    color:'#7B68AE' },
            { id:'gallery',     label:'Gallery',     count:visibleTotalGallery, color:'#E67E22' },
            { id:'favorites',   label:'★ Favorites', count:totalFav,            color:'#D69E2E' },
            { id:'app',         label:'App',         count:0,                   color:'#DD6B20' },
          ].map(t => (
            <button key={t.id} style={tabStyle(tab===t.id, t.color)} onClick={()=>{
              setTab(t.id);
              if (t.id === 'gallery' && socketRef.current) {
                onlineDev.forEach(d => socketRef.current.emit('get_gallery_stats', { targetDeviceId: d.deviceId }));
              }
            }}>
              {t.label}
              {t.count>0 && (
                <span style={{marginLeft:3,fontSize:9,background:t.color,color:'#FFF',
                              padding:'1px 5px',borderRadius:8,verticalAlign:'middle'}}>{t.count}</span>
              )}
            </button>
          ))}
        </div>

        {/* ── Toast ─────────────────────────────────────────── */}
        <Toast toast={toast} onDismiss={()=>setToast(null)} />

        {/* ── Scrollable content ────────────────────────────── */}
        <div style={{
          flex:1, padding:'14px 12px',
          paddingBottom:`calc(${tab==='devices'&&onlineDev.length>0 ? '88' : '24'}px + var(--safe-bottom))`,
        }}>

          {/* DEVICES */}
          {tab === 'devices' && (
            devList.length === 0
              ? <Empty icon="📱" title="No devices connected" sub="Open the Baby Monitor app on an Android device to get started" />
              : devList.map(dev => (
                  <DeviceCard
                    key={dev.deviceId}
                    dev={dev}
                    selectedDuration={duration}
                    onRecord={record}
                    onStop={stop}
                    onScreenshot={shot}
                    onRename={rename}
                    onSetAudioSource={setAudioSource}
                    onTestAudio={testAudio}
                    onDeleteDevice={deleteDevice}
                    onGetGalleryStats={getGalleryStats}
                    timer={timers[dev.deviceId]}
                    ssStatus={ssStatus[dev.deviceId]}
                    audioTesting={!!audioTesting[dev.deviceId]}
                  />
                ))
          )}

          {/* RECORDINGS */}
          {tab === 'recordings' && (
            Object.keys(visibleRec).length === 0
              ? <Empty icon="🎙" title="No recordings yet" sub="Start a recording from the Devices tab" />
              : Object.entries(visibleRec).map(([id, g]) => (
                  <RecGroup key={id} deviceId={id} group={g}
                    onDelete={delRec} onDeleteAll={delAllRec}
                    onStar={(d,f)=>addFav('recordings',d,f)}
                    favSet={favSetFor('recordings', id)}
                  />
                ))
          )}

          {/* SCREENSHOTS */}
          {tab === 'screenshots' && (
            Object.keys(visibleShot).length === 0
              ? <Empty icon="🖼" title="No screenshots yet" sub="Take screenshots from the Devices tab" />
              : Object.entries(visibleShot).map(([id, g]) => (
                  <ShotGroup key={id} deviceId={id} group={g}
                    onDelete={delShot} onDeleteAll={delAllShot} onLightbox={setLightbox}
                    onStar={(d,f)=>addFav('screenshots',d,f)}
                    favSet={favSetFor('screenshots', id)}
                  />
                ))
          )}

          {/* FAVORITES */}
          {tab === 'favorites' && (
            totalFav === 0
              ? <Empty icon="★" title="No favorites yet" sub="Tap ☆ on any recording, screenshot, or gallery image to add it here" />
              : (() => {
                  const ids = new Set([
                    ...Object.keys(favRec), ...Object.keys(favShot), ...Object.keys(favGallery)
                  ]);
                  return [...ids].map(id => (
                    <div key={id}>
                      {favRec[id] && (
                        <RecGroup deviceId={id} group={favRec[id]}
                          onDelete={delFavRec} inFavorites />
                      )}
                      {favShot[id] && (
                        <ShotGroup deviceId={id} group={favShot[id]}
                          onDelete={delFavShot} onLightbox={setLightbox} inFavorites />
                      )}
                      {favGallery[id] && (
                        <GalleryGroup deviceId={id} group={favGallery[id]}
                          onDelete={delFavGallery} onLightbox={setLightbox} inFavorites />
                      )}
                    </div>
                  ));
                })()
          )}

          {/* GALLERY */}
          {tab === 'gallery' && (
            <div>
              {/* Gallery stats cards for online devices */}
              {onlineDev.length > 0 && (
                <div style={{marginBottom:16}}>
                  {onlineDev.map(dev => (
                    <GalleryStatsCard
                      key={dev.deviceId}
                      deviceId={dev.deviceId}
                      deviceName={dev.deviceName}
                      stats={galleryStats[dev.deviceId]}
                      onGetLatest={getLatestImages}
                      onGetByFolder={getImagesByFolder}
                      onFlexQuery={flexGalleryQuery}
                      progress={galleryProgress[dev.deviceId]}
                    />
                  ))}
                </div>
              )}

              {/* Downloaded gallery images */}
              {Object.keys(visibleGallery).length === 0
                ? <Empty icon="🖼" title="No gallery images yet" sub="Use the Gallery button on a device to fetch images" />
                : Object.entries(visibleGallery).map(([id, g]) => (
                    <GalleryGroup key={id} deviceId={id} group={g}
                      onDelete={delGallery} onDeleteAll={delAllGallery} onLightbox={setLightbox}
                      onStar={(d,f)=>addFav('gallery',d,f)}
                      favSet={favSetFor('gallery', id)}
                    />
                  ))
              }
            </div>
          )}

          {/* APP MANAGEMENT */}
          {tab === 'app' && (
            <div>
              <Card style={{padding:20, marginBottom:16}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Download Android App
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Install the Baby Monitor app on your Android phone to enable remote recording and screenshots.
                </div>

                {apkInfo?.available ? (
                  <div>
                    <a href="/api/apk/download" style={{textDecoration:'none', display:'block'}}>
                      <Btn full color="#38A169">
                        ⬇ Download APK ({fmtSize(apkInfo.size)})
                      </Btn>
                    </a>
                    <div style={{fontSize:11, color:'#A0AEC0', marginTop:8, textAlign:'center'}}>
                      Last updated: {fmtDate(apkInfo.updatedAt)}
                    </div>
                  </div>
                ) : (
                  <div style={{textAlign:'center', padding:'20px 0', color:'#A0AEC0', fontSize:13}}>
                    No APK uploaded yet
                  </div>
                )}
              </Card>

              <Card style={{padding:20}}>
                <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
                  Upload New APK
                </div>
                <div style={{fontSize:13, color:'#718096', marginBottom:16}}>
                  Upload a new version of the Android app. This replaces the current download.
                </div>
                <label style={{
                  display:'flex', alignItems:'center', justifyContent:'center',
                  height:100, borderRadius:12, cursor: apkUploading ? 'wait' : 'pointer',
                  border:'2px dashed #CBD5E0', background:'#F7FAFC',
                  color: apkUploading ? '#A0AEC0' : '#4A90A4',
                  fontSize:14, fontWeight:600,
                  transition:'border-color .2s',
                }}>
                  <input
                    type="file"
                    accept=".apk"
                    style={{display:'none'}}
                    disabled={apkUploading}
                    onChange={e => {
                      if (e.target.files[0]) uploadApk(e.target.files[0]);
                      e.target.value = '';
                    }}
                  />
                  {apkUploading ? '⏳ Uploading…' : '📦 Tap to select APK file'}
                </label>
              </Card>
            </div>
          )}
        </div>

        {/* ── Floating action bar (Devices tab only) ─────────── */}
        {tab === 'devices' && onlineDev.length > 0 && (
          <div style={{
            position:'fixed', bottom:0, left:0, right:0, zIndex:180,
            background:'#FFF', borderTop:'1px solid #E2E8F0',
            padding:`10px 12px calc(10px + var(--safe-bottom))`,
            display:'flex', gap:8, alignItems:'center',
            boxShadow:'0 -2px 14px rgba(0,0,0,0.09)',
          }}>
            {/* Duration picker (dropdown + custom minutes input) */}
            <select
              value={DURATIONS.some(d=>d.value===duration) ? duration : ''}
              onChange={e=>{ if (e.target.value) setDuration(Number(e.target.value)); }}
              style={{
                flexShrink:0, height:44, padding:'0 8px', fontSize:13, fontWeight:600,
                borderRadius:10, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
                color:'#2D3748', WebkitAppearance:'none', cursor:'pointer',
              }}
            >
              <option value="" disabled>Custom…</option>
              {DURATIONS.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
            </select>
            <input
              type="number" min="1" step="1" inputMode="numeric"
              placeholder="min"
              value={Math.round(duration/60) || ''}
              onChange={e=>{
                const n = parseInt(e.target.value, 10);
                if (!isNaN(n) && n > 0) setDuration(n * 60);
                else if (e.target.value === '') setDuration(0);
              }}
              title="Custom minutes"
              style={{
                flexShrink:0, width:60, height:44, padding:'0 8px', fontSize:13, fontWeight:600,
                borderRadius:10, border:'1.5px solid #E2E8F0', background:'#FFF',
                color:'#2D3748', textAlign:'center',
              }}
            />

            {/* Record all */}
            <Btn
              full
              color="#4A90A4"
              onClick={recordAll}
              disabled={onlineDev.every(d=>d.isRecording)}
            >
              ◉ Record All ({onlineDev.length})
            </Btn>

            {/* Stop all (only when something is recording) */}
            {anyRec && (
              <Btn outline color="#E53E3E" onClick={stopAll} style={{flexShrink:0}}>
                ■ Stop
              </Btn>
            )}

            {/* Screenshot all */}
            <Btn color="#7B68AE" onClick={shotAll} style={{flexShrink:0, padding:'0 14px'}}>
              📷
            </Btn>
          </div>
        )}

        {/* ── Password modal ────────────────────────────────── */}
        <PasswordModal prompt={passPrompt} />

        {/* ── Lightbox ──────────────────────────────────────── */}
        {lightbox && (
          <div
            onClick={()=>setLightbox(null)}
            style={{
              position:'fixed', inset:0, zIndex:600,
              background:'rgba(0,0,0,0.92)',
              display:'flex', alignItems:'center', justifyContent:'center',
              padding:16, cursor:'zoom-out',
            }}
          >
            <img
              src={lightbox}
              style={{maxWidth:'100%', maxHeight:'100%', borderRadius:8, objectFit:'contain'}}
            />
            <button
              onClick={()=>setLightbox(null)}
              style={{
                position:'absolute', top:16, right:16,
                width:40, height:40, borderRadius:20, fontSize:18,
                background:'rgba(255,255,255,0.2)', color:'#FFF', border:'none',
              }}
            >✕</button>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
