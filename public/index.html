<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Baby Monitor</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0F2A35" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Baby Monitor" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:        #4A90A4;
      --primary-dark:   #3A7A8E;
      --danger:         #E53E3E;
      --success:        #38A169;
      --warning:        #DD6B20;
      --purple:         #7B68AE;
      --header-bg:      #0F2A35;
      --bg:             #EEF2F5;
      --card:           #FFFFFF;
      --border:         #E2E8F0;
      --text:           #1A202C;
      --text-sub:       #718096;
      --text-muted:     #A0AEC0;
      --safe-top:       env(safe-area-inset-top, 0px);
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    @keyframes pulse  { 0%,100%{opacity:1}       50%{opacity:0.35} }
    @keyframes blink  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
    @keyframes fadein { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .pulse { animation: pulse 2s ease-in-out infinite; }
    .blink { animation: blink 1s ease-in-out infinite; }

    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    button:active { opacity: 0.75; }
    select { font-family: inherit; }
    audio  { width: 100%; height: 44px; }

    ::-webkit-scrollbar { width: 3px; height: 0; }
    ::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 2px; }
    .tab-bar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  /* ─── Auth helpers ─────────────────────────────────────────── */
  const AUTH_KEY = 'bm_auth_token';
  const AUTH_EXP_KEY = 'bm_auth_expires';
  const getToken = () => sessionStorage.getItem(AUTH_KEY) || null;
  const getTokenExpiry = () => {
    const v = sessionStorage.getItem(AUTH_EXP_KEY);
    return v ? Number(v) : 0;
  };
  const setToken = (token, expiresAt) => {
    if (token && expiresAt) {
      sessionStorage.setItem(AUTH_KEY, token);
      sessionStorage.setItem(AUTH_EXP_KEY, String(expiresAt));
      const maxAge = Math.max(1, Math.floor((expiresAt - Date.now()) / 1000));
      document.cookie = `auth_token=${encodeURIComponent(token)}; path=/; max-age=${maxAge}; SameSite=Strict`;
    } else {
      sessionStorage.removeItem(AUTH_KEY);
      sessionStorage.removeItem(AUTH_EXP_KEY);
      document.cookie = 'auth_token=; path=/; max-age=0; SameSite=Strict';
    }
  };

  // Patch fetch once — inject Authorization header on all same-origin requests.
  if (!window.__bmFetchPatched) {
    const origFetch = window.fetch.bind(window);
    window.fetch = (input, init = {}) => {
      const t = getToken();
      if (t) {
        const headers = new Headers(init.headers || (typeof input !== 'string' && input.headers) || {});
        if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + t);
        init = { ...init, headers };
      }
      return origFetch(input, init).then(res => {
        if (res.status === 401) {
          // Global signal: session died.
          window.dispatchEvent(new CustomEvent('bm-auth-expired'));
        }
        return res;
      });
    };
    window.__bmFetchPatched = true;
  }

  /* ─── Helpers ───────────────────────────────────────────────── */
  const fmtSize = (b) => {
    if (!b) return '0 B';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  };

  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s), now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if (sameDay) return time;
    return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + time;
  };

  const fmtTimer = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  // Parse recording time from filename. Android writes:
  //   <deviceId>_YYYYMMDD_HHmmss[_chunkN].m4a
  // Enhanced copies keep the original basename, prefixed with NC- / NC-AI-.
  // Returns an ISO string, or null when the pattern is absent (legacy / renamed files).
  const parseRecordedAt = (filename) => {
    if (!filename) return null;
    let base = filename.replace(/\.[^.]+$/, '');
    if (base.startsWith('NC-AI-')) base = base.slice(6);
    else if (base.startsWith('NC-')) base = base.slice(3);
    const m = base.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
    if (!m) return null;
    const [, Y, Mo, D, h, mi, s] = m;
    const dt = new Date(Number(Y), Number(Mo) - 1, Number(D), Number(h), Number(mi), Number(s));
    if (isNaN(dt.getTime())) return null;
    return dt.toISOString();
  };

  // Local YYYY-MM-DD key from any Date/ISO/timestamp/null. Returns '' for unknown.
  const dateKeyOf = (v) => {
    if (!v) return '';
    const d = new Date(v);
    if (isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  };
  // Heading like "Wed, May 1, 2026" (or "Today" / "Yesterday" when applicable)
  const fmtDateHeading = (key) => {
    if (!key) return 'Unknown date';
    const [y,m,d] = key.split('-').map(Number);
    if (!y) return 'Unknown date';
    const dt = new Date(y, m-1, d);
    const today = new Date(); today.setHours(0,0,0,0);
    const diffDays = Math.round((today - dt) / 86400000);
    const base = dt.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'});
    if (diffDays === 0) return `Today · ${base}`;
    if (diffDays === 1) return `Yesterday · ${base}`;
    return base;
  };
  // Group an array of items into [{ key, label, items }] sorted newest first.
  // getDate(item) returns a Date/ISO/timestamp; falls back to created if needed.
  const groupByDay = (items, getDate) => {
    const map = {};
    (items || []).forEach(it => {
      const key = dateKeyOf(getDate(it)) || 'unknown';
      (map[key] = map[key] || []).push(it);
    });
    const keys = Object.keys(map).sort((a,b) => {
      if (a === 'unknown') return 1;
      if (b === 'unknown') return -1;
      return a < b ? 1 : a > b ? -1 : 0;
    });
    return keys.map(k => ({ key:k, label: k==='unknown' ? 'Unknown date' : fmtDateHeading(k), items: map[k] }));
  };

  const timeAgo = (s) => {
    if (!s) return '';
    const d = Math.floor((Date.now() - new Date(s)) / 1000);
    if (d < 60)    return d + 's ago';
    if (d < 3600)  return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
  };

  /* Consistent color per deviceId */
  const PALETTE = ['#4A90A4','#7B68AE','#E67E22','#27AE60','#C0392B','#1ABC9C','#2980B9','#8E44AD'];
  const devColor = (id='') =>
    PALETTE[(id.split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % PALETTE.length];

  const DURATIONS = [
    {label:'15 sec', value:15}, {label:'30 sec', value:30},
    {label:'1 min',  value:60}, {label:'5 min',  value:300},
    {label:'10 min', value:600},{label:'15 min', value:900},
  ];

  const fetchCustomDurations = async () => {
    try {
      const r = await fetch('/api/settings');
      if (!r.ok) return [];
      const s = await r.json();
      return Array.isArray(s.customDurations)
        ? s.customDurations.filter(n => Number.isFinite(n) && n > 0)
        : [];
    } catch { return []; }
  };
  const persistCustomDurations = async (arr) => {
    try {
      await fetch('/api/settings', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ customDurations: arr }),
      });
    } catch {}
  };
  const formatStorageBytes = (bytes) => {
    const b = Number(bytes) || 0;
    const GB = 1024 * 1024 * 1024;
    const MB = 1024 * 1024;
    const KB = 1024;
    if (b >= GB) return `${(b / GB).toFixed(2)} GB`;
    if (b >= MB) return `${(b / MB).toFixed(1)} MB`;
    if (b >= KB) return `${(b / KB).toFixed(0)} KB`;
    return `${b} B`;
  };
  const formatDurationLabel = (sec) => {
    if (sec < 60) return `${sec} sec`;
    if (sec % 60 === 0) return `${sec/60} min`;
    return `${Math.floor(sec/60)}m ${sec%60}s`;
  };

  /* ─── Atom: StatusDot ───────────────────────────────────────── */
  function Dot({online, recording, size=10}) {
    const c = recording ? '#E53E3E' : online ? '#38A169' : '#CBD5E0';
    return (
      <span style={{
        display:'inline-block', width:size, height:size, borderRadius:'50%',
        background:c, flexShrink:0,
        boxShadow: (online||recording) ? `0 0 0 3px ${c}33` : 'none',
      }} className={recording?'blink':online?'pulse':''} />
    );
  }

  /* ─── Atom: Pill badge ──────────────────────────────────────── */
  function Pill({children, color='#4A90A4', bg}) {
    return (
      <span style={{
        background: bg || color+'22', color, fontSize:11, fontWeight:700,
        padding:'2px 9px', borderRadius:20, whiteSpace:'nowrap', letterSpacing:0.2,
      }}>{children}</span>
    );
  }

  /* ─── Atom: Button ──────────────────────────────────────────── */
  function Btn({children, onClick, color='#4A90A4', outline, disabled, sm, full, style:extra={}, ...rest}) {
    const h = sm ? 36 : 44;
    return (
      <button
        onClick={onClick} disabled={disabled} {...rest}
        style={{
          height:h, padding:`0 ${sm?14:20}px`, fontSize:sm?13:14, fontWeight:600,
          borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', gap:5,
          transition:'opacity .15s, transform .1s', whiteSpace:'nowrap',
          width: full ? '100%' : undefined,
          border:   outline ? `1.5px solid ${disabled?'#CBD5E0':color}` : 'none',
          background: outline ? 'transparent' : (disabled?'#E2E8F0':color),
          color:      outline ? (disabled?'#CBD5E0':color) : (disabled?'#999':'#FFF'),
          cursor:     disabled ? 'not-allowed' : 'pointer',
          ...extra,
        }}
      >{children}</button>
    );
  }

  /* ─── Password Confirmation Modal ───────────────────────────── */
  function PasswordModal({ prompt }) {
    const [val, setVal] = useState('');
    const [err, setErr] = useState('');
    const [busy, setBusy] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
      if (prompt && ref.current) setTimeout(() => ref.current.focus(), 50);
      if (!prompt) { setVal(''); setErr(''); setBusy(false); }
    }, [prompt]);
    if (!prompt) return null;
    const submit = async () => {
      if (busy || val.length < 4) return;
      setBusy(true); setErr('');
      try {
        const r = await fetch('/api/auth/verify', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password: val }),
        });
        if (r.ok) { const pw = val; setVal(''); setBusy(false); prompt.onOk(pw); return; }
        setErr('Incorrect password'); setVal(''); setBusy(false);
        ref.current && ref.current.focus();
      } catch {
        setErr('Network error'); setBusy(false);
      }
    };
    const cancel = () => { setVal(''); setErr(''); setBusy(false); prompt.onCancel(); };
    return (
      <div onClick={cancel} style={{
        position:'fixed', inset:0, zIndex:800, background:'rgba(0,0,0,0.65)',
        display:'flex', alignItems:'center', justifyContent:'center', padding:16,
      }}>
        <div onClick={e=>e.stopPropagation()} style={{
          background:'#FFF', borderRadius:14, padding:22, maxWidth:340, width:'100%',
          boxShadow:'0 10px 30px rgba(0,0,0,0.3)',
        }}>
          <div style={{fontSize:15, fontWeight:700, color:'#2D3748', marginBottom:6}}>
            {prompt.title || '🔒 Confirm'}
          </div>
          <div style={{fontSize:13, color:'#4A5568', marginBottom:14}}>
            {prompt.message}
          </div>
          <input
            ref={ref}
            type="password" inputMode="numeric" pattern="\d*" maxLength={12}
            autoComplete="one-time-code"
            data-lpignore="true" data-1p-ignore="true"
            value={val} autoFocus disabled={busy}
            onChange={e=>{ setVal(e.target.value.replace(/\D/g,'').slice(0,12)); setErr(''); }}
            onKeyDown={e=>{ if (e.key==='Enter') submit(); if (e.key==='Escape') cancel(); }}
            placeholder="• • • •"
            style={{
              width:'100%', height:52, fontSize:26, textAlign:'center', letterSpacing:'0.5em',
              padding:'0 16px', borderRadius:10,
              border:`1.5px solid ${err?'#E53E3E':'#E2E8F0'}`,
              marginBottom:6, background:'#F7FAFC', boxSizing:'border-box', color:'#2D3748',
            }}
          />
          {err && <div style={{fontSize:12, color:'#E53E3E', marginBottom:6}}>{err}</div>}
          <div style={{display:'flex', gap:10, marginTop:12}}>
            <button onClick={cancel} disabled={busy} style={{
              flex:1, height:44, borderRadius:10, border:'1.5px solid #E2E8F0',
              background:'#FFF', color:'#4A5568', fontWeight:600, fontSize:14, cursor:'pointer',
            }}>Cancel</button>
            <button onClick={submit} disabled={busy || val.length<4} style={{
              flex:1, height:44, borderRadius:10, border:'none',
              background: (busy || val.length<4) ? '#A0AEC0' : (prompt.confirmColor || '#E53E3E'),
              color:'#FFF', fontWeight:700, fontSize:14,
              cursor:(busy || val.length<4) ? 'not-allowed' : 'pointer',
            }}>{busy ? '…' : (prompt.confirmLabel || 'Confirm')}</button>
          </div>
        </div>
      </div>
    );
  }

  /* ─── Burst Duration Modal ──────────────────────────────────
     Independent minute picker for the screenshot-burst button.
     Mobile-friendly: preset chips for one-tap selection plus a custom
     numeric input that triggers Android's number keypad (inputMode="numeric"
     + pattern="\d*"). Pressing Enter or OK starts the burst immediately. */
  const BURST_PRESETS = [1, 2, 5, 10, 15, 30, 60];

  function BurstDurationModal({ prompt }) {
    // `selected` is the currently-chosen preset (number) or null when typing custom.
    // `custom` is the raw textbox value; if non-empty it overrides the preset.
    const [selected, setSelected] = useState(5);
    const [custom, setCustom]     = useState('');
    const inputRef = useRef(null);

    useEffect(() => {
      if (prompt) { setSelected(5); setCustom(''); }
    }, [prompt]);

    if (!prompt) return null;

    // Effective minutes: typed value wins, falls back to selected preset.
    const customNum = parseInt(custom, 10);
    const effectiveMin = (custom !== '' && Number.isFinite(customNum) && customNum > 0)
      ? customNum
      : selected;
    const valid = Number.isFinite(effectiveMin) && effectiveMin >= 1;

    const submit = () => {
      if (!valid) return;
      prompt.onOk(effectiveMin);
    };
    const cancel = () => prompt.onCancel();

    return (
      <div onClick={cancel} style={{
        position:'fixed', inset:0, zIndex:800, background:'rgba(0,0,0,0.65)',
        display:'flex', alignItems:'center', justifyContent:'center', padding:16,
      }}>
        <div onClick={e=>e.stopPropagation()} style={{
          background:'#FFF', borderRadius:14, padding:20, maxWidth:360, width:'100%',
          boxShadow:'0 10px 30px rgba(0,0,0,0.3)',
          maxHeight:'90vh', overflowY:'auto', boxSizing:'border-box',
        }}>
          <div style={{fontSize:16, fontWeight:700, color:'#2D3748', marginBottom:4}}>
            🔥 Screenshot Burst
          </div>
          <div style={{fontSize:12, color:'#718096', marginBottom:14, lineHeight:1.4}}>
            {prompt.deviceName ? <>On <b>{prompt.deviceName}</b> · </> : null}
            One screenshot every 5 seconds for the chosen duration.
          </div>

          {/* Preset chips — tap to select */}
          <div style={{fontSize:11, fontWeight:700, color:'#A0AEC0', marginBottom:6, letterSpacing:0.4}}>
            QUICK PICK (MINUTES)
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:14}}>
            {BURST_PRESETS.map(m => {
              const isActive = custom === '' && selected === m;
              return (
                <button
                  key={m}
                  onClick={() => { setCustom(''); setSelected(m); }}
                  style={{
                    flex:'1 1 calc(25% - 6px)', minWidth:60,
                    height:42, borderRadius:9, fontSize:14, fontWeight:700,
                    border: `1.5px solid ${isActive ? '#D69E2E' : '#E2E8F0'}`,
                    background: isActive ? '#D69E2E' : '#F7FAFC',
                    color:      isActive ? '#FFF'    : '#2D3748',
                    cursor:'pointer', transition:'all .12s',
                  }}
                >{m}m</button>
              );
            })}
          </div>

          {/* Custom numeric input — Android numeric keypad */}
          <div style={{fontSize:11, fontWeight:700, color:'#A0AEC0', marginBottom:6, letterSpacing:0.4}}>
            OR ENTER MINUTES
          </div>
          <input
            ref={inputRef}
            type="number"
            inputMode="numeric"
            pattern="\d*"
            min="1"
            step="1"
            autoComplete="off"
            value={custom}
            placeholder="e.g. 7"
            onChange={e => {
              // Strip everything but digits so the keypad never accepts a
              // decimal/sign; an empty string falls back to the selected preset.
              const v = e.target.value.replace(/\D/g, '').slice(0, 4);
              setCustom(v);
            }}
            onKeyDown={e => {
              if (e.key === 'Enter') { e.preventDefault(); submit(); }
              if (e.key === 'Escape') cancel();
            }}
            style={{
              width:'100%', height:48, fontSize:18, fontWeight:600, textAlign:'center',
              padding:'0 14px', borderRadius:10, boxSizing:'border-box',
              border: `1.5px solid ${custom !== '' ? '#D69E2E' : '#E2E8F0'}`,
              background: '#F7FAFC', color:'#2D3748',
              outline:'none',
            }}
          />

          {/* Live preview of what will actually start */}
          <div style={{
            marginTop:12, padding:'8px 12px', borderRadius:8,
            background: valid ? '#FFFAF0' : '#FFF5F5',
            border: `1px solid ${valid ? '#FAD9A6' : '#FED7D7'}`,
            fontSize:12, color: valid ? '#7B5A1B' : '#C53030',
          }}>
            {valid
              ? <>Will run for <b>{effectiveMin} minute{effectiveMin===1?'':'s'}</b> · ~{Math.max(1, Math.floor((effectiveMin*60)/5))} screenshots</>
              : 'Enter at least 1 minute'}
          </div>
          <div style={{fontSize:10, color:'#A0AEC0', marginTop:6, lineHeight:1.4}}>
            Runs on the server — closing this tab won't stop it.
          </div>

          <div style={{display:'flex', gap:10, marginTop:14}}>
            <button onClick={cancel} style={{
              flex:1, height:44, borderRadius:10, border:'1.5px solid #E2E8F0',
              background:'#FFF', color:'#4A5568', fontWeight:600, fontSize:14, cursor:'pointer',
            }}>Cancel</button>
            <button onClick={submit} disabled={!valid} style={{
              flex:1, height:44, borderRadius:10, border:'none',
              background: !valid ? '#A0AEC0' : '#D69E2E',
              color:'#FFF', fontWeight:700, fontSize:14,
              cursor: !valid ? 'not-allowed' : 'pointer',
            }}>🔥 Start Burst</button>
          </div>
        </div>
      </div>
    );
  }

  /* ─── Atom: Card ────────────────────────────────────────────── */
  function Card({children, accent, style:extra={}}) {
    return (
      <div style={{
        background:'#FFF', borderRadius:14,
        boxShadow:'0 1px 6px rgba(0,0,0,0.07)',
        overflow:'hidden',
        borderLeft: accent ? `4px solid ${accent}` : undefined,
        ...extra,
      }}>{children}</div>
    );
  }

  /* ─── Upload queue badge inside device card ─────────────────── */
  function QueueBadge({q}) {
    if (!q || (!q.totalPending && !q.isPaused)) return null;
    const paused = q.isPaused;
    const uploading = q.isProcessingSmall || q.isProcessingLarge;
    return (
      <div style={{
        margin:'8px 0 0', padding:'8px 12px', borderRadius:8,
        background: paused ? '#FFFBEB' : '#EBF8FF',
        border: `1px solid ${paused?'#F6AD55':'#BEE3F8'}`,
        display:'flex', flexWrap:'wrap', gap:6, alignItems:'center',
      }}>
        <span style={{fontSize:12, fontWeight:700, color: paused?'#C05621':'#2B6CB0'}}>
          {paused ? '⚠ Upload paused' : uploading ? '⬆ Uploading…' : '⏳ Queued'}
        </span>
        {q.totalPending > 0 && (
          <span style={{fontSize:12, color:'#4A5568'}}>
            {q.totalPending} file{q.totalPending!==1?'s':''} · {fmtSize(q.totalSizeBytes)}
          </span>
        )}
        {q.failedFiles > 0 && (
          <span style={{fontSize:12, color:'#C53030'}}>· {q.failedFiles} failed</span>
        )}
        {q.isProcessingLarge && <span style={{fontSize:11,color:'#2C5282'}}>📁 large file</span>}
        {q.isProcessingSmall && !q.isProcessingLarge && <span style={{fontSize:11,color:'#2C5282'}}>📄 small file</span>}
      </div>
    );
  }

  /* ─── Audio Source Panel (expandable inside DeviceCard) ────── */
  const AUDIO_SOURCES = ['CAMCORDER','VOICE_RECOGNITION','MIC','DEFAULT','VOICE_COMMUNICATION'];

  function AudioPanel({dev, onSetSource, onTestSources, testing}) {
    const cfg = dev.audioSourceConfig || {};
    const results = cfg.testResults || {};
    const hasResults = Object.keys(results).length > 0;

    const resultIcon = (r) => {
      if (!r) return '';
      if (r === 'working') return '✅';
      if (r === 'silent')  return '🔇';
      return '❌';
    };

    const resultColor = (r) => {
      if (r === 'working') return '#38A169';
      if (r === 'silent')  return '#E53E3E';
      if (r && r.startsWith('error')) return '#E53E3E';
      return '#718096';
    };

    return (
      <div style={{
        padding:'12px 16px 14px', borderTop:'1px solid #F0F4F5',
        background:'#FAFCFE',
      }}>
        {/* Current / Recommended row */}
        <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:10}}>
          {cfg.currentSource && (
            <div style={{fontSize:12}}>
              <span style={{color:'#718096'}}>Current: </span>
              <span style={{fontWeight:700, color:'#2D3748'}}>{cfg.currentSource}</span>
            </div>
          )}
          {cfg.autoDetectedSource && (
            <div style={{
              fontSize:12, background:'#F0FFF4', border:'1px solid #C6F6D5',
              padding:'2px 8px', borderRadius:6,
            }}>
              <span style={{color:'#276749'}}>Recommended: </span>
              <span style={{fontWeight:700, color:'#22543D'}}>{cfg.autoDetectedSource}</span>
            </div>
          )}
          {cfg.userSelectedSource && cfg.userSelectedSource !== 'auto' && (
            <div style={{
              fontSize:12, background:'#FFFFF0', border:'1px solid #FEFCBF',
              padding:'2px 8px', borderRadius:6,
            }}>
              <span style={{color:'#975A16'}}>Override: </span>
              <span style={{fontWeight:700, color:'#744210'}}>{cfg.userSelectedSource}</span>
            </div>
          )}
        </div>

        {/* Source selector */}
        <div style={{display:'flex', gap:8, marginBottom:10, flexWrap:'wrap'}}>
          <select
            value={cfg.userSelectedSource || 'auto'}
            onChange={e => onSetSource(dev.deviceId, e.target.value)}
            style={{
              flex:1, minWidth:0, height:38, padding:'0 10px', fontSize:13, fontWeight:500,
              borderRadius:8, border:'1.5px solid #E2E8F0', background:'#FFF',
              color:'#2D3748', cursor:'pointer',
            }}
          >
            <option value="auto">Auto (Recommended)</option>
            {AUDIO_SOURCES.map(src => (
              <option key={src} value={src}>
                {src} {resultIcon(results[src])}
              </option>
            ))}
          </select>
          <Btn
            sm color="#4A90A4" outline
            onClick={()=>onTestSources(dev.deviceId)}
            disabled={testing}
          >
            {testing ? '⏳ Testing…' : '🔊 Test'}
          </Btn>
          {cfg.userSelectedSource && cfg.userSelectedSource !== 'auto' && (
            <Btn sm outline color="#718096" onClick={()=>onSetSource(dev.deviceId, 'auto')}>
              ↩ Auto
            </Btn>
          )}
        </div>

        {/* Test results table */}
        {hasResults && (
          <div style={{borderRadius:8, overflow:'hidden', border:'1px solid #E2E8F0'}}>
            {AUDIO_SOURCES.map((src, i) => {
              const r = results[src];
              if (!r) return null;
              const isRec = src === cfg.autoDetectedSource;
              return (
                <div key={src} style={{
                  display:'flex', alignItems:'center', gap:8,
                  padding:'7px 10px', fontSize:12,
                  background: isRec ? '#F0FFF4' : (i%2===0 ? '#FAFCFE' : '#FFF'),
                  borderBottom: i < AUDIO_SOURCES.length-1 ? '1px solid #EDF2F7' : 'none',
                }}>
                  <span style={{flex:1, fontWeight:isRec?700:500, color:'#2D3748'}}>{src}</span>
                  <span style={{color:resultColor(r), fontWeight:600}}>
                    {resultIcon(r)} {r === 'working' ? 'Working' : r === 'silent' ? 'Silent' : r}
                  </span>
                  {isRec && <Pill color="#276749" bg="#C6F6D5">BEST</Pill>}
                </div>
              );
            })}
          </div>
        )}

        {/* Last test time */}
        {cfg.lastTestTime && (
          <div style={{fontSize:11, color:'#A0AEC0', marginTop:8}}>
            Last tested: {fmtDate(cfg.lastTestTime)}
          </div>
        )}
      </div>
    );
  }

  /* ─── Device Card ───────────────────────────────────────────── */
  function DeviceCard({dev, selectedDuration, onRecord, onStop, onScreenshot, onBurstStart, onBurstStop, burstStatus, onRename, onSetAudioSource, onTestAudio, onDeleteDevice, onGetGalleryStats, timer, ssStatus, audioTesting, note, onSaveNote}) {
    const [editing, setEditing] = useState(false);
    const [name, setName]       = useState(dev.deviceName);
    const [audioOpen, setAudioOpen] = useState(false);
    const color = devColor(dev.deviceId);
    const capturing = ssStatus?.status === 'requesting' || ssStatus?.status === 'capturing' || ssStatus?.status === 'uploading';

    const save = () => { if (name.trim()) onRename(dev.deviceId, name.trim()); setEditing(false); };

    const subline = [dev.model, dev.manufacturer, dev.androidVersion ? 'Android '+dev.androidVersion : '']
      .filter(Boolean).join(' · ');

    // Compact icon-only action button — used on narrow phones so 5 buttons fit one row.
    const aBtn = (props) => {
      const {color:c, onClick, disabled, title, children, primary} = props;
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          title={title}
          style={{
            flex:'1 1 0', minWidth:0, height:38, padding:'0 8px',
            fontSize:13, fontWeight:700, borderRadius:9,
            display:'flex', alignItems:'center', justifyContent:'center', gap:4,
            border: primary ? 'none' : `1.5px solid ${disabled?'#E2E8F0':c}`,
            background: primary ? (disabled?'#E2E8F0':c) : '#FFF',
            color: primary ? (disabled?'#A0AEC0':'#FFF') : (disabled?'#CBD5E0':c),
            cursor: disabled?'not-allowed':'pointer',
            whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
            boxShadow: primary ? '0 1px 2px rgba(0,0,0,0.06)' : 'none',
          }}
        >{children}</button>
      );
    };

    return (
      <Card accent={color} style={{marginBottom:10, overflow:'hidden'}}>
        {/* ── Top: identity + status (single padded block) ── */}
        <div style={{padding:'11px 13px 9px'}}>
          <div style={{display:'flex', alignItems:'flex-start', gap:9}}>
            <Dot online={dev.isOnline} recording={dev.isRecording} size={10} />

            <div style={{flex:1, minWidth:0}}>
              {editing ? (
                <div style={{display:'flex', gap:6, marginBottom:2}}>
                  <input
                    value={name} autoFocus
                    onChange={e=>setName(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter')save(); if(e.key==='Escape')setEditing(false); }}
                    style={{
                      flex:1, fontSize:14, padding:'4px 9px', borderRadius:7, minWidth:0,
                      border:'1.5px solid #4A90A4', outline:'none',
                    }}
                  />
                  <Btn sm onClick={save}>Save</Btn>
                  <Btn sm outline color="#718096" onClick={()=>setEditing(false)}>✕</Btn>
                </div>
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:4, minWidth:0}}>
                  <span style={{
                    fontSize:15, fontWeight:700, color:'#1A202C', minWidth:0,
                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                  }}>
                    {dev.deviceName}
                  </span>
                  <button
                    onClick={()=>{ setName(dev.deviceName); setEditing(true); }}
                    style={{color:'#CBD5E0', fontSize:13, padding:'0 4px', flexShrink:0, background:'none', border:'none', cursor:'pointer'}}
                  >✎</button>
                </div>
              )}
              {subline && (
                <div style={{
                  fontSize:11, color:'#A0AEC0', marginTop:1, lineHeight:1.3,
                  overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                }}>
                  {subline}
                </div>
              )}
            </div>

            {/* Status pill (compact) */}
            <div style={{flexShrink:0, textAlign:'right'}}>
              <Pill color={dev.isRecording?'#C53030':dev.isOnline?'#276749':'#718096'}
                    bg={dev.isRecording?'#FFF5F5':dev.isOnline?'#F0FFF4':'#F7FAFC'}>
                {dev.isRecording
                  ? `REC${timer ? ' '+fmtTimer(timer) : ''}`
                  : dev.isOnline ? 'Online' : 'Offline'}
              </Pill>
              {!dev.isOnline && dev.lastSeen && (
                <div style={{fontSize:10, color:'#A0AEC0', marginTop:2}}>{timeAgo(dev.lastSeen)}</div>
              )}
            </div>
          </div>

          {/* Status flags row — only renders if there is something to show */}
          {(dev.uploadQueueStatus || dev.pendingUploads > 0 || (dev.connectionHealthy === false && dev.isOnline) || dev.notificationsEnabled === false) && (
            <div style={{marginTop:6, display:'flex', flexDirection:'column', gap:3}}>
              {dev.uploadQueueStatus
                ? <QueueBadge q={dev.uploadQueueStatus} />
                : dev.pendingUploads > 0
                  ? <div style={{fontSize:11,color:'#718096'}}>
                      ⏳ {dev.pendingUploads} pending upload{dev.pendingUploads!==1?'s':''}
                    </div>
                  : null
              }
              {dev.connectionHealthy === false && dev.isOnline && (
                <div style={{fontSize:11,color:'#DD6B20'}}>⚠ Unstable connection</div>
              )}
              {dev.notificationsEnabled === false && (
                <div style={{fontSize:11,color:'#E53E3E'}}>🔕 Notifications disabled on device</div>
              )}
            </div>
          )}
        </div>

        {/* ── Action row (single line, equal-flex; no wrap) ── */}
        {dev.isOnline && (
          <div style={{padding:'0 10px 10px', display:'flex', gap:6}}>
            {dev.isRecording
              ? aBtn({color:'#E53E3E', primary:true, onClick:()=>onStop(dev.deviceId), title:'Stop recording', children:'■'})
              : aBtn({color:'#4A90A4', primary:true, onClick:()=>onRecord(dev.deviceId), title:'Start recording', children:'◉'})
            }
            {aBtn({color:'#7B68AE', onClick:()=>onScreenshot(dev.deviceId), disabled:capturing, title: capturing?'Capturing…':'Take screenshot', children: capturing?'⏳':'📷'})}
            {burstStatus?.active
              ? aBtn({color:'#E53E3E', primary:true, onClick:()=>onBurstStop && onBurstStop(dev.deviceId), title:'Stop screenshot burst', children:'■🔥'})
              : aBtn({color:'#D69E2E', onClick:()=>onBurstStart && onBurstStart(dev.deviceId), title:'Burst screenshots — pick duration', children:'🔥'})
            }
            {aBtn({color:'#718096', onClick:()=>setAudioOpen(!audioOpen), title: audioOpen?'Hide audio panel':'Audio source', children: audioOpen?'🎤▲':'🎤'})}
            {aBtn({color:'#E67E22', onClick:()=>onGetGalleryStats(dev.deviceId), title:'Gallery', children:'🖼'})}
          </div>
        )}

        {/* ── Active burst banner (compact) ── */}
        {burstStatus?.active && (
          <div style={{
            margin:'0 10px 10px', padding:'8px 10px',
            background:'#FFFBEB', border:'1.5px solid #F6E05E', borderRadius:9,
            display:'flex', alignItems:'center', gap:8,
          }}>
            <span style={{fontSize:14, flexShrink:0}}>🔥</span>
            <div style={{flex:'1 1 0', minWidth:0, fontSize:11, lineHeight:1.35, color:'#744210'}}>
              <span style={{fontWeight:700}}>Burst</span> · {burstStatus.sentShots || 0}/{burstStatus.totalShots || '?'} taken ·
              {' '}{Math.max(0, Math.ceil((burstStatus.remainingMs||0)/1000))}s left
            </div>
          </div>
        )}

        {/* ── Delete button for offline devices ── */}
        {!dev.isOnline && (
          <div style={{padding:'0 10px 10px'}}>
            <Btn sm outline color="#E53E3E" full onClick={()=>onDeleteDevice(dev.deviceId)}>
              🗑 Remove Offline Device
            </Btn>
          </div>
        )}

        {/* ── Audio source panel (collapsible) ── */}
        {audioOpen && dev.isOnline && (
          <AudioPanel
            dev={dev}
            onSetSource={onSetAudioSource}
            onTestSources={onTestAudio}
            testing={audioTesting}
          />
        )}

        {/* ── Device description / note ── */}
        {onSaveNote && (
          <div style={{padding:'0 10px 10px'}}>
            <NoteWidget
              kind="devices"
              deviceId={dev.deviceId}
              filename="_device"
              note={note || ''}
              onSave={onSaveNote}
            />
          </div>
        )}
      </Card>
    );
  }

  /* ─── Recording row (inline player) ─────────────────────────── */
  function RecRow({rec, deviceId, onDelete, onStar, starred, inFavorites, note, onSaveNote, onEnhance, enhancingEngines, isChild}) {

    const busyAi    = enhancingEngines ? enhancingEngines.has(`${deviceId}/${rec.filename}/rnnoise`) : false;
    const busyClassic = enhancingEngines ? enhancingEngines.has(`${deviceId}/${rec.filename}/afftdn`)  : false;
    return (
      <div style={{
        padding:'12px 14px',
        borderTop: isChild ? '1px dashed #E2E8F0' : 'none',
        background: isChild ? '#F0FFF4' : (hasNote ? '#FFFBEA' : '#FFF'),
        borderLeft: isChild
          ? `4px solid ${isAI ? '#7B68AE' : '#38A169'}`
          : (hasNote ? '4px solid #ECC94B' : '4px solid transparent'),
        paddingLeft: isChild ? 26 : 14,
        position: 'relative',
      }}>
        {isChild && (
          <div style={{
            position:'absolute', left:10, top:0, bottom:'50%', width:10,
            borderLeft:'2px solid #CBD5E0', borderBottom:'2px solid #CBD5E0',
            borderBottomLeftRadius:6, pointerEvents:'none',
          }} />
        )}
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          <div style={{minWidth:0}}>
            <div title={rec.filename} style={{fontSize:13, fontWeight:600, color:'#2D3748',
                         overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
              {isNC && <span style={{
                display:'inline-block', marginRight:6, padding:'1px 6px',
                fontSize:10, fontWeight:700, color:'#fff',
                background: isAI ? '#7B68AE' : '#38A169', borderRadius:4,
              }}>{isAI ? 'AI' : 'NC'}</span>}
              {rec.filename}
            </div>
            <div style={{display:'flex', flexWrap:'wrap', alignItems:'center', gap:'4px 6px', marginTop:5, fontSize:11, lineHeight:1.3}}>
              {recordedAt && (
                <span title={`Recorded ${new Date(recordedAt).toLocaleString()}`}
                      style={{
                        display:'inline-flex', alignItems:'center', gap:3,
                        padding:'2px 7px', borderRadius:999, whiteSpace:'nowrap',
                        background:'#EBF8FF', color:'#2B6CB0', fontWeight:600,
                      }}>
                  🎙 Rec: {fmtDate(recordedAt)} · {timeAgo(recordedAt)}
                </span>
              )}
              <span title={`Uploaded ${new Date(rec.created).toLocaleString()}`}
                    style={{
                      display:'inline-flex', alignItems:'center', gap:3,
                      padding:'2px 7px', borderRadius:999, whiteSpace:'nowrap',
                      background:'#F7FAFC', color:'#718096', fontWeight:500,
                    }}>
                ⬆ Up: {fmtDate(rec.created)}
              </span>
              <span style={{color:'#A0AEC0', whiteSpace:'nowrap'}}>· {fmtSize(rec.size)}</span>
            </div>
          </div>
          <div style={{display:'flex', gap:5, flexWrap:'wrap'}}>
            <button
              onClick={()=>setOpen(!open)}
              style={{
                height:32, padding:'0 10px', fontSize:12, fontWeight:600, borderRadius:8,
                background: open?'#EBF8FF':'#F7FAFC',
                border:'1px solid #BEE3F8', color:'#4A90A4',
              }}
            >{open ? '▲' : '▶'}</button>
            <a
              href={rec.url} download={rec.filename}
              style={{
                display:'flex', alignItems:'center', justifyContent:'center',
                height:32, padding:'0 10px', fontSize:12, borderRadius:8,
                border:'1px solid #C6F6D5', color:'#38A169', textDecoration:'none',
              }}

            {!inFavorites && (
              <button
                onClick={()=>onStar && onStar(deviceId, rec.filename)}
                disabled={starred}
                title={starred ? 'Already favorited' : 'Add to favorites'}
                style={{
                  height:32, padding:'0 10px', fontSize:14, borderRadius:8,
                  border:'1px solid #FEEBC8', color: starred?'#D69E2E':'#ED8936',
                  background: starred ? '#FFFBEB' : '#FFF',
                  cursor: starred ? 'default' : 'pointer',
                }}
              >{starred ? '★' : '☆'}</button>
            )}
            {!isNC && onEnhance && (
              <>
                <button
                  onClick={()=>onEnhance(deviceId, rec.filename, 'rnnoise')}
                  disabled={busyAi}
                  title={busyAi ? 'Enhancing with AI…' : 'Enhance with RNNoise AI (creates NC-AI- copy)'}
                  style={{
                    height:32, padding:'0 10px', fontSize:12, borderRadius:8,
                    border:'1px solid #D6BCFA',
                    background: busyAi ? '#FAF5FF' : '#FFF',
                    color:'#7B68AE', cursor: busyAi ? 'wait' : 'pointer',
                    fontWeight:700,
                  }}

                <button
                  onClick={()=>onEnhance(deviceId, rec.filename, 'afftdn')}

                  title={busyClassic ? 'Enhancing with FFmpeg…' : 'Enhance with FFmpeg afftdn (creates NC- copy)'}
                  style={{
                    height:32, padding:'0 10px', fontSize:12, borderRadius:8,
                    border:'1px solid #C6F6D5',
                    background: busyClassic ? '#F0FFF4' : '#FFF',
                    color:'#38A169', cursor: busyClassic ? 'wait' : 'pointer',

              </>

            <button
              onClick={()=>onDelete(deviceId, rec.filename)}
              style={{
                height:32, padding:'0 10px', fontSize:12, borderRadius:8,

          </div>
        </div>
        {open && <AudioPlayer src={rec.url} autoPlay />}
        <NoteWidget
          kind="recordings" deviceId={deviceId} filename={rec.filename}
          note={note} onSave={onSaveNote}

      </div>
    );
  }

  /* ─── Collapsible date sub-section ──────────────────────────────
     Subordinate to the device card. Visual rules:

  /* Shared "nested" wrapper that visually attaches expanded date items to
     the date header above, using the same left accent in device color. */
  function DateBody({color, children, padded}) {
    return (
      <div style={{
        borderLeft: `3px solid ${color+'33'}`,
        marginLeft: 0,
        paddingLeft: padded ? 10 : 0,
        paddingRight: padded ? 4 : 0,
        paddingBottom: 4,
        background: '#FFF',
        borderRadius: '0 0 8px 0',
      }}>
        {children}
      </div>
    );

  /* ─── Recordings filter + bulk delete (per-device, time-of-day) ─────
     Lives at the top of the Recordings tab. The user picks one or more
     devices and a time-of-day window (e.g. 01:00 → 05:00, wrap-around
     midnight supported), the panel shows every matching recording across
     ALL dates with checkboxes, and a sticky bar lets the user delete only
     the selected files — never anything outside the filter.

     Delete flow:
       1. Password gate (if requireDeletePassword is on; same 2412 used app-wide).
       2. If any selected recording has a saved note, a SECOND modal asks
          whether to include the noted ones — they can be opted out, never
          touched silently.
       3. DELETE only fires for the resulting whitelist of filenames. */
  function RecordingsFilterBar({
    recordings, devices, notes, favorites,
    authStatus, askPassword, showToast, onAfterDelete,
  }) {
    const [open, setOpen]           = useState(false);
    const [selDevs, setSelDevs]     = useState(() => new Set()); // empty = all
    const [startTime, setStartTime] = useState('01:00');
    const [endTime, setEndTime]     = useState('05:00');
    const [applied, setApplied]     = useState(false);
    const [sel, setSel]             = useState(() => new Set()); // "deviceId|filename"
    const [notesPrompt, setNotesPrompt] = useState(null); // { withNotes, withoutNotes, onChoose }
    const [busy, setBusy] = useState(false);

    const devEntries = useMemo(() => Object.entries(recordings || {}), [recordings]);
    const deviceCount = devEntries.length;

    // Parse "HH:MM" → minutes since local midnight, or null on bad input.
    const parseHM = (s) => {
      if (!s) return null;
      const m = String(s).match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return null;
      const h = Number(m[1]), mi = Number(m[2]);
      if (!Number.isFinite(h) || !Number.isFinite(mi)) return null;
      if (h < 0 || h > 23 || mi < 0 || mi > 59) return null;
      return h * 60 + mi;
    };

    // Build the flat list of matches every time inputs / data change.
    const matches = useMemo(() => {
      if (!applied) return [];
      const sM = parseHM(startTime);
      const eM = parseHM(endTime);
      if (sM === null || eM === null) return [];
      const wrap = eM < sM; // window crosses midnight
      const inRange = (m) => wrap ? (m >= sM || m <= eM) : (m >= sM && m <= eM);
      const out = [];
      devEntries.forEach(([deviceId, g]) => {
        if (selDevs.size > 0 && !selDevs.has(deviceId)) return;
        (g.recordings || []).forEach(r => {
          const at = parseRecordedAt(r.filename);
          if (!at) return;
          const d = new Date(at);
          const min = d.getHours() * 60 + d.getMinutes();
          if (!inRange(min)) return;
          out.push({
            deviceId,
            deviceName: g.deviceName || deviceId,
            filename: r.filename,
            recordedAt: at,
            size: r.size,
            note: (notes?.recordings?.[deviceId]?.[r.filename] || '').trim(),
            isFav: ((favorites?.recordings?.[deviceId] || []).indexOf(r.filename) >= 0),
          });
        });
      });
      // Newest first.
      out.sort((a,b) => (a.recordedAt < b.recordedAt ? 1 : a.recordedAt > b.recordedAt ? -1 : 0));
      return out;
    }, [applied, devEntries, selDevs, startTime, endTime, notes, favorites]);

    // Drop selections that no longer match (e.g. data refreshed, item gone).
    useEffect(() => {
      if (!applied) { setSel(new Set()); return; }
      const valid = new Set(matches.map(m => m.deviceId + '|' + m.filename));
      setSel(prev => {
        const n = new Set();
        prev.forEach(k => { if (valid.has(k)) n.add(k); });
        return n;
      });
    /* eslint-disable-next-line */
    }, [applied, matches.length, matches.map(m=>m.deviceId+'|'+m.filename).join(',')]);

    const toggleDev = (id) => setSelDevs(p => {
      const n = new Set(p);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
    const toggleOne = (key) => setSel(p => {
      const n = new Set(p);
      if (n.has(key)) n.delete(key); else n.add(key);
      return n;
    });

    const apply = () => {
      const sM = parseHM(startTime), eM = parseHM(endTime);
      if (sM === null || eM === null) { showToast('Enter times as HH:MM (00:00–23:59)', 'error'); return; }
      setApplied(true);
      setSel(new Set());
    };
    const clearFilter = () => {
      setApplied(false);
      setSel(new Set());
    };

    const selectAll = () => setSel(new Set(matches.map(m => m.deviceId + '|' + m.filename)));
    const selectNone = () => setSel(new Set());

    // Run the actual delete after both confirmations have passed.
    const performDelete = async (whitelist) => {
      // Group by device for nicer toasts.
      setBusy(true);
      try {
        await Promise.all(whitelist.map(it =>
          fetch(`/recordings/${encodeURIComponent(it.deviceId)}/${encodeURIComponent(it.filename)}`, {method:'DELETE'})
        ));
        // Strip favorite flag for anything that was a favorite.
        whitelist.forEach(it => {
          if (it.isFav) {
            // best-effort — favorites endpoint cleanup is handled by the caller's
            // fetch cycle; we just remove the local flag below.
          }
        });
        setSel(new Set());
        onAfterDelete && onAfterDelete();
        showToast(`Deleted ${whitelist.length} recording${whitelist.length===1?'':'s'}`, 'info');
      } catch (e) {
        showToast(`Delete failed: ${e.message || 'network error'}`, 'error');
      }
      setBusy(false);
    };

    const handleDelete = async () => {
      const chosen = matches.filter(m => sel.has(m.deviceId + '|' + m.filename));
      if (chosen.length === 0) { showToast('Pick at least one recording', 'warn'); return; }
      if (authStatus?.lockDelete) { showToast('Delete is locked in Settings', 'warn'); return; }

      // Step 1 — password gate (only when policy requires it).
      if (authStatus?.requireDeletePassword) {
        const ok = await askPassword({
          title:'🔒 Confirm bulk delete',
          message:`Delete ${chosen.length} recording${chosen.length===1?'':'s'} matching the filter? This cannot be undone (sent to Recycle Bin).`,
          confirmLabel:'Delete', confirmColor:'#E53E3E',
        });
        if (!ok) return;
      } else {
        if (!window.confirm(`Delete ${chosen.length} recording${chosen.length===1?'':'s'}?`)) return;
      }

      // Step 2 — note-protection. Anything with a saved note gets a SECOND
      // confirmation so the user can keep them out of this delete.
      const withNotes    = chosen.filter(c => !!c.note);
      const withoutNotes = chosen.filter(c => !c.note);
      if (withNotes.length > 0) {
        const choice = await new Promise(resolve => {
          setNotesPrompt({
            withNotes, withoutNotes,
            onChoose: (mode) => { setNotesPrompt(null); resolve(mode); },
          });
        });
        if (choice === 'cancel' || !choice) return;
        if (choice === 'skip') {
          if (withoutNotes.length === 0) {
            showToast('Nothing left to delete — all selected items have notes', 'info');
            return;
          }
          await performDelete(withoutNotes);
          return;
        }
        // mode === 'all' — fall through to delete everything chosen
      }
      await performDelete(chosen);
    };

    const fmtTime = (iso) => {
      const d = new Date(iso);
      return d.toLocaleString([], { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
    };
    const fmtBytes = (n) => {
      if (!Number.isFinite(n) || n <= 0) return '';
      if (n < 1024) return n + ' B';
      if (n < 1024*1024) return (n/1024).toFixed(0) + ' KB';
      return (n/1024/1024).toFixed(1) + ' MB';
    };

    const allSelected = matches.length > 0 && sel.size === matches.length;

    return (
      <div style={{
        background:'#FFF', borderRadius:14, padding:14, marginBottom:14,
        boxShadow:'0 1px 6px rgba(0,0,0,0.07)', border:'1px solid #E2E8F0',
      }}>
        <button
          onClick={()=>setOpen(o=>!o)}
          style={{
            width:'100%', display:'flex', alignItems:'center', gap:8,
            background:'transparent', border:'none', cursor:'pointer', padding:0,
            textAlign:'left',
          }}
        >
          <span style={{
            fontSize:14, fontWeight:800, color:'#2D3748',
            display:'inline-flex', alignItems:'center', gap:8,
          }}>
            <span style={{
              transition:'transform .15s', transform: open ? 'rotate(90deg)' : 'rotate(0deg)',
              color:'#4A90A4', fontSize:11,
            }}>▶</span>
            🔎 Filter &amp; bulk delete
          </span>
          {applied && (
            <span style={{
              marginLeft:'auto', fontSize:11, fontWeight:700, padding:'3px 10px',
              borderRadius:999, background:'#EBF8FF', color:'#2B6CB0',
            }}>{matches.length} match{matches.length===1?'':'es'}</span>
          )}
        </button>

        {open && (
          <div style={{marginTop:12}}>
            {/* Device chips. Empty = all devices. */}
            <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:6, letterSpacing:0.4}}>
              DEVICES {selDevs.size === 0 ? '(all)' : `(${selDevs.size}/${deviceCount})`}
            </div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}}>
              {deviceCount === 0
                ? <span style={{fontSize:12, color:'#A0AEC0'}}>No devices with recordings yet.</span>
                : devEntries.map(([id, g]) => {
                    const on = selDevs.has(id);
                    return (
                      <button key={id} onClick={()=>toggleDev(id)} style={{
                        padding:'6px 10px', borderRadius:999, fontSize:12, fontWeight:700,
                        cursor:'pointer', whiteSpace:'nowrap',
                        border:`1.5px solid ${on?'#4A90A4':'#E2E8F0'}`,
                        background: on ? '#4A90A4' : '#F7FAFC',
                        color: on ? '#FFF' : '#2D3748',
                      }}>{g.deviceName || id}</button>
                    );
                  })
              }
              {selDevs.size > 0 && (
                <button onClick={()=>setSelDevs(new Set())} style={{
                  padding:'6px 10px', borderRadius:999, fontSize:12, fontWeight:700,
                  cursor:'pointer', background:'#FFF', color:'#4A5568',
                  border:'1.5px solid #E2E8F0',
                }}>All devices</button>
              )}
            </div>

            {/* Time-of-day window. 24h HH:MM. End < start = wraps midnight. */}
            <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:6, letterSpacing:0.4}}>
              TIME OF DAY (24-HOUR, ACROSS ALL DATES)
            </div>
            <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:6}}>
              <input
                type="time" value={startTime}
                onChange={e=>setStartTime(e.target.value)}
                style={{flex:1, height:40, fontSize:14, padding:'0 10px',
                        borderRadius:8, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
                        color:'#2D3748', boxSizing:'border-box'}}
              />
              <span style={{color:'#718096', fontSize:13, fontWeight:700}}>→</span>
              <input
                type="time" value={endTime}
                onChange={e=>setEndTime(e.target.value)}
                style={{flex:1, height:40, fontSize:14, padding:'0 10px',
                        borderRadius:8, border:'1.5px solid #E2E8F0', background:'#F7FAFC',
                        color:'#2D3748', boxSizing:'border-box'}}
              />
            </div>
            <div style={{fontSize:11, color:'#A0AEC0', marginBottom:12}}>
              {parseHM(endTime) !== null && parseHM(startTime) !== null && parseHM(endTime) < parseHM(startTime)
                ? 'Window wraps past midnight.'
                : 'Inclusive range. Same start &amp; end matches that exact minute.'}
            </div>

            <div style={{display:'flex', gap:8, marginBottom:applied?12:0}}>
              <button onClick={apply} disabled={busy} style={{
                flex:'2 1 0', height:42, borderRadius:10, border:'none',
                background:'#4A90A4', color:'#FFF', fontWeight:700, fontSize:14,
                cursor: busy ? 'not-allowed' : 'pointer',
              }}>Apply filter</button>
              <button onClick={clearFilter} disabled={busy || !applied} style={{
                flex:'1 1 0', height:42, borderRadius:10,
                border:'1.5px solid #E2E8F0', background:'#FFF', color:'#4A5568',
                fontWeight:700, fontSize:14,
                cursor: (busy || !applied) ? 'not-allowed' : 'pointer',
                opacity: applied ? 1 : 0.5,
              }}>Clear</button>
            </div>

            {/* Matched results — flat list with per-row checkboxes. Selection is
                independent of filter so user can deselect anything they want
                to keep before bulk-deleting. */}
            {applied && (
              <div>
                {matches.length === 0 ? (
                  <div style={{
                    fontSize:13, color:'#A0AEC0', textAlign:'center', padding:'18px 0',
                    border:'1px dashed #E2E8F0', borderRadius:10, marginTop:6,
                  }}>
                    No recordings match this filter.
                  </div>
                ) : (
                  <>
                    <div style={{
                      display:'flex', alignItems:'center', gap:8, marginBottom:8, fontSize:11,
                    }}>
                      <button onClick={selectAll} style={quickBtn}>Select all</button>
                      <button onClick={selectNone} style={quickBtn}>Clear selection</button>
                      <span style={{marginLeft:'auto', color:'#A0AEC0'}}>
                        {sel.size}/{matches.length} selected
                      </span>
                    </div>

                    <div style={{
                      border:'1px solid #E2E8F0', borderRadius:10, overflow:'hidden',
                      maxHeight:340, overflowY:'auto', marginBottom:10,
                    }}>
                      {matches.map((m, i) => {
                        const key = m.deviceId + '|' + m.filename;
                        const checked = sel.has(key);
                        return (
                          <label key={key} style={{
                            display:'flex', alignItems:'center', gap:10,
                            padding:'10px 12px', cursor:'pointer', boxSizing:'border-box',
                            background: checked ? '#FFF5F5' : '#FFF',
                            borderTop: i===0 ? 'none' : '1px solid #EDF2F7',
                          }}>
                            <input
                              type="checkbox" checked={checked}
                              onChange={()=>toggleOne(key)}
                              style={{width:18, height:18, cursor:'pointer', flexShrink:0, accentColor:'#E53E3E'}}
                            />
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{
                                fontSize:13, fontWeight:600, color:'#2D3748',
                                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                              }}>
                                {m.deviceName}
                                {m.isFav && <span title="Favorite" style={{marginLeft:6, color:'#D69E2E'}}>★</span>}
                                {m.note && <span title="Has a note" style={{marginLeft:6, color:'#B7791F'}}>📝</span>}
                              </div>
                              <div style={{
                                fontSize:11, color:'#718096', marginTop:1,
                                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                              }}>
                                {fmtTime(m.recordedAt)}{m.size?` · ${fmtBytes(m.size)}`:''}
                              </div>
                            </div>
                          </label>
                        );
                      })}
                    </div>

                    <button
                      onClick={handleDelete}
                      disabled={busy || sel.size === 0}
                      style={{
                        width:'100%', height:46, borderRadius:10, border:'none',
                        background: (busy || sel.size === 0) ? '#A0AEC0' : '#E53E3E',
                        color:'#FFF', fontWeight:700, fontSize:14,
                        cursor: (busy || sel.size === 0) ? 'not-allowed' : 'pointer',
                      }}
                    >🗑 Delete {sel.size} selected</button>
                  </>
                )}
              </div>
            )}
          </div>
        )}

        {/* Notes-protection modal — fires AFTER the password gate when any
            selected recording has a saved note. The user can include the
            noted ones, skip them, or cancel the whole delete. */}
        {notesPrompt && (
          <div onClick={()=>notesPrompt.onChoose('cancel')} style={{
            position:'fixed', inset:0, zIndex:810, background:'rgba(0,0,0,0.6)',
            display:'flex', alignItems:'center', justifyContent:'center', padding:16,
          }}>
            <div onClick={e=>e.stopPropagation()} style={{
              background:'#FFF', borderRadius:14, padding:20, maxWidth:420, width:'100%',
              boxShadow:'0 10px 30px rgba(0,0,0,0.3)',
            }}>
              <div style={{fontSize:16, fontWeight:800, color:'#2D3748', marginBottom:8}}>
                📝 Some recordings have notes
              </div>
              <div style={{fontSize:13, color:'#4A5568', marginBottom:12, lineHeight:1.5}}>
                <b>{notesPrompt.withNotes.length}</b> of the selected recording{notesPrompt.withNotes.length===1?'':'s'} {notesPrompt.withNotes.length===1?'has':'have'} a saved note —
                they may be important. Choose what to do:
              </div>
              <div style={{
                maxHeight:160, overflowY:'auto', background:'#FFFBEA',
                border:'1px solid #FAF089', borderRadius:8, padding:'8px 10px',
                fontSize:12, color:'#744210', marginBottom:14,
              }}>
                {notesPrompt.withNotes.slice(0, 12).map(m => (
                  <div key={m.deviceId+'|'+m.filename} style={{padding:'3px 0', borderBottom:'1px dashed #FAF089'}}>
                    <div style={{fontWeight:700}}>{m.deviceName} · {fmtTime(m.recordedAt)}</div>
                    <div style={{
                      overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', opacity:0.8,
                    }}>📝 {m.note}</div>
                  </div>
                ))}
                {notesPrompt.withNotes.length > 12 && (
                  <div style={{padding:'4px 0', fontWeight:700}}>
                    … and {notesPrompt.withNotes.length - 12} more
                  </div>
                )}
              </div>
              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                <button onClick={()=>notesPrompt.onChoose('cancel')} style={{
                  flex:'1 1 100%', height:42, borderRadius:10,
                  border:'1.5px solid #E2E8F0', background:'#FFF', color:'#4A5568',
                  fontWeight:700, fontSize:13, cursor:'pointer',
                }}>Cancel — don't delete anything</button>
                <button
                  onClick={()=>notesPrompt.onChoose('skip')}
                  disabled={notesPrompt.withoutNotes.length === 0}
                  style={{
                    flex:'1 1 calc(50% - 4px)', height:42, borderRadius:10,
                    border:'1.5px solid #4A90A4',
                    background: notesPrompt.withoutNotes.length === 0 ? '#EDF2F7' : '#FFF',
                    color:'#2C5282', fontWeight:700, fontSize:13,
                    cursor: notesPrompt.withoutNotes.length === 0 ? 'not-allowed' : 'pointer',
                    opacity: notesPrompt.withoutNotes.length === 0 ? 0.5 : 1,
                  }}
                >Keep noted ({notesPrompt.withoutNotes.length})</button>
                <button onClick={()=>notesPrompt.onChoose('all')} style={{
                  flex:'1 1 calc(50% - 4px)', height:42, borderRadius:10,
                  border:'none', background:'#E53E3E', color:'#FFF',
                  fontWeight:700, fontSize:13, cursor:'pointer',
                }}>Delete all {notesPrompt.withNotes.length + notesPrompt.withoutNotes.length}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ─── Device group block (Recordings) ───────────────────────── */
  function RecGroup({deviceId, group, onDelete, onDeleteAll, onDateDelete, onZipAll, onZipDate, onStar, favSet, inFavorites, notesMap, onSaveNote, onEnhance, enhancingEngines}) {
    const [open, setOpen] = useState(false);
    const [openDates, setOpenDates] = useState({});
    const color = devColor(deviceId);
    const toggleDate = (k) => setOpenDates(p => ({ ...p, [k]: !p[k] }));
    return (
      <div style={{
        marginBottom:18, borderRadius:12, overflow:'hidden',
        boxShadow: open ? '0 2px 10px rgba(15,42,53,0.08)' : 'none',
        border:`1.5px solid ${color+'33'}`,
        borderLeft:`4px solid ${color}`,
      }}>
        <button
          onClick={()=>setOpen(!open)}
          style={{
            width:'100%', display:'flex', alignItems:'center', gap:10,
            padding:'12px 14px',
            background: open ? color+'18' : color+'0E',
            border:'none', cursor:'pointer',
            transition:'background .15s',
          }}
        >
          <span style={{
            width:18, height:18, fontSize:11, color:color,
            display:'inline-flex', alignItems:'center', justifyContent:'center',
            transition:'transform .15s',
            transform: open ? 'rotate(90deg)' : 'rotate(0deg)',
            flexShrink:0,
          }}>▶</span>
          <span style={{
            flex:1, textAlign:'left', fontSize:15, fontWeight:700, color:'#1A202C',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
          }}>
            {group.deviceName}
          </span>
          <span style={{
            fontSize:11, fontWeight:700, color: color, background: color+'22',
            padding:'3px 10px', borderRadius:999, whiteSpace:'nowrap', letterSpacing:.2,
          }}>
            {group.recordings.length} {group.recordings.length===1?'recording':'recordings'}
          </span>
        </button>

        {open && (
          <div style={{background:'#FFF', padding:'0 12px 12px'}}>
            <div style={{padding:'10px 0', borderBottom:'1px solid #F0F4F5', display:'flex', gap:8, flexWrap:'wrap'}}>
              {onZipAll && (
                <button onClick={()=>onZipAll(deviceId)} style={{
                  flex:'1 1 140px', fontSize:12, fontWeight:600, padding:'8px 10px', borderRadius:8,
                  border:'1px solid #C6F6D5', color:'#38A169', background:'#F0FFF4', cursor:'pointer',
                }}>⬇ Download All as ZIP</button>
              )}
              {!inFavorites && (
                <button onClick={()=>onDeleteAll(deviceId)} style={{
                  flex:'1 1 140px', fontSize:12, fontWeight:600, padding:'8px 10px', borderRadius:8,
                  border:'1px solid #FED7D7', color:'#E53E3E', background:'#FFF5F5', cursor:'pointer',
                }}>🗑 Delete All Recordings</button>
              )}
            </div>
            {(() => {
              const baseOf = (fn) => {
                let b = fn;
                if (b.startsWith('NC-AI-')) b = b.slice(6);
                else if (b.startsWith('NC-')) b = b.slice(3);
                return b.replace(/\.[^.]+$/, '');
              };
              const parents = [];
              const childMap = {};
              group.recordings.forEach(r => {
                if (r.filename.startsWith('NC-')) {
                  const key = baseOf(r.filename);
                  (childMap[key] = childMap[key] || []).push(r);
                } else {
                  parents.push(r);
                }
              });
              const parentKeys = new Set(parents.map(r => r.filename.replace(/\.[^.]+$/, '')));
              const ordered = [];
              parents.forEach(p => {
                ordered.push({ rec: p, child: false });
                const k = p.filename.replace(/\.[^.]+$/, '');
                (childMap[k] || []).forEach(c => ordered.push({ rec: c, child: true }));
              });
              Object.keys(childMap).forEach(k => {
                if (!parentKeys.has(k)) {
                  childMap[k].forEach(c => ordered.push({ rec: c, child: false }));
                }
              });
              // Bundle parent + its NC children into one card, orphan NCs as their own card.
              const cards = [];
              let current = null;
              ordered.forEach(({rec, child}) => {
                if (!child) {
                  if (current) cards.push(current);
                  current = { parent: rec, children: [] };
                } else if (current) {
                  current.children.push(rec);
                } else {
                  cards.push({ parent: rec, children: [], orphan: true });
                }
              });
              if (current) cards.push(current);
              const dateGroups = groupByDay(cards, c => parseRecordedAt(c.parent.filename) || c.parent.created);
              return dateGroups.map(dg => {
                const dateOpen = !!openDates[dg.key];
                const filenamesInDate = [];
                dg.items.forEach(c => {
                  filenamesInDate.push(c.parent.filename);
                  c.children.forEach(ch => filenamesInDate.push(ch.filename));
                });
                return (
                  <div key={dg.key}>
                    <DateSubHeader
                      color={color} label={dg.label} count={dg.items.length}
                      countLabel={dg.items.length===1?'recording':'recordings'}
                      open={dateOpen} onToggle={()=>toggleDate(dg.key)}
                      dateKey={dg.key}
                      onZipDate={onZipDate ? ()=>onZipDate(deviceId, filenamesInDate, dg.label) : null}
                      onDeleteDate={onDateDelete ? (k)=>onDateDelete(deviceId, filenamesInDate, dg.label) : null}
                    />
                    {dateOpen && (
                      <DateBody color={color} padded>
                        {dg.items.map(card => (
                      <div key={card.parent.filename} style={{
                        background:'#FFF',
                        border:'1px solid #E2E8F0',
                        borderRadius:10,
                        boxShadow:'0 1px 3px rgba(0,0,0,0.06)',
                        margin:'8px 0',
                        overflow:'hidden',
                      }}>
                        <RecRow
                          key={card.parent.filename} rec={card.parent} deviceId={deviceId}
                          isChild={false}
                          onDelete={onDelete} onStar={onStar}
                          starred={favSet ? favSet.has(card.parent.filename) : false}
                          inFavorites={inFavorites}
                          note={notesMap ? notesMap[card.parent.filename] : ''}
                          onSaveNote={onSaveNote}
                          onEnhance={onEnhance}
                          enhancingEngines={enhancingEngines}
                        />
                        {card.children.map(ch => (
                          <RecRow
                            key={ch.filename} rec={ch} deviceId={deviceId}
                            isChild={true}
                            onDelete={onDelete} onStar={onStar}
                            starred={favSet ? favSet.has(ch.filename) : false}
                            inFavorites={inFavorites}
                            note={notesMap ? notesMap[ch.filename] : ''}
                            onSaveNote={onSaveNote}
                            onEnhance={onEnhance}
                            enhancingEngines={enhancingEngines}
                          />
                        ))}
                      </div>
                        ))}
                      </DateBody>
                    )}
                  </div>
                );
              });
            })()}
          </div>
        )}
      </div>
    );
  }

  /* ─── Screenshot thumbnail ───────────────────────────────────── */
  function ShotThumb({shot, deviceId, onDelete, onLightbox, onStar, starred, inFavorites, note, onSaveNote}) {
    const hasNote = !!note;
    const capturedAt = parseRecordedAt(shot.filename);
    return (
      <div style={{
        background: hasNote ? '#FFFBEA' : '#FFF', borderRadius:12, overflow:'hidden',
        boxShadow: hasNote
          ? '0 2px 10px rgba(236,201,75,0.35)'
          : '0 2px 6px rgba(15,42,53,0.08), 0 1px 2px rgba(15,42,53,0.04)',
        border: hasNote ? '1.5px solid #ECC94B' : '1px solid #E2E8F0',
      }}>
        <img
          src={shot.url} alt={shot.filename} loading="lazy"
          onClick={()=>onLightbox(shot.url)}
          style={{width:'100%', height:130, objectFit:'cover', display:'block', cursor:'zoom-in'}}
        />
        <div style={{padding:'8px 10px 10px'}}>
          {capturedAt && (
            <div title={`Captured ${new Date(capturedAt).toLocaleString()}`}
                 style={{
                   display:'inline-block', fontSize:10, fontWeight:600,
                   padding:'1px 6px', marginBottom:3, borderRadius:999,
                   background:'#EBF8FF', color:'#2B6CB0',
                 }}>📸 {fmtDate(capturedAt)}</div>
          )}
          <div style={{fontSize:10, color:'#A0AEC0'}}>
            ⬆ Up: {fmtDate(shot.created)} · {fmtSize(shot.size)}
          </div>
          <div style={{height:6}} />
          <div style={{display:'flex', gap:4}}>
            <a href={shot.url} download={shot.filename} style={{
              flex:1, display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:12, padding:'4px 0', borderRadius:6,
              border:'1px solid #C6F6D5', color:'#38A169', textDecoration:'none',
            }}>⬇</a>
            {!inFavorites && (
              <button
                onClick={()=>onStar && onStar(deviceId, shot.filename)}
                disabled={starred}
                title={starred ? 'Already favorited' : 'Add to favorites'}
                style={{
                  flex:1, fontSize:14, padding:'4px 0', borderRadius:6,
                  border:'1px solid #FEEBC8', color: starred?'#D69E2E':'#ED8936',
                  background: starred ? '#FFFBEB' : '#FFF',
                  cursor: starred ? 'default' : 'pointer',
                }}
              >{starred ? '★' : '☆'}</button>
            )}
            <button
              onClick={()=>onDelete(deviceId, shot.filename)}
              style={{
                flex:1, fontSize:12, padding:'4px 0', borderRadius:6,
                border:'1px solid #FED7D7', color:'#E53E3E',
              }}
            >✕</button>
          </div>
          <NoteWidget
            kind="screenshots" deviceId={deviceId} filename={shot.filename}
            note={note} onSave={onSaveNote} compact
          />
        </div>
      </div>
    );
  }

  /* ─── Device group block (Screenshots) ──────────────────────── */
  function ShotGroup({deviceId, group, onDelete, onDeleteAll, onDateDelete, onZipAll, onZipDate, onLightbox, onStar, favSet, inFavorites, notesMap, onSaveNote}) {
    const [open, setOpen] = useState(false);
    const [openDates, setOpenDates] = useState({});
    const toggleDate = (k) => setOpenDates(p => ({ ...p, [k]: !p[k] }));
    const color = devColor(deviceId);
    return (
      <div style={{
        marginBottom:18, borderRadius:12, overflow:'hidden',
        boxShadow: open ? '0 2px 10px rgba(15,42,53,0.08)' : 'none',
        border:`1.5px solid ${color+'33'}`,
        borderLeft:`4px solid ${color}`,
      }}>
        <button
          onClick={()=>setOpen(!open)}
          style={{
            width:'100%', display:'flex', alignItems:'center', gap:10,
            padding:'12px 14px',
            background: open ? color+'18' : color+'0E',
            border:'none', cursor:'pointer',
            transition:'background .15s',
          }}
        >
          <span style={{
            width:18, height:18, fontSize:11, color:color,
            display:'inline-flex', alignItems:'center', justifyContent:'center',
            transition:'transform .15s',
            transform: open ? 'rotate(90deg)' : 'rotate(0deg)',
            flexShrink:0,
          }}>▶</span>
          <span style={{
            flex:1, textAlign:'left', fontSize:15, fontWeight:700, color:'#1A202C',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
          }}>
            {group.deviceName}
          </span>
          <span style={{
            fontSize:11, fontWeight:700, color: color, background: color+'22',
            padding:'3px 10px', borderRadius:999, whiteSpace:'nowrap', letterSpacing:.2,
          }}>
            {group.screenshots.length} {group.screenshots.length===1?'shot':'shots'}
          </span>
        </button>

        {open && (
          <div style={{background:'#FFF', padding:'10px 12px 12px'}}>
            <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:10}}>
              {onZipAll && (
                <button onClick={()=>onZipAll(deviceId)} style={{
                  flex:'1 1 140px', fontSize:12, fontWeight:600, padding:'8px 10px', borderRadius:8,
                  border:'1px solid #C6F6D5', color:'#38A169', background:'#F0FFF4', cursor:'pointer',
                }}>⬇ Download All as ZIP</button>
              )}
              {!inFavorites && (
                <button onClick={()=>onDeleteAll(deviceId)} style={{
                  flex:'1 1 140px', fontSize:12, fontWeight:600, padding:'8px 10px', borderRadius:8,
                  border:'1px solid #FED7D7', color:'#E53E3E', background:'#FFF5F5', cursor:'pointer',
                }}>🗑 Delete All Screenshots</button>
              )}
            </div>
            {(() => {
              const dateGroups = groupByDay(group.screenshots, s => parseRecordedAt(s.filename) || s.created);
              return dateGroups.map(dg => {
                const dateOpen = !!openDates[dg.key];
                const fns = dg.items.map(s => s.filename);
                return (
                  <div key={dg.key}>
                    <DateSubHeader
                      color={color} label={dg.label} count={dg.items.length}
                      countLabel={dg.items.length===1?'shot':'shots'}
                      open={dateOpen} onToggle={()=>toggleDate(dg.key)}
                      dateKey={dg.key}
                      onZipDate={onZipDate ? ()=>onZipDate(deviceId, fns, dg.label) : null}
                      onDeleteDate={onDateDelete ? (k)=>onDateDelete(deviceId, fns, dg.label) : null}
                    />
                    {dateOpen && (
                      <DateBody color={color} padded>
                        <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:10, padding:'8px 0 4px'}}>
                          {dg.items.map(shot => (
                            <ShotThumb
                              key={shot.filename}
                              shot={shot} deviceId={deviceId}
                              onDelete={onDelete} onLightbox={onLightbox}
                              onStar={onStar}
                              starred={favSet ? favSet.has(shot.filename) : false}
                              inFavorites={inFavorites}
                              note={notesMap ? notesMap[shot.filename] : ''}
                              onSaveNote={onSaveNote}
                            />
                          ))}
                        </div>
                      </DateBody>
                    )}
                  </div>
                );
              });
            })()}
          </div>
        )}
      </div>
    );
  }

  /* ─── Gallery thumbnail ───────────────────────────────────────── */
  function GalleryThumb({img, deviceId, onDelete, onLightbox, onStar, starred, inFavorites, note, onSaveNote}) {
    const hasNote = !!note;
    return (
      <div style={{
        background: hasNote ? '#FFFBEA' : '#FFF', borderRadius:12, overflow:'hidden',
        boxShadow: hasNote
          ? '0 2px 10px rgba(236,201,75,0.35)'
